<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priya AI - Modular a1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #020208; }
        #failsafe-background-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }
        #canvas-viewport { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; }
        .hud-diagnostic-monitor {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(7, 7, 18, 0.7); padding: 10px 15px; border-radius: 8px;
            border-left: 4px solid #00f2ff; color: #ffffff; font-family: monospace; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="failsafe-background-canvas"></div>
    <div class="hud-diagnostic-monitor"><div>PROJECT: MODULAR a1</div></div>
    <div id="canvas-viewport"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="engine.js"></script>
    <script src="animation.js"></script>
    <script src="avatar.js"></script>
</body>
</html>
