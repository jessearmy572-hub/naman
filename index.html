<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020208">
    <title>Priya AI - Advanced Live Matrix v12.0</title>
    
    <style>
        :root {
            --glow-cyan: #00f2ff;
            --glow-ruby: #ff3355;
            --panel-bg: rgba(7, 7, 18, 0.65);
            --border-spec: rgba(0, 242, 255, 0.15);
            --glass-blur: blur(20px);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #020208;
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            user-select: none; -webkit-user-select: none;
        }

        #canvas-viewport {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 3;
            touch-action: none; outline: none;
        }

        .hud-diagnostic-monitor {
            position: absolute; top: env(safe-area-inset-top, 30px); left: 30px;
            z-index: 10; background: var(--panel-bg); padding: 14px 22px; border-radius: 14px;
            border: 1px solid var(--border-spec); border-left: 5px solid var(--glow-cyan);
            color: #ffffff; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .status-header-container { display: flex; align-items: center; font-size: 12px; font-weight: 700; letter-spacing: 0.75px; font-family: monospace; }
        .pulse-core-node {
            width: 8px; height: 8px; background-color: var(--glow-cyan); border-radius: 50%;
            display: inline-block; margin-right: 12px; box-shadow: 0 0 10px var(--glow-cyan);
            animation: nodeHeartbeat 2.5s infinite ease-in-out;
        }
        @keyframes nodeHeartbeat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.4; } }
        
        .telemetry-metrics { font-size: 10px; color: rgba(255, 255, 255, 0.4); margin-top: 6px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.5px; }

        .interaction-control-dock {
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 40px); width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .glassmorphic-input-bar {
            background: var(--panel-bg); border: 1px solid var(--border-spec);
            width: 92%; max-width: 560px; display: flex; align-items: center;
            padding: 6px 20px; border-radius: 100px; backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            pointer-events: auto; transition: border-color 0.4s ease;
        }
        .glassmorphic-input-bar:focus-within { border-color: var(--glow-cyan); }
        
        input[type="text"] { flex: 1; background: none; border: none; color: #ffffff; height: 50px; font-size: 16px; outline: none; padding: 0 10px; }
        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.3); }
        
        .action-trigger-btn { background: none; border: none; color: var(--glow-cyan); font-size: 22px; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .action-trigger-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="hud-diagnostic-monitor" id="hud-monitor-node">
        <div class="status-header-container">
            <span class="pulse-core-node"></span>
            <span id="system-status-string">PRIYA_AI // FULL-BODY ANIMATION ENGINE v12.0</span>
        </div>
        <div id="sub-diagnostic-label" class="telemetry-metrics">LOADING 3D SPACE BACKGROUND & BIOMETRIC RIGS...</div>
    </div>

    <div id="canvas-viewport"></div>

    <div class="interaction-control-dock">
        <div class="glassmorphic-input-bar">
            <button class="action-trigger-btn" id="webcam-toggle-node">📷</button>
            <button class="action-trigger-btn" id="mic-activation-node">🎤</button>
            <input type="text" id="user-input-field" placeholder="प्रिया से बात करें..." autocomplete="off">
            <button class="action-trigger-btn" id="transmit-payload-btn" style="color: #ffffff; font-size: 20px;">➔</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="script.js"></script>
</body>
</html>
