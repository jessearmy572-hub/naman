<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Core: a1 Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* 3D Model Container Viewport */
        #canvas-viewport {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Premium UI Header based on screenshot reference */
        .project-header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }
        .live-indicator {
            width: 8px;
            height: 32px;
            background: #00f0ff;
            border-radius: 4px;
            box-shadow: 0 0 15px #00f0ff;
        }
        .project-title {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="project-header">
        <div class="live-indicator"></div>
        <div class="project-title">Project Core: a1 Live</div>
    </div>

    <div id="canvas-viewport"></div>

    <script src="script.js"></script>
</body>
</html>
