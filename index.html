<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priya AI - nv1 Ultimate Core</title>
    <style>
        :root { --glow: #00f2ff; --panel: rgba(0, 0, 0, 0.85); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* FEATURE 1: Live Motion Video Background Engine */
        #video-bg {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.6; /* 3D अवतार को गहराई देने के लिए */
        }

        /* 3D Canvas Container */
        #canvas-container { width: 100%; height: 100%; position: absolute; z-index: 3; touch-action: none; }

        /* HUD & Status Monitor */
        .hud-top {
            position: absolute; top: 25px; left: 25px; z-index: 10;
            background: var(--panel); padding: 12px 18px; border-radius: 12px;
            border-left: 3px solid var(--glow); color: white; backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .status-dot { width: 8px; height: 8px; background: var(--glow); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        #debug-log { font-size: 10px; color: #ff3333; margin-top: 5px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* UI Input Dock */
        .ui-dock {
            position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100;
        }
        .glass-input {
            background: var(--panel); border: 1px solid rgba(0,242,255,0.3);
            width: 88%; max-width: 500px; display: flex; align-items: center;
            padding: 8px 15px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        input { flex: 1; background: none; border: none; color: white; height: 45px; font-size: 16px; outline: none; }
        .action-icon { background: none; border: none; color: var(--glow); font-size: 22px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .action-icon:active { transform: scale(0.85); }
    </style>
</head>
<body>

<video autoplay loop muted playsinline id="video-bg">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-beautiful-waterfall-in-a-lush-green-forest-43187-large.mp4" type="video/mp4">
</video>

<div class="hud-top">
    <div><span class="status-dot"></span><b id="sys-status">nv1 CORE: LOADING</b></div>
    <div id="sub-label" style="font-size: 10px; opacity: 0.6; margin-top: 4px;">SENSORS: INITIALIZING</div>
    <div id="debug-log"></div>
</div>

<div id="canvas-container"></div>

<div class="ui-dock">
    <div class="glass-input">
        <button class="action-icon" id="mic">🎤</button>
        <input type="text" id="in" placeholder="मुझसे बात करें या कमांड दें...">
        <button class="action-icon" id="send" style="color:white">➔</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    window.GLOBAL_MODEL_URL = "https://github.com/jessearmy572-hub/naman/raw/refs/heads/main/model.glb";
</script>

<script src="script.js"></script>

</body>
</html>
