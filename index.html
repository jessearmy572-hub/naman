<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020208">
    <title>Priya AI - Quantum Engine v11.2</title>
    
    <style>
        :root {
            --glow-cyan: #00f2ff;
            --glow-ruby: #ff3355;
            --bg-dark: #020208;
            --panel-bg: rgba(10, 10, 22, 0.85);
            --border-spec: rgba(0, 242, 255, 0.22);
            --glass-blur: blur(25px);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            user-select: none; -webkit-user-select: none;
        }

        #dynamic-sky {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; transition: background 4s ease;
            transform: translate3d(0,0,0);
            background: linear-gradient(to top, #010104, #03030f, #070718);
        }

        .weather-fog-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 15%, rgba(2,2,12,0.75) 100%);
        }

        #canvas-viewport {
            width: 100%; height: 100%; position: absolute; z-index: 3;
            touch-action: none; outline: none; background: transparent;
        }

        .hud-diagnostic-monitor {
            position: absolute; top: env(safe-area-inset-top, 30px); left: 30px;
            z-index: 10; background: var(--panel-bg); padding: 16px 26px; border-radius: 18px;
            border: 1px solid var(--border-spec); border-left: 6px solid var(--glow-cyan);
            color: #ffffff; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.65);
        }

        .status-header-container { display: flex; align-items: center; font-size: 13px; font-weight: 700; letter-spacing: 0.75px; font-family: monospace; }
        .pulse-core-node {
            width: 9px; height: 9px; background-color: var(--glow-cyan); border-radius: 50%;
            display: inline-block; margin-right: 14px; box-shadow: 0 0 12px var(--glow-cyan);
            animation: nodeHeartbeat 2.5s infinite ease-in-out;
        }
        @keyframes nodeHeartbeat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.4; } }
        
        .telemetry-metrics { font-size: 11px; color: rgba(255, 255, 255, 0.48); margin-top: 8px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.5px; }
        #weather-runtime-telemetry { color: var(--glow-cyan); font-weight: 700; margin-top: 6px; font-size: 11px; letter-spacing: 0.75px; font-family: monospace; }

        .interaction-control-dock {
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 40px); width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .glassmorphic-input-bar {
            background: var(--panel-bg); border: 1px solid var(--border-spec);
            width: 92%; max-width: 560px; display: flex; align-items: center;
            padding: 6px 22px; border-radius: 100px; backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.85);
            pointer-events: auto; transition: border-color 0.4s ease;
        }
        .glassmorphic-input-bar:focus-within { border-color: var(--glow-cyan); }
        
        input[type="text"] { flex: 1; background: none; border: none; color: #ffffff; height: 52px; font-size: 16px; outline: none; padding: 0 12px; }
        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.32); }
        
        .action-trigger-btn { background: none; border: none; color: var(--glow-cyan); font-size: 24px; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .action-trigger-btn:active { transform: scale(0.88); }
        
        #webcam-feed-buffer { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="dynamic-sky"></div>
    <div class="weather-fog-overlay" id="environmental-overlay"></div>

    <div class="hud-diagnostic-monitor" id="hud-monitor-node">
        <div class="status-header-container">
            <span class="pulse-core-node" id="status-glow-indicator"></span>
            <span id="system-status-string">PRIYA_AI // PLATFORM CORRELATION ENGINE v11.2</span>
        </div>
        <div id="sub-diagnostic-label" class="telemetry-metrics">INITIALIZING HARDWARE ACCELERATED GRAPHICS PIPELINE...</div>
        <div id="weather-runtime-telemetry">📡 CHRONOS-SYSTEM: RECONNECTING PACKET NODE</div>
    </div>

    <video id="webcam-feed-buffer" autoplay playsinline muted></video>
    <div id="canvas-viewport"></div>

    <div class="interaction-control-dock">
        <div class="glassmorphic-input-bar">
            <button class="action-trigger-btn" id="webcam-toggle-node" title="Face Track Mode">📷</button>
            <button class="action-trigger-btn" id="mic-activation-node" title="Voice Stream Input">🎤</button>
            <input type="text" id="user-input-field" placeholder="प्रिया से बात करें या स्क्रीन पर कहीं भी टच करें..." autocomplete="off">
            <button class="action-trigger-btn" id="transmit-payload-btn" style="color: #ffffff; font-size: 20px;">➔</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="script.js"></script>
</body>
</html>
