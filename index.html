<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#010103">
    <title>Priya AI - Core Live Terminal</title>
    
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-blue: #0099ff;
            --neon-pink: #ff416c;
            --neon-orange: #ff4b2b;
            --bg-absolute-black: #010103;
            --bg-glass-panel: rgba(5, 5, 12, 0.85);
            --bg-input-field: rgba(3, 3, 7, 0.96);
            --text-core-white: #ffffff;
            --text-dim-slate: rgba(255, 255, 255, 0.68);
            --font-stack-cyber: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            --font-stack-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-absolute-black);
            font-family: var(--font-stack-cyber);
            color: var(--text-core-white);
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        #image-bg {
            position: absolute;
            top: -5%; 
            left: -5%;
            width: 110%;
            height: 110%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            filter: brightness(0.35) contrast(1.2) saturate(0.9);
            will-change: transform;
        }

        .matrix-grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .matrix-scanlines-filter {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            z-index: 4;
            background-size: 100% 4px;
            pointer-events: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 3;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* UI Dashboard Panels */
        .dashboard {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            background: var(--bg-glass-panel);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .status-block {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .status-beacon-dot {
            width: 12px;
            height: 12px;
            background: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 15px var(--neon-cyan);
            animation: BeaconPulse 2s infinite ease-in-out;
        }

        .status-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .channel-info {
            font-size: 12px;
            color: var(--text-dim-slate);
        }

        .channel-active-value {
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .system-analytics-subpanel {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-family: var(--font-stack-mono);
            color: var(--text-dim-slate);
            min-width: 200px;
        }

        .metric-value {
            color: var(--neon-blue);
            font-weight: bold;
        }

        /* Control UI Dock Layout */
        .ui-dock-wrapper {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 0 30px;
            z-index: 20;
        }

        .input-carrier-box {
            background: var(--bg-input-field);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 0 25px;
            border-radius: 40px;
            flex-grow: 1;
            max-width: 700px;
            height: 65px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        .input-carrier-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3), 0 20px 50px rgba(0,0,0,0.9);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-core-white);
            font-size: 16px;
            height: 100%;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .action-circle-btn {
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .mic-trigger-btn {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #ffffff;
            font-size: 22px;
            box-shadow: 0 10px 25px rgba(255, 75, 43, 0.4);
        }

        .mic-trigger-btn:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .mic-trigger-btn.listening {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            box-shadow: 0 0 35px var(--neon-cyan);
            animation: MicPulse 1.2s infinite alternate ease-in-out;
        }

        .send-trigger-btn {
            background: #ffffff;
            color: #010103;
            font-size: 20px;
            box-shadow: 0 10px 25px rgba(255,255,255,0.15);
        }

        .send-trigger-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background: #f0f0f5;
        }

        #subtitle-monitor-box {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(3, 3, 8, 0.95);
            padding: 15px 35px;
            border-radius: 20px;
            color: var(--text-core-white);
            font-size: 16px;
            max-width: 80%;
            text-align: center;
            z-index: 30;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: none;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Core Loader Veil Settings */
        #core-boot-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 6, 0.96); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out;
        }

        .loader-ring-spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-blue);
            animation: EngineSpin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.2);
        }

        .loader-label-text {
            color: var(--neon-cyan);
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            text-align: center;
            font-weight: 600;
        }

        .system-watermark-stamp {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
            font-family: var(--font-stack-mono);
            font-size: 11px;
            color: rgba(0, 255, 204, 0.3);
            text-align: right;
            pointer-events: none;
            line-height: 1.4;
        }

        @keyframes EngineSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes BeaconPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan); } }
        @keyframes MicPulse { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }

        @media (max-width: 768px) {
            .dashboard { top: 20px; left: 20px; padding: 15px 20px; }
            .ui-dock-wrapper { bottom: 25px; padding: 0 15px; gap: 10px; }
            .input-carrier-box { height: 58px; padding: 0 15px; }
            .action-circle-btn { width: 58px; height: 58px; }
            #subtitle-monitor-box { bottom: 100px; font-size: 14px; }
            .system-analytics-subpanel { display: none; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop" id="image-bg" alt="Core Background Frame">
    <div class="matrix-grid-overlay"></div>
    <div class="matrix-scanlines-filter"></div>

    <div class="dashboard">
        <div class="status-block">
            <span class="status-beacon-dot"></span> 
            <span class="status-title">सिस्टम कोर: <span id="system-core-mood-txt" style="color:var(--neon-cyan);">जेमिनी nv1 लाइव ⚡</span></span>
        </div>
        <div class="channel-info">चैनल स्थिति: <span id="active-secure-channel-status" class="channel-active-value">Core-1 (Secure Node)</span></div>
        
        <div class="system-analytics-subpanel">
            <div class="metric-row"><span>ENGINE STATUS:</span><span class="metric-value" id="telemetry-fps-val">60.00 FPS</span></div>
            <div class="metric-row"><span>MESH NODES:</span><span class="metric-value" id="telemetry-nodes-val">Active Render</span></div>
            <div class="metric-row"><span>STABILITY VERDICT:</span><span class="metric-value" style="color: var(--neon-cyan);">100% OPERATIONAL</span></div>
        </div>
    </div>

    <div class="system-watermark-stamp">
        <div>PRIYA AI ENGINE V1.9.4 PRO</div>
        <div id="system-live-clock-stamp">00:00:00 UTC</div>
    </div>

    <div id="core-boot-loader">
        <div class="loader-ring-spinner"></div>
        <div class="loader-label-text">प्रिया का न्यूरल माइंड लोड हो रहा है...<br><span style="font-size: 12px; color: var(--text-dim-slate); text-transform: none; font-weight: normal;">3D मॉडल और लाइट पाइपलाइन सेट की जा रही है</span></div>
    </div>

    <div id="canvas-container"></div>
    <div id="subtitle-monitor-box">प्रिया बोल रही है...</div>

    <div class="ui-dock-wrapper">
        <button class="action-circle-btn mic-trigger-btn" id="micBtn" title="वॉइस कमांड चालू करें">🎤</button>
        <div class="input-carrier-box">
            <input type="text" id="userInput" placeholder="प्रिया से कुछ भी पूछें, सीधे लाइव जवाब आएगा..." autocomplete="off" spellcheck="false"/>
        </div>
        <button class="action-circle-btn send-trigger-btn" id="sendBtn" title="कमांड भेजें">➔</button>
    </div>

</body>
</html>
