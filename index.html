<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priya AI - Sovereign Production Interface v4.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <link rel="stylesheet" href="cyberpunk.css">
</head>
<body>

    <video autoplay loop muted playsinline id="video-background-engine">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-waterfall-in-forest-2213-large.mp4" type="video/mp4">
    </video>

    <video id="webcam-capture-node" autoplay playsinline></video>

    <div class="telemetry-hud">
        <div class="hud-header"><span class="status-dot"></span>Priya Quantum Architecture</div>
        <div class="hud-row"><span>SYSTEM ENGINE:</span><span class="hud-val" id="hud-fps-val">-- FPS</span></div>
        <div class="hud-row"><span>VISION MONITOR:</span><span class="hud-val" id="hud-vision-status" style="color:var(--neon-pink)">OFFLINE</span></div>
        <div class="hud-row"><span>WEATHER CELL:</span><span class="hud-val" id="hud-weather-status">SYNCING...</span></div>
        <div class="hud-row"><span>CLOUD MEMORY:</span><span class="hud-val" id="hud-drive-status" style="color:var(--neon-pink)">NOT CONNECTED</span></div>
        
        <div class="drive-sync-banner">
            <button class="drive-btn" id="authDriveBtn" onclick="Cloud_TriggerDriveAuthorizationLink()">🔑 LINK GOOGLE DRIVE</button>
        </div>
    </div>

    <div class="matrix-dock-container">
        <div class="control-group">
            <div class="group-title">Wardrobe Blueprint</div>
            <button class="dock-btn active" id="btn-outfit-base" onclick="UIBridge_SwapOutfit('default', this)">⚪ Base Pattern</button>
            <button class="dock-btn" id="btn-outfit-crimson" onclick="UIBridge_SwapOutfit('crimson', this)">🔴 Crimson Saree</button>
            <button class="dock-btn" id="btn-outfit-emerald" onclick="UIBridge_SwapOutfit('emerald', this)">🟢 Emerald Dress</button>
        </div>

        <div class="control-group">
            <div class="group-title">Vision Module</div>
            <button class="dock-btn" id="btn-cam-toggle" onclick="Vision_ToggleWebcamHardwarePipeline()">📷 Enable Eye Tracking</button>
        </div>

        <div class="control-group">
            <div class="group-title">Audio Voice Engine</div>
            <div class="voice-mode-banner">
                <span>ELEVENLABS STREAM:</span>
                <input type="checkbox" id="elevenLabsToggle" style="width:16px; height:16px; cursor:pointer;">
            </div>
        </div>
    </div>

    <div id="subtitle-monitor-box"><span class="subtitle-text" id="subtitle-internal-node">Bypassing Matrix Cores...</span></div>

    <div id="canvas-container"></div>

    <div class="ui-dock-wrapper">
        <button class="circle-btn mic-btn" id="micBtn" onclick="Audio_ToggleSpeechRecognitionInterface()">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Priya se baat karein ya outfit badlein...">
        </div>
        <button class="circle-btn send-btn" id="sendBtn">➔</button>
    </div>

    <div id="boot-loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-status-text">INITIALIZING QUANTUM ENGINES...</div>
    </div>

    <script src="ai-engine.js"></script>
    <script src="graphics-hardware.js"></script>
</body>
</html>
