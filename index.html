<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020208">
    <meta name="description" content="Priya AI - Advanced High-Performance Virtual Human Interaction Engine Layer v11.0">
    <title>Priya AI - Quantum Vector Graphics Platform v11.0</title>
    
    <style>
        /* CSS CORE ARCHITECTURE & DESIGN SYSTEM */
        :root {
            --glow-cyan: #00f2ff;
            --glow-amber: #ffaa00;
            --glow-ruby: #ff3355;
            --bg-dark: #020208;
            --panel-bg: rgba(10, 10, 22, 0.85);
            --border-spec: rgba(0, 242, 255, 0.22);
            --glass-blur: blur(25px);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* RESET & BASE SYSTEM OVERRIDES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }

        /* PROCEDURAL ENVIRONMENT BACKDROP ANIMATION MATRIX */
        #dynamic-sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: background 4s cubic-bezier(0.25, 1, 0.5, 1), filter 4s ease;
            will-change: background;
            transform: translate3d(0,0,0);
        }

        .weather-fog-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 15%, rgba(2,2,12,0.75) 100%);
            transform: translate3d(0,0,0);
        }

        /* HIGH-PERFORMANCE CANVAS VIEWPORT LAYER */
        #canvas-viewport {
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 3;
            touch-action: none;
            outline: none;
            background: transparent;
        }

        /* SCI-FI HUD MONITOR & DIAGNOSTICS TELEMETRY */
        .hud-diagnostic-monitor {
            position: absolute;
            top: env(safe-area-inset-top, 30px);
            left: 30px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 16px 26px;
            border-radius: 18px;
            border: 1px solid var(--border-spec);
            border-left: 6px solid var(--glow-cyan);
            color: #ffffff;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.65);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translate3d(0,0,0);
        }

        .status-header-container {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.75px;
            font-family: monospace;
        }

        .pulse-core-node {
            width: 9px;
            height: 9px;
            background-color: var(--glow-cyan);
            border-radius: 50%;
            display: inline-block;
            margin-right: 14px;
            box-shadow: 0 0 12px var(--glow-cyan);
            animation: nodeHeartbeat 2.5s infinite ease-in-out;
        }

        @keyframes nodeHeartbeat {
            0%, 100% { transform: scale(1); opacity: 1; filter: brightness(1); }
            50% { transform: scale(1.25); opacity: 0.4; filter: brightness(1.5); }
        }

        .telemetry-metrics {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.48);
            margin-top: 8px;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        #weather-runtime-telemetry {
            color: var(--glow-cyan);
            font-weight: 700;
            margin-top: 6px;
            font-size: 11px;
            letter-spacing: 0.75px;
            font-family: monospace;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.3);
        }

        /* GLASSMORPHIC INTERACTION NAVIGATION DOCK */
        .interaction-control-dock {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
            transform: translate3d(0,0,0);
        }

        .glassmorphic-input-bar {
            background: var(--panel-bg);
            border: 1px solid var(--border-spec);
            width: 92%;
            max-width: 560px;
            display: flex;
            align-items: center;
            padding: 6px 22px;
            border-radius: 100px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.85);
            pointer-events: auto;
            transition: border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .glassmorphic-input-bar:focus-within {
            border-color: var(--glow-cyan);
            box-shadow: 0 30px 60px rgba(0, 242, 255, 0.15), 0 0 0 1px var(--glow-cyan);
        }

        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            color: #ffffff;
            height: 52px;
            font-size: 16px;
            outline: none;
            padding: 0 12px;
            font-family: var(--font-stack);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.32);
            font-weight: 400;
        }

        .action-trigger-btn {
            background: none;
            border: none;
            color: var(--glow-cyan);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease;
        }

        .action-trigger-btn:hover {
            color: #ffffff;
        }

        .action-trigger-btn:active {
            transform: scale(0.88);
        }

        /* WEB STREAM CAM ISOLATION LAYER */
        #webcam-feed-buffer {
            position: absolute;
            width: 4px;
            height: 4px;
            opacity: 0;
            pointer-events: none;
            top: -100px;
            left: -100px;
        }

        /* INTERACT FAULT MODAL NOTIFIER */
        .system-error-shield {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2,2,8,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: monospace;
            text-align: center;
            padding: 20px;
        }
        
        .error-box {
            border: 1px solid var(--glow-ruby);
            padding: 30px;
            border-radius: 12px;
            background: rgba(20, 5, 5, 0.8);
            max-width: 450px;
            box-shadow: 0 0 30px rgba(255,51,85,0.2);
        }

        /* SYSTEM RESPONSIVE MEDIA QUERIES */
        @media (max-width: 768px) {
            .hud-diagnostic-monitor {
                top: calc(env(safe-area-inset-top, 0px) + 15px);
                left: 15px;
                right: 15px;
                padding: 12px 18px;
            }
            .glassmorphic-input-bar {
                width: 95%;
                padding: 4px 14px;
            }
            input[type="text"] {
                height: 46px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="dynamic-sky"></div>
    <div class="weather-fog-overlay" id="environmental-overlay"></div>

    <div class="hud-diagnostic-monitor" id="hud-monitor-node">
        <div class="status-header-container">
            <span class="pulse-core-node" id="status-glow-indicator"></span>
            <span id="system-status-string">PRIYA_AI // PLATFORM CORRELATION ENGINE v11.0</span>
        </div>
        <div id="sub-diagnostic-label" class="telemetry-metrics">INITIALIZING PARALLEL MULTI-THREAD GRAPHICS VECTOR MAPS...</div>
        <div id="weather-runtime-telemetry">📡 CHRONOS-SYSTEM: COMPUTING TARGET TIMEFRAME MATRIX</div>
    </div>

    <video id="webcam-feed-buffer" autoplay playsinline muted></video>
    
    <div id="canvas-viewport"></div>

    <div class="interaction-control-dock">
        <div class="glassmorphic-input-bar">
            <button class="action-trigger-btn" id="webcam-toggle-node" title="Face Track Camera Mode" aria-label="Toggle Webcam tracking">📷</button>
            <button class="action-trigger-btn" id="mic-activation-node" title="Voice Stream Command Link" aria-label="Toggle Microphone channel">🎤</button>
            <input type="text" id="user-input-field" placeholder="प्रिया से बात करें या स्क्रीन पर कहीं भी टच करें..." autocomplete="off" spellcheck="false">
            <button class="action-trigger-btn" id="transmit-payload-btn" style="color: #ffffff; font-size: 20px;" title="Transmit Payload Vector" aria-label="Send text packet">➔</button>
        </div>
    </div>

    <div class="system-error-shield" id="error-fallback-shield">
        <div class="error-box">
            <h3 style="color:var(--glow-ruby); margin-bottom:10px;">⚠️ CORE LOAD FAILURE</h3>
            <p id="error-log-string" style="font-size:12px; color:rgba(255,255,255,0.7);">WebGL acceleration dropped or model data array corrupted during stream negotiation.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="script.js"></script>
</body>
</html>
