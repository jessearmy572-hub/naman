<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priya AI - nv1 Engine v5.0 (Separate Grid)</title>
    
    <style>
        :root {
            --glow: #00f2ff;
            --panel: rgba(8, 8, 12, 0.88);
            --border: rgba(0, 242, 255, 0.25);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #020205;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased; user-select: none;
        }

        /* GPU Accelerated Cinematic Background */
        .makkhan-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=90') no-repeat center center;
            background-size: cover; z-index: 1;
            filter: brightness(0.6) contrast(1.15);
            will-change: transform;
            transform: translate3d(0, 0, 0); /* Forces Hardware Acceleration */
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(2,2,5,0.7) 100%);
            z-index: 2; pointer-events: none;
        }

        #canvas-viewport {
            width: 100%; height: 100%; position: absolute; z-index: 3;
            touch-action: none; outline: none;
        }

        /* HUD Diagnostics Panel */
        .hud-monitor {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: var(--panel); padding: 12px 20px; border-radius: 14px;
            border: 1px solid var(--border); border-left: 4px solid var(--glow);
            color: #ffffff; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .status-container { display: flex; align-items: center; font-size: 13px; font-weight: bold; }
        .pulse-dot {
            width: 9px; height: 9px; background: var(--glow); border-radius: 50%;
            display: inline-block; margin-right: 10px; box-shadow: 0 0 8px var(--glow);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .metrics { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 5px; text-transform: uppercase; }

        /* Smooth Input Dock User Interface */
        .control-dock {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .glass-bar {
            background: var(--panel); border: 1px solid var(--border);
            width: 90%; max-width: 520px; display: flex; align-items: center;
            padding: 6px 18px; border-radius: 50px; backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            pointer-events: auto; transition: border-color 0.3s ease;
        }
        .glass-bar:focus-within { border-color: var(--glow); }
        input[type="text"] { flex: 1; background: none; border: none; color: #fff; height: 45px; font-size: 16px; outline: none; padding: 0 8px; }
        input::placeholder { color: rgba(255, 255, 255, 0.35); }
        .btn-trigger { background: none; border: none; color: var(--glow); font-size: 22px; cursor: pointer; padding: 6px; display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="makkhan-bg"></div>
    <div class="overlay"></div>

    <div class="hud-monitor">
        <div class="status-container"><span class="pulse-dot"></span><span id="sys-status">nv1 CORE: BOOTING</span></div>
        <div id="sub-label" class="metrics">MODULE LINKAGE: CONNECTING JS</div>
    </div>

    <div id="canvas-viewport"></div>

    <div class="control-dock">
        <div class="glass-bar">
            <button class="btn-trigger" id="mic">🎤</button>
            <input type="text" id="in" placeholder="प्रिया से बात करें...">
            <button class="btn-trigger" id="send" style="color: #fff;">➔</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="script.js"></script>
</body>
</html>
