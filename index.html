<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Final Production Suite</title>
    <style>
        /* CSS Wahi rahega jo tumne bheja tha, bas video-bg ko scene ke liye hide kar rahe hain */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #video-bg { display: none; } /* Scene handle karega */
        .ui-dock-wrapper { position: absolute; bottom: 50px; width: 100%; z-index: 10; display: flex; justify-content: center; }
        /* Baaki styles tumhare code se */
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <video id="video-bg" loop muted playsinline crossorigin="anonymous" src="https://github.com/jessearmy572-hub/naman/raw/refs/heads/main/Dream_Screen_22May2026_20_15_02.mp4"></video>
    <div id="canvas-container"></div>
    <div class="ui-dock-wrapper">
        </div>

    <script>
        // Init Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Background Video Logic
        const video = document.getElementById('video-bg');
        video.play();
        const videoTexture = new THREE.VideoTexture(video);
        scene.background = videoTexture;

        // Model Loader
        const loader = new THREE.GLTFLoader();
        loader.load('https://github.com/jessearmy572-hub/naman/raw/refs/heads/main/model.glb', (gltf) => {
            scene.add(gltf.scene);
        });

        // Lighting
        const light = new THREE.AmbientLight(0xffffff, 2);
        scene.add(light);

        camera.position.z = 2;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
