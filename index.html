<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priya AI - Weather & Time Matrix v7.0</title>
    
    <style>
        :root {
            --glow: #00f2ff;
            --panel: rgba(10, 10, 18, 0.85);
            --border: rgba(0, 242, 255, 0.25);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #05050a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased; user-select: none;
        }

        /* Dynamic Visual Background Layer */
        #dynamic-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; transition: background 2s ease-in-out, filter 2s ease-in-out;
            background-size: cover; background-position: center;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.6) 100%);
            z-index: 2; pointer-events: none;
        }

        #canvas-viewport {
            width: 100%; height: 100%; position: absolute; z-index: 3;
            touch-action: none; outline: none;
        }

        /* HUD Diagnostics Monitor */
        .hud-monitor {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: var(--panel); padding: 14px 24px; border-radius: 16px;
            border: 1px solid var(--border); border-left: 5px solid var(--glow);
            color: #ffffff; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
        }

        .status-container { display: flex; align-items: center; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }
        .pulse-node {
            width: 8px; height: 8px; background: var(--glow); border-radius: 50%;
            display: inline-block; margin-right: 12px; box-shadow: 0 0 10px var(--glow);
            animation: heartbeat 2s infinite ease-in-out;
        }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.4; } }
        .metrics { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 6px; font-family: monospace; text-transform: uppercase; }
        #weather-info { color: #ffcc00; font-weight: bold; margin-top: 4px; font-size: 11px; }

        /* Glassmorphic Control Dock */
        .control-dock {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .glass-bar {
            background: var(--panel); border: 1px solid var(--border);
            width: 90%; max-width: 540px; display: flex; align-items: center;
            padding: 8px 20px; border-radius: 50px; backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            pointer-events: auto; transition: border-color 0.4s ease;
        }
        .glass-bar:focus-within { border-color: var(--glow); }
        input[type="text"] { flex: 1; background: none; border: none; color: #fff; height: 48px; font-size: 16px; outline: none; padding: 0 10px; }
        input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .btn-trigger { background: none; border: none; color: var(--glow); font-size: 24px; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .btn-trigger:active { transform: scale(0.9); }
        
        #webcam-feed { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div class="overlay"></div>

    <div class="hud-monitor">
        <div class="status-container"><span class="pulse-node" id="status-glow"></span><span id="sys-status">PRIYA_AI // STARTING</span></div>
        <div id="sub-label" class="metrics">INITIALIZING SIMULATION ENVIRONMENT...</div>
        <div id="weather-info">🌤️ WEATHER CLOCK: SYNCHRONIZING...</div>
    </div>

    <video id="webcam-feed" autoplay playsinline muted></video>
    <div id="canvas-viewport"></div>

    <div class="control-dock">
        <div class="glass-bar">
            <button class="btn-trigger" id="webcam-toggle" title="Cam Tracking" style="margin-right: 8px; font-size: 20px;">📷</button>
            <button class="btn-trigger" id="mic" title="Voice Input">🎤</button>
            <input type="text" id="in" placeholder="प्रिया से बात करें या मौसम बदलने को कहें...">
            <button class="btn-trigger" id="send" style="color: #fff;" title="Send">➔</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="script.js"></script>
</body>
</html>
