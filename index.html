<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Priya AI - Ultimate nv1 Pro Commando Engine Suite</title>
    
    <style>
        /* ==========================================================================
          MODULE 1: MASTER HARDWARE CONFIGURATION & GLOBAL DESIGN TOKENS
          ========================================================================== */
        :root {
            --neon-cyan: #00ffcc;
            --neon-blue: #0099ff;
            --neon-pink: #ff416c;
            --neon-orange: #ff4b2b;
            --neon-purple: #9d4edd;
            --neon-matrix-glow: rgba(0, 255, 204, 0.45);
            --neon-blue-glow: rgba(0, 153, 255, 0.35);
            --neon-pink-glow: rgba(255, 65, 108, 0.35);
            
            --bg-absolute-black: #010103;
            --bg-core-dark-matte: #05050a;
            --bg-glass-panel: rgba(5, 5, 12, 0.82);
            --bg-glass-card: rgba(8, 8, 20, 0.65);
            --bg-input-field: rgba(3, 3, 7, 0.94);
            
            --border-glow-cyan: rgba(0, 255, 204, 0.40);
            --border-glow-blue: rgba(0, 153, 255, 0.25);
            --border-matte-white: rgba(255, 255, 255, 0.16);
            --border-thick-glass: rgba(255, 255, 255, 0.08);
            
            --text-core-white: #ffffff;
            --text-ambient-silver: #e2e8f0;
            --text-dim-slate: rgba(255, 255, 255, 0.65);
            --text-dark-shadow: rgba(0, 0, 0, 0.95);
            
            --transition-tactile: all 0.38s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-elastic: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fluid-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            
            --font-stack-cyber: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        }

        /* ==========================================================================
          MODULE 2: FULL-SCREEN APPLICATION INITIALIZATION MATRIX & STACK RESETS
          ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-absolute-black);
            font-family: var(--font-stack-cyber);
            color: var(--text-core-white);
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        #image-bg {
            position: absolute;
            top: -12%; 
            left: -12%;
            width: 124%;
            height: 124%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            filter: brightness(0.42) contrast(1.22) saturate(0.92);
            will-change: transform;
            transform: translate3d(0,0,0);
            transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .matrix-grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            pointer-events: none;
            opacity: 0.85;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            cursor: grab;
            display: block;
            background: transparent !important;
            transform: translateZ(0);
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* ==========================================================================
          MODULE 3: DYNAMIC HOLOGRAPHIC TELEMETRY HUD MONITOR PANEL
          ========================================================================== */
        .dashboard {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            background: var(--bg-glass-panel);
            padding: 18px 28px;
            border-radius: 24px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-matte-white);
            box-shadow: 0 25px 55px rgba(0,0,0,0.9), inset 0 1px 3px rgba(255,255,255,0.18);
            pointer-events: auto;
            transform: translateZ(0);
            will-change: transform, opacity;
            animation: HUD_Entry_Slide_Down 0.95s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .status-block {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-beacon-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 16px;
            box-shadow: 0 0 15px var(--neon-cyan), 0 0 35px var(--neon-cyan);
            will-change: opacity, box-shadow;
            animation: HUD_Beacon_Pulse 2.5s infinite ease-in-out;
        }

        .status-title {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,204,0.45);
            color: var(--text-core-white);
        }

        .channel-info {
            font-size: 13px;
            color: var(--text-dim-slate);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .channel-active-value {
            color: var(--neon-cyan);
            font-weight: 700;
            transition: var(--transition-tactile);
        }

        /* ==========================================================================
          MODULE 4: BOTTOM CONSOLE INTERACTION COMMAND INTERFACE DOCK
          ========================================================================== */
        .ui-dock-wrapper {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            z-index: 20;
            padding: 0 40px;
            box-sizing: border-box;
            transform: translateZ(0);
            will-change: transform, opacity;
            animation: HUD_Dock_Slide_Up 1.05s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .input-carrier-box {
            background: var(--bg-input-field);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            padding: 0 35px;
            border-radius: 45px;
            flex-grow: 1;
            max-width: 750px;
            height: 70px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 30px 65px rgba(0,0,0,0.9);
            transition: var(--transition-tactile);
            transform: translateZ(0);
            will-change: border-color, box-shadow, transform;
        }

        .input-carrier-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.35), 0 30px 65px rgba(0,0,0,0.95);
            transform: translateY(-4px);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-core-white);
            outline: none;
            font-size: 18px;
            height: 100%;
            letter-spacing: 0.6px;
            font-weight: 500;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            transition: color 0.3s ease;
        }

        input:focus::placeholder {
            color: rgba(255, 255, 255, 0.18);
        }

        .action-circle-btn {
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-tactile);
            transform: translateZ(0);
            will-change: transform, box-shadow, background;
        }

        .mic-trigger-btn {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #ffffff;
            font-size: 26px;
            box-shadow: 0 12px 28px rgba(255, 75, 43, 0.42);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .mic-trigger-btn:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 16px 40px rgba(255, 75, 43, 0.55);
        }

        .mic-trigger-btn.listening {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 20px var(--neon-blue);
            animation: UI_Active_Pulse 1.5s infinite alternate ease-in-out;
        }

        .send-trigger-btn {
            background: #ffffff;
            color: #010103;
            font-size: 24px;
            box-shadow: 0 12px 28px rgba(255,255,255,0.18);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .send-trigger-btn:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 16px 40px rgba(255,255,255,0.32);
            background: #f4f5f7;
        }

        /* ==========================================================================
          MODULE 5: HIGH ACCURACY MONITOR REALTIME RESPONSE SUBTITLE BOX
          ========================================================================= */
        #subtitle-monitor-box {
            position: absolute;
            bottom: 155px;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            background: rgba(4, 4, 12, 0.96);
            padding: 18px 36px;
            border-radius: 26px;
            color: var(--text-core-white);
            font-size: 17px;
            max-width: 80%;
            width: auto;
            min-width: 260px;
            text-align: center;
            z-index: 30;
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 55px rgba(0,0,0,0.95);
            display: none;
            pointer-events: none;
            line-height: 1.65;
            font-weight: 500;
            letter-spacing: 0.3px;
            will-change: transform, opacity;
            animation: UI_PopUp_Subtitle 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* ==========================================================================
          MODULE 6: RESILIENT CORE SAFETY BLOCK DISMISSABLE ANTI-HANG VEIL LOADER
          ========================================================================== */
        #core-boot-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 6, 0.90); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.25, 1), visibility 0.7s ease;
            will-change: opacity, visibility;
        }

        .loader-ring-spinner {
            width: 76px;
            height: 76px;
            border: 4px solid rgba(0, 255, 204, 0.06);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-blue);
            animation: System_Engine_Spin 1.2s linear infinite;
            margin-bottom: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.25);
        }

        .loader-label-text {
            color: var(--neon-cyan);
            font-size: 19px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-matrix-glow);
            font-weight: 600;
            text-align: center;
            padding: 0 30px;
            line-height: 1.5;
        }

        /* ==========================================================================
          MODULE 7: MASTER ANIMATION MATRIX KEYFRAMES REGISTER
          ========================================================================== */
        @keyframes System_Engine_Spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        @keyframes HUD_Beacon_Pulse { 
            0%, 100% { opacity: 0.50; box-shadow: 0 0 12px rgba(0,255,204,0.2); } 
            50% { opacity: 1; box-shadow: 0 0 28px var(--neon-cyan), 0 0 50px var(--neon-cyan); } 
        }
        @keyframes UI_Active_Pulse { 
            0% { transform: scale(1); } 
            100% { transform: scale(1.08); } 
        }
        @keyframes HUD_Entry_Slide_Down { 
            from { opacity: 0; transform: translateY(-30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes HUD_Dock_Slide_Up { 
            from { opacity: 0; transform: translateY(35px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes UI_PopUp_Subtitle { 
            from { opacity: 0; transform: translateX(-50%) translateY(20px); } 
            to { opacity: 1; transform: translateX(-50%) translateY(0); } 
        }

        /* Responsive Breakpoint Matrix View Adaptations Mapping Layouts Grid */
        @media (max-width: 768px) {
            .dashboard { top: 20px; left: 20px; padding: 14px 22px; }
            .status-title { font-size: 13px; letter-spacing: 1.5px; }
            .channel-info { font-size: 11px; }
            .ui-dock-wrapper { bottom: 30px; padding: 0 20px; gap: 12px; }
            .input-carrier-box { height: 62px; padding: 0 24px; }
            input { font-size: 16px; }
            .action-circle-btn { width: 62px; height: 62px; font-size: 21px; }
            #subtitle-monitor-box { bottom: 115px; font-size: 15px; padding: 14px 28px; }
            .loader-ring-spinner { width: 64px; height: 64px; }
            .loader-label-text { font-size: 16px; letter-spacing: 2px; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop" id="image-bg" alt="Commando Background Matrix Grid Scenery Wallpaper">
    <div class="matrix-grid-overlay"></div>

    <div class="dashboard">
        <div class="status-block">
            <span class="status-beacon-dot"></span> 
            <span class="status-title">सिस्टम कोर: <span id="system-core-mood-txt" style="color:var(--neon-cyan);">जेमिनी nv1 लाइव डायरेक्ट ⚡</span></span>
        </div>
        <div class="channel-info">सक्रिय चैनल स्थिति: <span id="active-secure-channel-status" class="channel-active-value">Core-1 (Active Secure Key)</span></div>
    </div>

    <div id="core-boot-loader">
        <div class="loader-ring-spinner"></div>
        <div class="loader-label-text">प्रिया का न्यूरल माइंड लोड हो रहा है...<br><span style="font-size: 13px; color: var(--text-dim-slate); letter-spacing: 1px; text-transform: none;">कृपया प्रतीक्षा करें, 3D इंजन कैलिब्रेट हो रहा है</span></div>
    </div>

    <div id="canvas-container"></div>

    <div id="subtitle-monitor-box">प्रिया बोल रही है...</div>

    <div class="ui-dock-wrapper">
        <button class="action-circle-btn mic-trigger-btn" id="micBtn" title="वॉइस कमांड चालू करें">🎤</button>
        <div class="input-carrier-box">
            <input type="text" id="userInput" placeholder="प्रिया से कुछ भी पूछें, सीधे लाइव जवाब आएगा..." autocomplete="off" spellcheck="false"/>
        </div>
        <button class="action-circle-btn send-trigger-btn" id="sendBtn" title="कमांड भेजें">➔</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
