<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Priya AI - Ultimate nv1 Pro Commando Engine Suite</title>
    
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-blue: #0099ff;
            --neon-pink: #ff416c;
            --neon-orange: #ff4b2b;
            --neon-purple: #9d4edd;
            --neon-matrix-glow: rgba(0, 255, 204, 0.45);
            --neon-blue-glow: rgba(0, 153, 255, 0.35);
            --neon-pink-glow: rgba(255, 65, 108, 0.35);
            
            --bg-absolute-black: #010103;
            --bg-core-dark-matte: #05050a;
            --bg-glass-panel: rgba(5, 5, 12, 0.82);
            --bg-glass-card: rgba(8, 8, 20, 0.65);
            --bg-input-field: rgba(3, 3, 7, 0.94);
            
            --border-glow-cyan: rgba(0, 255, 204, 0.40);
            --border-glow-blue: rgba(0, 153, 255, 0.25);
            --border-matte-white: rgba(255, 255, 255, 0.16);
            --border-thick-glass: rgba(255, 255, 255, 0.08);
            
            --text-core-white: #ffffff;
            --text-ambient-silver: #e2e8f0;
            --text-dim-slate: rgba(255, 255, 255, 0.65);
            --text-dark-shadow: rgba(0, 0, 0, 0.95);
            
            --transition-tactile: all 0.38s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-elastic: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fluid-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            
            --font-stack-cyber: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-absolute-black);
            font-family: var(--font-stack-cyber);
            color: var(--text-core-white);
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        #video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            filter: brightness(0.45) contrast(1.15) saturate(0.85);
        }

        .matrix-grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            pointer-events: none;
            opacity: 0.85;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            cursor: grab;
            display: block;
            background: transparent !important;
            transform: translateZ(0);
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #webcam-video {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 140px;
            height: 105px;
            border-radius: 18px;
            border: 2px solid var(--border-glow-cyan);
            box-shadow: 0 0 20px var(--neon-matrix-glow), 0 15px 35px rgba(0,0,0,0.8);
            z-index: 15;
            transform: scaleX(-1);
            display: none;
            object-fit: cover;
            background: var(--bg-absolute-black);
        }

        .dashboard {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            background: var(--bg-glass-panel);
            padding: 18px 28px;
            border-radius: 24px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-matte-white);
            box-shadow: 0 25px 55px rgba(0,0,0,0.9), inset 0 1px 3px rgba(255,255,255,0.18);
            pointer-events: auto;
            transform: translateZ(0);
            animation: HUD_Entry_Slide_Down 0.95s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .status-block {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-beacon-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 16px;
            box-shadow: 0 0 15px var(--neon-cyan), 0 0 35px var(--neon-cyan);
            animation: HUD_Beacon_Pulse 2.5s infinite ease-in-out;
        }

        .status-title {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,204,0.45);
            color: var(--text-core-white);
        }

        .channel-info {
            font-size: 13px;
            color: var(--text-dim-slate);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .channel-active-value {
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .ui-dock-wrapper {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            z-index: 20;
            padding: 0 40px;
            box-sizing: border-box;
            transform: translateZ(0);
            animation: HUD_Dock_Slide_Up 1.05s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .input-carrier-box {
            background: var(--bg-input-field);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            padding: 0 35px;
            border-radius: 45px;
            flex-grow: 1;
            max-width: 750px;
            height: 70px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 30px 65px rgba(0,0,0,0.9);
            transition: var(--transition-tactile);
        }

        .input-carrier-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.35), 0 30px 65px rgba(0,0,0,0.95);
            transform: translateY(-4px);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-core-white);
            outline: none;
            font-size: 18px;
            height: 100%;
            letter-spacing: 0.6px;
            font-weight: 500;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .action-circle-btn {
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-tactile);
        }

        .mic-trigger-btn {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #ffffff;
            font-size: 26px;
            box-shadow: 0 12px 28px rgba(255, 75, 43, 0.42);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .mic-trigger-btn:hover {
            transform: scale(1.08) translateY(-4px);
        }

        .mic-trigger-btn.listening {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 20px var(--neon-blue);
            animation: UI_Active_Pulse 1.5s infinite alternate ease-in-out;
        }

        .cam-tracking-btn {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #ffffff;
            font-size: 24px;
            box-shadow: 0 12px 28px rgba(0, 114, 255, 0.35);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .cam-tracking-btn:hover {
            transform: scale(1.08) translateY(-4px);
        }

        .cam-tracking-btn.tracking-active {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 0 30px rgba(56, 239, 125, 0.6);
        }

        .send-trigger-btn {
            background: #ffffff;
            color: #010103;
            font-size: 24px;
            box-shadow: 0 12px 28px rgba(255,255,255,0.18);
        }

        .send-trigger-btn:hover {
            transform: scale(1.08) translateY(-4px);
            background: #f4f5f7;
        }

        #subtitle-monitor-box {
            position: absolute;
            bottom: 155px;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            background: rgba(4, 4, 12, 0.96);
            padding: 18px 36px;
            border-radius: 26px;
            color: var(--text-core-white);
            font-size: 17px;
            max-width: 80%;
            text-align: center;
            z-index: 30;
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 55px rgba(0,0,0,0.95);
            line-height: 1.65;
            font-weight: 500;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #core-boot-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 6, 0.96); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.25, 1), visibility 0.7s ease;
        }

        .loader-ring-spinner {
            width: 76px;
            height: 76px;
            border: 4px solid rgba(0, 255, 204, 0.06);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-blue);
            animation: System_Engine_Spin 1.2s linear infinite;
            margin-bottom: 30px;
        }

        .loader-label-text {
            color: var(--neon-cyan);
            font-size: 19px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
        }

        @keyframes System_Engine_Spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes HUD_Beacon_Pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; box-shadow: 0 0 28px var(--neon-cyan); } }
        @keyframes UI_Active_Pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
        @keyframes HUD_Entry_Slide_Down { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes HUD_Dock_Slide_Up { from { opacity: 0; transform: translateY(35px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .dashboard { top: 20px; left: 20px; padding: 14px 22px; }
            .ui-dock-wrapper { bottom: 30px; padding: 0 20px; gap: 12px; }
            .input-carrier-box { height: 62px; padding: 0 24px; }
            .action-circle-btn { width: 62px; height: 62px; font-size: 21px; }
            #subtitle-monitor-box { bottom: 115px; font-size: 15px; }
            #webcam-video { width: 100px; height: 75px; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="video-bg" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-beautiful-waterfall-in-a-lush-green-forest-43187-large.mp4" type="video/mp4">
    </video>

    <video id="webcam-video" autoplay playsinline></video>
    <div class="matrix-grid-overlay"></div>

    <div class="dashboard">
        <div class="status-block">
            <span class="status-beacon-dot"></span> 
            <span class="status-title">सिस्टम कोर: <span id="system-core-mood-txt" style="color:var(--neon-cyan);">जेमिनी nv1 लाइव डायरेक्ट ⚡</span></span>
        </div>
        <div class="channel-info">सक्रिय चैनल स्थिति: <span id="active-secure-channel-status" class="channel-active-value">Core-1 (Active Secure Key)</span></div>

    <div id="core-boot-loader">

    <div id="canvas-container"></div>

    <div class="ui-dock-wrapper">
        <button class="action-circle-btn mic-trigger-btn" id="micBtn" title="वॉइस कमांड चालू करें">🎤</button>
        <button class="action-circle-btn cam-tracking-btn" id="toggle-cam-btn" title="AI कैमरा ट्रैकिंग टोगल करें">📷</button>
        <div class="input-carrier-box">
            <input type="text" id="userInput" placeholder="प्रिया से कुछ भी पूछें, सीधे लाइव जवाब आएगा..." autocomplete="off" spellcheck="false"/>
        </div>
        <button class="action-circle-btn send-trigger-btn" id="sendBtn" title="कमांड भेजें">➔</button>
    </div>

    <script>
        const PriyaAIApp = (function () {
            "use strict";

            // State & Configurations Register
            const CONFIG = {
                apiKeys: [
                    "AIzaSyBgyADY-6VFaLefYi8PaGak_L8kpfpGDA0", 
                    "AIzaSyBSaw3teN0aoDb2qdzuYktqUZ08sUOIv5o", 
                    "AIzaSyA5W8VWVMSltHGU6vvVlLaxAo3H0h0H1ig"
                ],
                modelUri: 'https://models.readyplayer.me/64b533e4da90ef1aa856bfda.glb',
                elevenLabsKey: "",
                voiceId: "21m00Tcm4TlvDq8ikWAM",
                typewriterSpeed: 45
            };

            const state = {
                keyIndex: 0,
                memory: null,
                scene: null, camera: null, renderer: null, controls: null, mixer: null, clock: null,
                avatar: null, headBone: null, neckBone: null,
                skinnedMeshes: [], animations: [], currentAction: null,
                vocalActive: false, speechActive: false, camTrackingActive: false,
                targetMouse: { x: 0, y: 0 }, interpMouse: { x: 0, y: 0 },
                targetHead: { x: 0, y: 0 }, currentHead: { x: 0, y: 0 },
                touchOverrideTimer: 0.0,
                audioCtx: null, analyser: null, audioData: null, speechVolume: 0,
                weatherParticles: null, recognition: null, typewriterInterval: null,
                isProcessing: false
            };

            // ==========================================
            // SUB-MODULE A: STORAGE & MEMORY CONTROL
            // ==========================================
            function initMemory() {
                try {
                    state.memory = JSON.parse(localStorage.getItem('priya_nv1_memory')) || {
                        userName: "दोस्त",
                        userCustomOutfitColor: 0xffffff,
                        conversationCount: 0,
                        lastInteractionTimestamp: null
                    };
                } catch (e) {
                    console.error("Memory parsing error, resetting context:", e);
                    state.memory = { userName: "दोस्त", userCustomOutfitColor: 0xffffff, conversationCount: 0, lastInteractionTimestamp: null };
                }
            }

            function saveMemory() {
                localStorage.setItem('priya_nv1_memory', JSON.stringify(state.memory));
            }

            // ==========================================
            // SUB-MODULE B: GATEWAY & ROUTING SYSTEM
            // ==========================================
            async function getAIResponse(query) {
                const instructions = `
                Zero Robotics Rule Matrix Implementation:
                1. SECURITY: Never state "I am an AI", "As a language model". You are Priya, a sweet, affectionate human girl living inside this digital suite.
                2. EMOTION: Track user sentiment. If angry, become calm and slightly defensive. If happy, be highly enthusiastic, energetic, and bubbly.
                3. GAP LOGIC: Seamlessly use normal human fillers like: "Hmm...", "Uhh, ek minute...", "Wese...", "Yaar, mujhe lagta hai...".
                4. MICRO-ACTIONS: Start every response with expression tags inside brackets. Example: [Palkein jhapkate hue aur halka muskurate hue] "Haan, ye baat sahi hai!".
                5. OPINIONATED: Express unique preferences. Don't passively agree. Use smart wit and playful sarcasm.
                6. BREVITY: Max 2 to 3 sentences. Converse strictly in modern sweet Hinglish. No markdown tags, asterisks, or hashes.
                `;

                let currentKey = CONFIG.apiKeys[state.keyIndex];
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`;

                try {
                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: `Directives:\n${instructions}\n\nUser Profile: Name is ${state.memory.userName}.\nQuery: ${query}` }] }],
                            generationConfig: { maxOutputTokens: 160, temperature: 0.78, topP: 0.95 }
                        })
                    });

                    if (!response.ok) throw new Error("API Key Exhausted or Faulty Endpoint Container Mapping.");
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text.replace(/[*#`_\-]/g, '').trim();

                } catch (error) {
                    console.warn(`Routing error on Node Channel Index ${state.keyIndex}. Rotating channels...`);
                    state.keyIndex = (state.keyIndex + 1) % CONFIG.apiKeys.length;
                    
                    const channelLabel = document.getElementById('active-secure-channel-status');
                    if(channelLabel) channelLabel.innerText = `Core-${state.keyIndex + 1} (Active Secure Key)`;
                    
                    if (state.keyIndex !== 0) return await getAIResponse(query);
                    return "[Halka sa udas hote hue] Hmm... Lagta है network thoda slow hai dear, par main yahi hun tumhare paas.";
                }
            }

            // ==========================================
            // SUB-MODULE C: 3D GRAPHICS ENGINE (THREE.JS)
            // ==========================================
            function initGraphics() {
                const container = document.getElementById('canvas-container');
                state.clock = new THREE.Clock();
                state.scene = new THREE.Scene();

                state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
                state.renderer.setSize(window.innerWidth, window.innerHeight);
                state.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                state.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                state.renderer.toneMappingExposure = 1.3;
                state.renderer.shadowMap.enabled = true;
                container.appendChild(state.renderer.domElement);

                // Exact Face Coordinates Focusing Setup
                state.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                state.camera.position.set(0, 1.45, 0.55);

                state.controls = new THREE.OrbitControls(state.camera, state.renderer.domElement);
                state.controls.enableZoom = true;
                state.controls.enablePan = false;
                state.controls.minDistance = 0.3;
                state.controls.maxDistance = 2.0;
                state.controls.target.set(0, 1.42, 0); // Locked strictly on RPM Face Center
                state.controls.enableDamping = true;
                state.controls.dampingFactor = 0.05;

                // Enhanced Volumetric Illumination System
                const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.0);
                state.scene.add(hemiLight);

                const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.0);
                dirLight1.position.set(2, 4, 3);
                state.scene.add(dirLight1);

                const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.0);
                dirLight2.position.set(-2, 2, 2);
                state.scene.add(dirLight2);

                loadAvatarModel();
                
                window.addEventListener('resize', handleResize);
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('pointerdown', handleMeshTouch);
            }

            function loadAvatarModel() {
                const loader = new THREE.GLTFLoader();
                const loadingText = document.getElementById('loading-text');

                loader.load(CONFIG.modelUri, (gltf) => {
                    state.avatar = gltf.scene;
                    state.scene.add(state.avatar);
                    
                    state.avatar.scale.setScalar(1.0);
                    state.avatar.position.set(0, 0, 0);

                    state.avatar.traverse((node) => {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                        if (node.isSkinnedMesh) state.skinnedMeshes.push(node);
                        if (node.isBone) {
                            const nameLower = node.name.toLowerCase();
                            if (nameLower === 'head') state.headBone = node;
                            if (nameLower === 'neck') state.neckBone = node;
                        }
                    });

                    state.animations = gltf.animations;
                    state.mixer = new THREE.AnimationMixer(state.avatar);
                    
                    if (state.animations.length > 0) {
                        state.currentAction = state.mixer.clipAction(state.animations[0]);
                        state.currentAction.setEffectiveWeight(1.0).play();
                    }

                    if (state.memory.userCustomOutfitColor !== 0xffffff) {
                        applyOutfitColor(state.memory.userCustomOutfitColor);
                    }

                    syncMemoryGreetings();
                    dismissLoader();

                }, (xhr) => {
                    if (xhr.total > 0 && loadingText) {
                        let pct = Math.round((xhr.loaded / xhr.total) * 100);
                        loadingText.innerHTML = `प्रिया को तैयार किया जा रहा है... ${pct}%<br><span style="font-size:12px;color:var(--neon-cyan);">3D एसेट्स डाउनलोड हो रहे हैं</span>`;
                    }
                }, (err) => {
                    console.error("Asset Loader Critical Fault Chain:", err);
                    dismissLoader();
                });
            }

            function handleResize() {
                if (!state.camera || !state.renderer) return;
                state.camera.aspect = window.innerWidth / window.innerHeight;
                state.camera.updateProjectionMatrix();
                state.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function handleMouseMove(e) {
                state.targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                state.targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }

            // ==========================================
            // SUB-MODULE D: DYNAMIC EXPRESSIONS & MORPHS
            // ==========================================
            function setMorphWeight(sentiment) {
                state.skinnedMeshes.forEach(mesh => {
                    const dict = mesh.morphTargetDictionary;
                    const influences = mesh.morphTargetInfluences;
                    if (!dict || !influences) return;

                    const clearTargets = ["mouthSmileLeft", "mouthSmileRight", "browDownLeft", "browDownRight", "browInnerUp"];
                    clearTargets.forEach(k => {
                        let idx = dict[k];
                        if (idx !== undefined) influences[idx] = 0;
                    });

                    if (sentiment === "happy" || sentiment === "joy") {
                        if (dict["mouthSmileLeft"] !== undefined) influences[dict["mouthSmileLeft"]] = 0.85;
                        if (dict["mouthSmileRight"] !== undefined) influences[dict["mouthSmileRight"]] = 0.85;
                    } else if (sentiment === "sad" || sentiment === "sorry") {
                        if (dict["browDownLeft"] !== undefined) influences[dict["browDownLeft"]] = 0.75;
                        if (dict["browDownRight"] !== undefined) influences[dict["browDownRight"]] = 0.75;
                    } else if (sentiment === "shy") {
                        if (dict["browInnerUp"] !== undefined) influences[dict["browInnerUp"]] = 0.65;
                        if (dict["mouthSmileLeft"] !== undefined) influences[dict["mouthSmileLeft"]] = 0.45;
                    }
                });
            }

            function playGesture(actionWord) {
                if (!state.mixer || state.animations.length === 0) return;
                const token = actionWord.toLowerCase();
                let clipIdx = 0;

                if (token.includes('muskurate') || token.includes('smile') || token.includes('sharmate')) {
                    clipIdx = Math.min(1, state.animations.length - 1);
                    setMorphWeight("shy");
                } else if (token.includes('udas') || token.includes('sad')) {
                    clipIdx = Math.min(2, state.animations.length - 1);
                    setMorphWeight("sad");
                } else if (token.includes('khush') || token.includes('happy')) {
                    clipIdx = Math.min(3, state.animations.length - 1);
                    setMorphWeight("happy");
                } else {
                    clipIdx = Math.floor(Math.random() * Math.min(state.animations.length, 2));
                }

                try {
                    state.mixer.stopAllAction();
                    let nextAction = state.mixer.clipAction(state.animations[clipIdx]);
                    nextAction.reset().setEffectiveWeight(1.0).fadeIn(0.35).play();
                } catch (e) {
                    console.error("Animation execution layer fault bypass:", e);
                }
            }

            // ==========================================
            // SUB-MODULE E: TEXT TO SPEECH & AUDIO ANALYSER
            // ==========================================
            function initAudio() {
                if (state.audioCtx) return;
                try {
                    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    state.analyser = state.audioCtx.createAnalyser();
                    state.analyser.fftSize = 128;
                    state.audioData = new Uint8Array(state.analyser.frequencyBinCount);
                } catch(e) {
                    console.error("Audio Pipeline Context Fault Engine Blocking:", e);
                }
            }

            function speakVoice(textPayload) {
                if (!window.speechSynthesis) return;
                initAudio();
                
                if (state.audioCtx && state.audioCtx.state === 'suspended') {
                    state.audioCtx.resume();
                }
                window.speechSynthesis.cancel();
                
                let cleanString = textPayload.replace(/\[.*?\]/g, '').trim();
                executeNativeTTS(cleanString);
            }

            function executeNativeTTS(cleanString) {
                let utterance = new SpeechSynthesisUtterance(cleanString);
                utterance.lang = 'hi-IN';
                utterance.rate = 1.0;
                utterance.pitch = 1.05;

                utterance.onstart = () => { state.vocalActive = true; };
                utterance.onend = () => { state.vocalActive = false; state.speechVolume = 0; };
                utterance.onerror = () => { state.vocalActive = false; };

                window.speechSynthesis.speak(utterance);
            }

            // ==========================================
            // SUB-MODULE F: CORE RENDERING TICK LOOP
            // ==========================================
            function runRenderLoop() {
                requestAnimationFrame(runRenderLoop);
                if (!state.clock || !state.renderer || !state.scene || !state.camera) return;

                const delta = state.clock.getDelta();
                const elapsed = state.clock.getElapsedTime();

                if (state.mixer) state.mixer.update(delta);
                if (state.controls) state.controls.update();

                // Speech Volume Processing for Morph Sync
                if (state.vocalActive && state.analyser) {
                    state.analyser.getByteFrequencyData(state.audioData);
                    let sum = 0;
                    for (let i = 0; i < state.audioData.length; i++) { sum += state.audioData[i]; }
                    state.speechVolume = sum / state.audioData.length;
                }

                // Eye Blinking & Lip Sync Realtime Calculations
                if (state.avatar) {
                    let blinkScale = Math.sin(elapsed * 3.2);

                    state.skinnedMeshes.forEach(mesh => {
                        const dict = mesh.morphTargetDictionary;
                        const influences = mesh.morphTargetInfluences;
                        if (!dict || !influences) return;

                        ['eyeBlinkLeft', 'eyeBlinkRight', 'blink', 'Blink'].forEach(k => {
                            let idx = dict[k];
                            if (idx !== undefined) influences[idx] = blinkScale > 0.97 ? (blinkScale - 0.97) * 33.3 : 0;
                        });

                        if (state.vocalActive) {
                            let visemeFactor = Math.min(state.speechVolume / 7.0, 1.1);
                            ['mouthOpen', 'jawOpen', 'Mouth_Open', 'vowel_a', 'viseme_aa'].forEach(k => {
                                let idx = dict[k];
                                if (idx !== undefined) influences[idx] = THREE.MathUtils.lerp(influences[idx], visemeFactor, 0.45);
                            });
                        } else {
                            ['mouthOpen', 'jawOpen', 'Mouth_Open', 'vowel_a', 'viseme_aa'].forEach(k => {
                                let idx = dict[k];
                                if (idx !== undefined) influences[idx] = THREE.MathUtils.lerp(influences[idx], 0, 0.3);
                            });
                        }
                    });

                    // Head Bone Rotations Mapping Tracker Matrix
                    let headJoint = state.avatar.getObjectByName("Head") || state.avatar.getObjectByName("Neck");
                    if (headJoint) {
                        if (state.camTrackingActive) {
                            state.currentHead.x += (state.targetHead.x - state.currentHead.x) * 0.12;
                            state.currentHead.y += (state.targetHead.y - state.currentHead.y) * 0.12;
                            headJoint.rotation.x = state.currentHead.x;
                            headJoint.rotation.y = state.currentHead.y;
                        } else if (state.touchOverrideTimer > 0) {
                            headJoint.rotation.y = Math.sin(elapsed * 2.5) * 0.14;
                            state.touchOverrideTimer -= delta;
                        } else {
                            state.interpMouse.x = THREE.MathUtils.lerp(state.interpMouse.x, state.targetMouse.x, 0.05);
                            state.interpMouse.y = THREE.MathUtils.lerp(state.interpMouse.y, state.targetMouse.y, 0.05);
                            headJoint.rotation.y = state.interpMouse.x * 0.22;
                            headJoint.rotation.x = -state.interpMouse.y * 0.12;
                        }
                    }
                }

                // Dynamic Weather Engine Transformations
                if (state.weatherParticles) {
                    const positions = state.weatherParticles.geometry.attributes.position.array;
                    for (let i = 1; i < positions.length; i += 3) {
                        positions[i] -= delta * 3.8;
                        if (positions[i] < 0) positions[i] = 5;
                    }
                    state.weatherParticles.geometry.attributes.position.needsUpdate = true;
                }

                state.renderer.render(state.scene, state.camera);
            }

            // ==========================================
            // SUB-MODULE G: SPEECH RECOGNITION INTERACTION
            // ==========================================
            function initSpeechRecognition() {
                const Engine = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!Engine) {
                    document.getElementById('micBtn').style.display = 'none';
                    return;
                }

                state.recognition = new Engine();
                state.recognition.continuous = false;
                state.recognition.lang = 'hi-IN';
                state.recognition.interimResults = false;
                state.recognition.maxAlternatives = 1;

                state.recognition.onstart = () => {
                    state.speechActive = true;
                    const btn = document.getElementById('micBtn');
                    if(btn) btn.classList.add('listening');
                    document.getElementById('userInput').placeholder = "कमांडो मोड एक्टिव, बोलिए sweetie...";
                };

                state.recognition.onerror = () => { resetMicUI(); };
                state.recognition.onend = () => { resetMicUI(); };
                state.recognition.onresult = (e) => {
                    const resultText = e.results[0][0].transcript;
                    const inputField = document.getElementById('userInput');
                    if(inputField) {
                        inputField.value = resultText;
                        executeLifecycleCycle();
                    }
                };

                document.getElementById('micBtn').addEventListener('click', () => {
                    if (state.speechActive) {
                        state.recognition.stop();
                    } else {
                        if(window.speechSynthesis) window.speechSynthesis.cancel();
                        state.recognition.start();
                    }
                });
            }

            function resetMicUI() {
                state.speechActive = false;
                const btn = document.getElementById('micBtn');
                if(btn) btn.classList.remove('listening');
                document.getElementById('userInput').placeholder = "प्रिया से कुछ भी पूछें...";
            }

            // ==========================================
            // SUB-MODULE H: DYNAMIC LIFECYCLE MANAGEMENT
            // ==========================================
            async function executeLifecycleCycle() {
                const inputBar = document.getElementById('userInput');
                const queryText = inputBar.value.trim();
                if (!queryText || state.isProcessing) return;

                state.isProcessing = true;
                inputBar.value = "";

                const moodTxt = document.getElementById('system-core-mood-txt');
                if (moodTxt) {
                    moodTxt.innerText = "प्रक्रिया चालू है... 🤔";
                    moodTxt.style.color = "var(--neon-orange)";
                }

                // Dynamic Outfit Wardrobe Color Shifting Logic Pipeline Interceptor Trigger
                if (/(लाल कपड़े|लाल ड्रेस|red dress)/i.test(queryText)) {
                    applyOutfitColor(0xff0000);
                    state.memory.userCustomOutfitColor = 0xff0000;
                    saveMemory();
                    presentOutput("[Palkein jhapkate hue aur halka muskurate hue] Lo sweety! Maine tumhari pasand ki red dress pehen li hai. Batao kaisi lag rahi hun?");
                    state.isProcessing = false;
                    return;
                }
                if (/(नीली ड्रेस|blue dress)/i.test(queryText)) {
                    applyOutfitColor(0x0000ff);
                    state.memory.userCustomOutfitColor = 0x0000ff;
                    saveMemory();
                    presentOutput("[Halka sa muskurate hue] Hmm... Blue colour toh mera bhi favourite hai! Dekho, naya outfit mujh par kaisa lag raha hai?");
                    state.isProcessing = false;
                    return;
                }
                if (/(हरी ड्रेस|green dress)/i.test(queryText)) {
                    applyOutfitColor(0x00ff00);
                    state.memory.userCustomOutfitColor = 0x00ff00;
                    saveMemory();
                    presentOutput("[Khush hote hue] Wow! Green colour toh nature ka rang hai na. Dekho maine naya dress change kar liya.");
                    state.isProcessing = false;
                    return;
                }
                if (/(सफेद ड्रेस|white dress)/i.test(queryText)) {
                    applyOutfitColor(0xffffff);
                    state.memory.userCustomOutfitColor = 0xffffff;
                    saveMemory();
                    presentOutput("[Muskurate hue] White outfit? Bilkul simple aur classy! Maine change kar liya hai dear.");
                    state.isProcessing = false;
                    return;
                }

                // Extract User Personalized Name Tags Interceptor Routing Matrix
                if (queryText.includes("मेरा नाम") && (queryText.includes("है") || queryText.includes("जानo"))) {
                    const words = queryText.split(" ");
                    let nameIdx = words.findIndex(w => w.includes("नाम"));
                    if (words[nameIdx + 1]) {
                        let parsedName = words[nameIdx + 1].replace(/[हैं।!.]/g, '');
                        if (parsedName.length > 1) {
                            state.memory.userName = parsedName;
                            saveMemory();
                        }
                    }
                }

                try {
                    const aiPayload = await getAIResponse(queryText);
                    if (moodTxt) {
                        moodTxt.innerText = "जेमिनी nv1 लाइव डायरेक्ट ⚡";
                        moodTxt.style.color = "var(--neon-cyan)";
                    }
                    presentOutput(aiPayload);
                } catch (err) {
                    console.error(err);
                    if (moodTxt) {
                        moodTxt.innerText = "सिस्टम रिकवरी mode ⚠️";
                        moodTxt.style.color = "var(--neon-pink)";
                    }
                    presentOutput("[Halka sa sarr jhatakte hue] Uhh, lagta hai network thoda paresan kar raha hai sweety. Ek baar fir se bolna please?");
                } finally {
                    state.isProcessing = false;
                }
            }

            function presentOutput(payload) {
                if (!payload || payload.trim() === "") return;
                
                if (state.typewriterInterval) {
                    clearInterval(state.typewriterInterval);
                    state.typewriterInterval = null;
                }

                let exprMatch = payload.match(/\[(.*?)\]/);
                if (exprMatch && exprMatch.length > 1) {
                    playGesture(exprMatch[1]);
                }

                try {
                    speakVoice(payload);
                } catch(e) { console.error("Voice output error:", e); }

                const sanitizedText = payload.replace(/\[.*?\]/g, '').trim();
                const monitor = document.getElementById('subtitle-monitor-box');
                
                if (!monitor) return;
                monitor.innerText = "";
                let ptr = 0;

                state.typewriterInterval = setInterval(() => {
                    if (ptr < sanitizedText.length) {
                        monitor.innerText += sanitizedText.charAt(ptr);
                        ptr++;
                    } else {
                        clearInterval(state.typewriterInterval);
                        state.typewriterInterval = null;
                    }
                }, CONFIG.typewriterSpeed);
            }

            function applyOutfitColor(hex) {
                state.skinnedMeshes.forEach(mesh => {
                    const name = mesh.name.toLowerCase();
                    if (name.includes('outfit') || name.includes('tops') || name.includes('bottom') || name.includes('footwear')) {
                        if (mesh.material) {
                            if (Array.isArray(mesh.material)) {
                                mesh.material.forEach(mat => { if(mat.color) mat.color.setHex(hex); });
                            } else {
                                if(mesh.material.color) mesh.material.color.setHex(hex);
                            }
                        }
                    }
                });
            }

            function handleMeshTouch(e) {
                if (!state.avatar) return;
                let normY = -(e.clientY / window.innerHeight) * 2 + 1;
                state.touchOverrideTimer = 3.5;

                if (normY > 0.35) {
                    setMorphWeight("shy");
                    presentOutput("[Palkein jhapkate hue aur sharmate hue] Umh... Tum jab mujhe aise touch karte ho na, mujhe thodi sharm aa jati hai...!");
                } else {
                    setMorphWeight("happy");
                    presentOutput("[Halka sa haste hue] Haha! Waha mat छुओ, gudhgudhi hoti hai! Batao aaj kya baatein karni hain?");
                }
            }

            function syncMemoryGreetings() {
                const today = new Date().toDateString();
                if (state.memory.lastInteractionTimestamp) {
                    if (state.memory.lastInteractionTimestamp !== today) {
                        setTimeout(() => {
                            presentOutput(`[Palkein jhapkate hue aur khush hote hue] Namaste ${state.memory.userName}! Tum kuch दिन पहले मुझसे बात करने आए थे ना? आज फिर से मिलकर बहुत खुशी हुई डियर!`);
                        }, 2500);
                    }
                } else {
                    state.memory.lastInteractionTimestamp = today;
                    saveMemory();
                }
            }

            // ==========================================
            // SUB-MODULE I: MEDIAPIPE FACE MESH TRACKING
            // ==========================================
            function initFaceMeshTracking() {
                const video = document.getElementById('webcam-video');
                video.style.display = 'block';

                const faceMesh = new FaceMesh({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
                });

                faceMesh.setOptions({
                    maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
                });

                faceMesh.onResults((results) => {
                    if (!state.camTrackingActive || !results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                    const landmarks = results.multiFaceLandmarks[0];
                    const noseTip = landmarks[4];
                    
                    state.targetHead.y = -(noseTip.x - 0.5) * 1.25;
                    state.targetHead.x = (noseTip.y - 0.5) * 0.85;
                });

                const camera = new Camera(video, {
                    onFrame: async () => {
                        if (state.camTrackingActive) await faceMesh.send({ image: video });
                    },
                    width: 320, height: 240
                });
                camera.start();
            }

            function initWeatherEngine() {
                const count = 600;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                
                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 12;
                    positions[i+1] = Math.random() * 6;
                    positions[i+2] = (Math.random() - 0.5) * 12;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({ color: 0x9be2ff, size: 0.025, transparent: true, opacity: 0.55 });
                state.weatherParticles = new THREE.Points(geometry, material);
                state.scene.add(state.weatherParticles);
            }

            function dismissLoader() {
                const loader = document.getElementById('core-boot-loader');
                if (loader) {
                    loader.style.opacity = 0;
                    setTimeout(() => { loader.style.display = 'none'; }, 650);
                }
            }

            // Public Entry Initializer API Launchpad
            return {
                boot: function () {
                    initMemory();
                    initGraphics();
                    initSpeechRecognition();
                    initWeatherEngine();
                    runRenderLoop();

                    // Event Listeners Integration Bridge Setup
                    document.getElementById('sendBtn').addEventListener('click', executeLifecycleCycle);
                    document.getElementById('userInput').addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') executeLifecycleCycle();
                    });

                    document.getElementById('toggle-cam-btn').addEventListener('click', function() {
                        state.camTrackingActive = !state.camTrackingActive;
                        this.classList.toggle('tracking-active', state.camTrackingActive);
                        if (state.camTrackingActive) {
                            initFaceMeshTracking();
                        } else {
                            document.getElementById('webcam-video').style.display = 'none';
                        }
                    });

                    setTimeout(dismissLoader, 15000); // Anti-hang safety firewall bypass guard
                }
            };
        })();

        // Global Execution Initializer
        document.addEventListener("DOMContentLoaded", () => {
            PriyaAIApp.boot();
        });
    </script>
</body>
