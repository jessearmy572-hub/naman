<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - nv2 Universal Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #image-bg { 
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; 
            object-fit: cover; z-index: 1; transition: transform 0.2s ease-out;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        .ui-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: auto; }
        .input-box { background: rgba(0,0,0,0.7); border: 1px solid #fff3; padding: 10px 20px; border-radius: 30px; display: flex; width: 80%; max-width: 400px; }
        input { background: none; border: none; color: #fff; width: 100%; outline: none; }
        .btn { background: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; margin-left: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073" id="image-bg">
<div id="canvas-container"></div>

<div class="ui-container">
    <div class="input-box"><input type="text" id="userInput" placeholder="Type here..."></div>
    <button class="btn" id="sendBtn">➔</button>
</div>

<script>
    const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb";
    let scene, camera, renderer, mixer, clock, priyaModel, headBone;
    let morphMeshes = [], isSpeaking = false, mouse = { x: 0, y: 0 };

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 2.5);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        new THREE.GLTFLoader().load(MODEL_URL, (gltf) => {
            priyaModel = gltf.scene;
            scene.add(priyaModel);
            
            mixer = new THREE.AnimationMixer(priyaModel);
            if(gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();

            priyaModel.traverse(n => {
                if (n.name.toLowerCase().includes('head')) headBone = n;
                if (n.morphTargetDictionary) {
                    morphMeshes.push(n);
                    console.log("Found Morph Targets in:", n.name, n.morphTargetDictionary);
                }
            });
            fixPos();
        });

        window.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        window.addEventListener('resize', fixPos);
    }

    function fixPos() {
        if (!priyaModel) return;
        const mobile = window.innerWidth < 768;
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        
        priyaModel.scale.setScalar(mobile ? 1.0 : 1.3);
        // पैर सीधे जमीन पर (Strict Grounding)
        priyaModel.position.y = mobile ? -0.95 : -1.25; 
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const elapsed = clock.getElapsedTime();
        if (mixer) mixer.update(dt);

        // 1. बैकग्राउंड पैरलैक्स
        document.getElementById('image-bg').style.transform = `translate(${mouse.x * 20}px, ${mouse.y * 15}px)`;

        if (priyaModel) {
            // 2. माउस फॉलो
            if (headBone) {
                headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mouse.x * 0.4, 0.1);
                headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mouse.y * 0.2, 0.1);
            }

            // 3. ब्लिंकिंग और लिप-सिंक (Dynamic Name Matching)
            let blinkVal = (Math.sin(elapsed * 4) > 0.98 || Math.sin(elapsed * 0.5) < -0.99) ? 1 : 0;
            let talkVal = isSpeaking ? Math.abs(Math.sin(elapsed * 15)) * 0.5 : 0;

            morphMeshes.forEach(m => {
                const dict = m.morphTargetDictionary;
                for (const key in dict) {
                    const lowKey = key.toLowerCase();
                    if (lowKey.includes('blink')) m.morphTargetInfluences[dict[key]] = blinkVal;
                    if (lowKey.includes('mouthopen') || lowKey.includes('jawopen') || lowKey.includes('viseme_aa')) {
                        m.morphTargetInfluences[dict[key]] = talkVal;
                    }
                }
            });
        }
        renderer.render(scene, camera);
    }

    function speak(txt) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'hi-IN';
        u.onstart = () => isSpeaking = true;
        u.onend = () => isSpeaking = false;
        window.speechSynthesis.speak(u);
    }

    document.getElementById('sendBtn').onclick = () => {
        const i = document.getElementById('userInput');
        if (i.value) { speak(i.value); i.value = ""; }
    };

    init();
    animate();
</script>
</body>
</html>
