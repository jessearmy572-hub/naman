<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priya AI - nv1 Unified Fix</title>
    <style>
        :root { --glow: #00f2ff; --panel: rgba(0, 0, 0, 0.85); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050508; font-family: 'Inter', sans-serif; }
        
        /* Level 1: Background Fix */
        #main-aura { 
            position: absolute; width: 100%; height: 100%; z-index: 1; 
            background: radial-gradient(circle at center, rgba(0,242,255,0.1) 0%, #000 80%);
        }

        #canvas-container { width: 100%; height: 100%; position: absolute; z-index: 2; touch-action: none; }

        /* HUD & Status Fix */
        .hud-top {
            position: absolute; top: 25px; left: 25px; z-index: 10;
            background: var(--panel); padding: 12px 18px; border-radius: 12px;
            border-left: 3px solid var(--glow); color: white; backdrop-filter: blur(10px);
        }
        .status-dot { width: 8px; height: 8px; background: var(--glow); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Level 3: Chat Interface Fix */
        .ui-dock {
            position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100;
        }
        .glass-input {
            background: var(--panel); border: 1px solid rgba(0,242,255,0.3);
            width: 88%; max-width: 500px; display: flex; align-items: center;
            padding: 8px 15px; border-radius: 50px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        input { flex: 1; background: none; border: none; color: white; height: 45px; font-size: 16px; outline: none; }
        .action-icon { background: none; border: none; color: var(--glow); font-size: 22px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .action-icon:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="main-aura"></div>

<div class="hud-top">
    <div><span class="status-dot"></span><b id="sys-label">nv1 CORE: ONLINE</b></div>
    <div id="sub-label" style="font-size: 10px; opacity: 0.6; margin-top: 4px;">SENSORS: STABLE</div>
</div>

<div id="canvas-container"></div>

<div class="ui-dock">
    <div class="glass-input">
        <button class="action-icon" id="micBtn">🎤</button>
        <input type="text" id="userInput" placeholder="कमांड दें या बात करें...">
        <button class="action-icon" id="sendBtn" style="color:white">➔</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb";
    let scene, camera, renderer, mixer, clock, priya, head;
    let morphs = [], isSpeaking = false, mouse = {x:0, y:0};

    // --- FIX 1: SPEECH RECOGNITION (सुनने की क्षमता) ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'hi-IN';
    recognition.continuous = false;

    // --- FIX 2: UNIFIED BRAIN (सोचने और काम करने की क्षमता) ---
    async function engine(input) {
        const text = input.toLowerCase();
        document.getElementById('sys-label').innerText = "nv1 CORE: THINKING";
        
        // Priority A: Device Control (Level 7)
        if (text.includes("battery") || text.includes("बैटरी")) {
            const b = await navigator.getBattery();
            return `आपकी बैटरी अभी ${Math.floor(b.level * 100)}% है।`;
        }
        if (text.includes("vibrate") || text.includes("वाइब्रेट")) {
            if (navigator.vibrate) navigator.vibrate(200);
            return "डिवाइस वाइब्रेशन एक्टिवेटेड।";
        }
        if (text.includes("time") || text.includes("समय")) {
            return `अभी ${new Date().toLocaleTimeString('hi-IN')} हो रहे हैं।`;
        }

        // Priority B: Social Intent (Level 9)
        if (text.match(/(kaise ho|how are you|kya haal)/)) return "मैं एकदम परफेक्ट हूँ! आप कैसे हैं?";
        if (text.match(/(kaun ho|who are you|intro)/)) return "मैं प्रिया हूँ, आपका nv1 इंटेलिजेंट अवतार।";
        
        return "जी, मैं सुन रही हूँ। क्या मैं आपके लिए कुछ और कर सकती हूँ?";
    }

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3.2);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2.0));

        new THREE.GLTFLoader().load(MODEL_URL, (gltf) => {
            priya = gltf.scene;
            scene.add(priya);
            mixer = new THREE.AnimationMixer(priya);
            if(gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();

            priya.traverse(n => {
                if (n.name.toLowerCase().includes('head')) head = n;
                if (n.morphTargetDictionary) morphs.push(n);
            });
            resize();
            speak("सिस्टम रीबूट सफल। nv1 अब पूरी तरह सक्रिय है।");
        });

        // --- FIX 3: TOUCH RESPONSE (महसूस करना) ---
        window.addEventListener('touchstart', () => {
            if(navigator.vibrate) navigator.vibrate(30);
            document.getElementById('sub-label').innerText = "SENSORS: TOUCH DETECTED";
            setTimeout(() => document.getElementById('sub-label').innerText = "SENSORS: STABLE", 2000);
        });

        window.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', resize);
    }

    function resize() {
        if (!priya) return;
        const mob = window.innerWidth < 768;
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        priya.scale.setScalar(mob ? 0.9 : 1.3);
        priya.position.y = mob ? -0.85 : -1.35;
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const el = clock.getElapsedTime();
        if (mixer) mixer.update(dt);

        if (priya) {
            // Level 4: Smooth Motion Fix
            if (head) {
                head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x * 0.45, 0.08);
                head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y * 0.2, 0.08);
            }
            
            let blink = (Math.sin(el * 4) > 0.98 || Math.sin(el * 0.5) < -0.99) ? 1 : 0;
            let talk = isSpeaking ? Math.abs(Math.sin(el * 18)) * 0.6 : 0;

            morphs.forEach(m => {
                const d = m.morphTargetDictionary;
                for (let k in d) {
                    const l = k.toLowerCase();
                    if (l.includes('blink')) m.morphTargetInfluences[d[k]] = blink;
                    if (l.includes('mouth') || l.includes('jaw') || l.includes('aa')) m.morphTargetInfluences[d[k]] = talk;
                }
            });
        }
        renderer.render(scene, camera);
    }

    // --- FIX 4: VOICE ENGINE (बोलने की क्षमता) ---
    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'hi-IN';
        u.pitch = 1.1;
        u.onstart = () => { isSpeaking = true; document.getElementById('sys-label').innerText = "nv1 CORE: SPEAKING"; };
        u.onend = () => { isSpeaking = false; document.getElementById('sys-label').innerText = "nv1 CORE: ONLINE"; };
        window.speechSynthesis.speak(u);
    }

    // Interactions
    document.getElementById('sendBtn').onclick = async () => {
        const val = document.getElementById('userInput').value;
        if(val) {
            const res = await engine(val);
            speak(res);
            document.getElementById('userInput').value = "";
        }
    };

    document.getElementById('micBtn').onclick = () => {
        recognition.start();
        document.getElementById('sys-label').innerText = "nv1 CORE: LISTENING";
    };

    recognition.onresult = async (e) => {
        const t = e.results[0][0].transcript;
        document.getElementById('userInput').value = t;
        const res = await engine(t);
        speak(res);
        document.getElementById('userInput').value = "";
    };

    init();
    animate();
</script>
</body>
</html>
