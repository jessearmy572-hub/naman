<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - 3D Device Native Assistant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- UI Styling --- */
        .ui-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            width: 85%;
            max-width: 600px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        button:hover {
            background: #ff6a00;
        }
    </style>

    <!-- Import Three.js and Dependencies via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Priya se kuch bhi puchiye (Device AI)..." />
            <button id="sendBtn">➔</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const MODEL_URL = "https://github.com/jessearmy572-hub/naman/raw/refs/heads/main/model.glb"; 

        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null;
        let mouthBone = null;
        let eyeBones = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let aiSession = null; // Gemini Nano सेशन स्टोर करने के लिए

        // --- 1. THE BRAIN (Device-Native Gemini Nano) ---
        async function initGeminiNano() {
            try {
                // चेक करें कि क्या ब्राउज़र में Built-in AI का सपोर्ट है
                if (window.ai && window.ai.createTextSession) {
                    aiSession = await window.ai.createTextSession();
                    console.log("Device-Native Gemini Nano सफलतापूर्वक एक्टिवेट हो गया है!");
                } else if (window.ai && window.ai.languageModel) {
                    // नए क्रोम अपडेट्स के लिए वैकल्पिक सिंटैक्स
                    aiSession = await window.ai.languageModel.create();
                    console.log("Device-Native Gemini Nano सक्रिय है।");
                } else {
                    console.warn("इस ब्राउज़र में window.ai (Gemini Nano) सक्षम नहीं है। फॉलबैक मोड ऑन है।");
                }
            } catch (e) {
                console.error("Gemini Nano सेशन शुरू करने में त्रुटि:", e);
            }
        }

        async function askPriya(input) {
            // सिस्टम प्रॉम्प्ट सेट करना ताकि वह प्रिया बनकर हिंदी में बात करे
            const promptContext = `You are Priya, a sweet sentient 3D AI assistant. Answer the user in short, sweet, and natural Hindi only. User says: ${input}`;

            // यदि डिवाइस में Gemini Nano उपलब्ध है
            if (aiSession) {
                try {
                    const response = await aiSession.prompt(promptContext);
                    return response;
                } catch (err) {
                    console.error("Gemini Nano एरर, फॉलबैक का उपयोग कर रहे हैं:", err);
                }
            }

            // --- ऑफ़लाइन/डिवाइस फॉलबैक (अगर window.ai काम न करे या बंद हो) ---
            if (input.toLowerCase().includes("time") || input.includes("समय") || input.includes("टाइम")) {
                return `अभी ${new Date().toLocaleTimeString()} हो रहा है।`;
            }
            if (input.toLowerCase().includes("battery") || input.includes("बैठरी")) {
                if (navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    return `आपके डिवाइस की बैटरी अभी ${Math.round(bat.level * 100)}% है।`;
                }
            }
            return "नमस्ते! मैं आपके डिवाइस का लोकल AI हूँ। कृपया अपने ब्राउज़र में Gemini Nano (window.ai) फ्लैग ऑन करें।";
        }

        // --- TTS (Text to Speech) ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            
            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; resetFace(); };
            
            window.speechSynthesis.speak(utter);
        }

        function resetFace() {
            if (mouthBone) mouthBone.scale.y = 1;
        }

        // --- 2. THE BODY (Three.js Setup) ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#000000');

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.minDistance = 2;
            controls.maxDistance = 8;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // GitHub से मॉडल लोड करना
            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                priyaModel = gltf.scene;
                scene.add(priyaModel);

                adjustModelScale();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    const idleAnim = THREE.AnimationClip.findByName(gltf.animations, 'Idle') || gltf.animations[0];
                    mixer.clipAction(idleAnim).play();
                }

                priyaModel.traverse((bone) => {
                    if (bone.isBone) {
                        if (bone.name.includes('Arm')) {
                            bone.rotation.z = bone.name.includes('Left') ? -1.4 : 1.4;
                        }
                        if (bone.name === 'Head' || bone.name === 'Neck') {
                            headBone = bone;
                        }
                        if (bone.name === 'Mouth' || bone.name === 'Jaw') {
                            mouthBone = bone;
                        }
                        if (bone.name.toLowerCase().includes('eye')) {
                            eyeBones.push(bone);
                        }
                    }
                });

            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        function adjustModelScale() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            const scaleValue = isMobile ? window.innerWidth / 350 : window.innerWidth / 800;
            priyaModel.scale.set(scaleValue, scaleValue, scaleValue);
            priyaModel.position.y = isMobile ? -1.2 : -1.5;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelScale();
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (priyaModel) {
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.5, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.3, 0.1);
                }

                if (isSpeaking && mouthBone) {
                    mouthBone.scale.y = 0.5 + Math.sin(t * 20) * 0.5;
                }

                const blink = Math.sin(t * 1.5) > 0.98 ? 0.1 : 1;
                eyeBones.forEach(eye => { eye.scale.y = blink; });

                const isMobile = window.innerWidth < 768;
                priyaModel.position.y = (isMobile ? -1.2 : -1.5) + Math.sin(t) * 0.02;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- UI HANDLERS ---
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');

        async function handleAction() {
            const text = inputEl.value.trim();
            if (!text) return;
            
            inputEl.value = "";
            const reply = await askPriya(text);
            speak(reply);
        }

        btnEl.addEventListener('click', handleAction);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAction();
        });

        // --- START APPLICATION ---
        init3D();
        animate();
        initGeminiNano(); // ब्राउज़र AI लोड करना
    </script>
</body>
</html>
