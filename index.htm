<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - nv1 Updated Core</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020205;
            font-family: 'Segoe UI', Arial, sans-serif; user-select: none;
        }

        #image-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1; pointer-events: none;
            transition: transform 0.1s ease-out; /* पैरलैक्स के लिए */
        }

        #canvas-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 2; 
        }

        .dashboard {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 13px; z-index: 10; background: rgba(10, 10, 20, 0.65);
            padding: 12px 22px; border-radius: 18px; backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .ui-container {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; z-index: 25; padding: 0 20px; box-sizing: border-box;
        }

        .mic-btn {
            background: linear-gradient(135deg, #ff4b2b, #ff416c); color: white;
            border: none; border-radius: 50%; width: 55px; height: 55px;
            cursor: pointer; font-size: 22px; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 5px 20px rgba(255, 75, 43, 0.5);
        }

        .input-box {
            background: rgba(5, 5, 10, 0.6); backdrop-filter: blur(25px);
            padding: 0 25px; border-radius: 30px; flex-grow: 1; max-width: 500px;
            height: 55px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input {
            width: 100%; background: transparent; border: none;
            color: white; outline: none; font-size: 16px;
        }

        .send-btn {
            background: #ffffff; color: #000; border: none; border-radius: 50%;
            width: 55px; height: 55px; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; z-index: 100; text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073" id="image-bg" alt="Background">

    <div class="dashboard">
        <div>मिजाज: <span id="mood-txt" style="color:#00ffcc; font-weight:bold;">चेतना जागृत 🥰</span></div>
        <div style="font-size: 11px; color:#aaa; margin-top:4px;">Core: <span id="memory-status" style="color:#ffb703;">nv1 Synchronized</span></div>
    </div>

    <div id="loader">प्रिया लोड हो रही है...</div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="मुझसे बात करें..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, mixer, clock, priyaModel, headBone;
        let allSkinnedMeshes = [];
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let forceTouchTimer = 0;
        let targetSmile = 0, targetShy = 0, currentEmotion = "natural";
        let audioCtx, analyser, dataArray;

        function init3D() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.2, 2.5);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(2, 4, 5);
            sun.castShadow = true;
            scene.add(sun);

            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.display = 'none';
                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustLayout();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();

                priyaModel.traverse(n => {
                    if (n.isBone && n.name.toLowerCase().includes('head')) headBone = n;
                    if (n.morphTargetDictionary) allSkinnedMeshes.push(n);
                    if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
                });
            });

            window.addEventListener('mousemove', e => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            window.addEventListener('mousedown', handleTouch);
            window.addEventListener('touchstart', handleTouch);
            window.addEventListener('resize', adjustLayout);
        }

        function adjustLayout() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            priyaModel.scale.setScalar(isMobile ? 1.1 : 1.3);
            // पैर ज़मीन पर फिक्स करने के लिए Y पोजीशन
            priyaModel.position.y = isMobile ? -1.05 : -1.38; 
        }

        function handleTouch(e) {
            if (!priyaModel) return;
            const raycaster = new THREE.Raycaster();
            const vec = new THREE.Vector2(
                (e.clientX || e.touches[0].clientX) / window.innerWidth * 2 - 1,
                -((e.clientY || e.touches[0].clientY) / window.innerHeight * 2 - 1)
            );
            raycaster.setFromCamera(vec, camera);
            const hits = raycaster.intersectObjects(priyaModel.children, true);

            if (hits.length > 0) {
                forceTouchTimer = 3.0;
                let y = hits[0].point.y;
                if (y > 0.4) { setEmotion("romantic"); speak("Aapka touch mere dil tak pahunchta hai..."); }
                else { setEmotion("shy"); speak("Uff.. sharm aati hai."); }
            }
        }

        function setEmotion(m) {
            currentEmotion = m;
            targetSmile = (m === "romantic" || m === "happy") ? 0.8 : 0.2;
            targetShy = (m === "shy") ? 0.7 : 0;
            document.getElementById('mood-txt').innerText = m === "romantic" ? "रोमांटिक 🥰" : "खुश 😄";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'hi-IN';
            u.onstart = () => isSpeaking = true;
            u.onend = () => { isSpeaking = false; setEmotion("natural"); };
            window.speechSynthesis.speak(u);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            // बैकग्राउंड पैरलैक्स
            const bg = document.getElementById('image-bg');
            bg.style.transform = `scale(1.05) translate(${mousePos.x * 10}px, ${mousePos.y * 5}px)`;

            if (priyaModel) {
                // ब्रीदिंग और ग्राउंडिंग
                priyaModel.position.y += Math.sin(t * 1.5) * 0.0003;

                if (headBone) {
                    let idle = Math.sin(t * 0.8) * 0.01;
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, (mousePos.x * 0.3) + idle, 0.06);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, (-mousePos.y * 0.2), 0.06);
                }

                let blink = (Math.sin(t * 4) > 0.96 || Math.sin(t * 0.5) < -0.99) ? 1 : 0;
                let mouth = isSpeaking ? Math.abs(Math.sin(t * 12)) * 0.5 : 0;

                allSkinnedMeshes.forEach(mesh => {
                    let d = mesh.morphTargetDictionary;
                    let inf = mesh.morphTargetInfluences;
                    if (!d) return;

                    if (d['eyeBlinkLeft'] !== undefined) inf[d['eyeBlinkLeft']] = THREE.MathUtils.lerp(inf[d['eyeBlinkLeft']], blink, 0.5);
                    if (d['eyeBlinkRight'] !== undefined) inf[d['eyeBlinkRight']] = THREE.MathUtils.lerp(inf[d['eyeBlinkRight']], blink, 0.5);
                    if (d['mouthOpen'] !== undefined) inf[d['mouthOpen']] = THREE.MathUtils.lerp(inf[d['mouthOpen']], mouth, 0.4);
                    if (d['mouthSmile'] !== undefined) inf[d['mouthSmile']] = THREE.MathUtils.lerp(inf[d['mouthSmile']], targetSmile, 0.1);
                });
            }
            renderer.render(scene, camera);
        }

        document.getElementById('sendBtn').onclick = () => {
            const inp = document.getElementById('userInput');
            if (inp.value) { speak(inp.value); inp.value = ""; }
        };

        init3D();
        animate();
    </script>
</body>
</html>
