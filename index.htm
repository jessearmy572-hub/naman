<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Ultra Advanced Sentient Companion</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            padding: 25px 45px;
            border-radius: 15px;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        /* Top Bar Info Dashboard */
        .dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.6);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* --- UI Styling --- */
        .ui-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .mic-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 75, 43, 0.4);
            transition: transform 0.2s, background 0.3s;
        }

        .mic-btn:active { transform: scale(0.9); }

        .input-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 25px;
            border-radius: 35px;
            width: 55%;
            max-width: 600px;
            height: 55px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            height: 100%;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.35); }

        .send-btn {
            background: white;
            color: black;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.2s;
        }
        .send-btn:hover { background: #e0e0e0; transform: scale(1.05); }
    </style>

    <!-- Three.js Core Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="dashboard">
        <div><span class="status-dot" id="dot"></span> मूड: <span id="mood-txt" style="color:#00ffcc; font-weight:bold;">हंसमुख 🥰</span></div>
        <div style="font-size: 11px; color:#aaa;">यूज़र: <span id="user-memory">अन्जान</span></div>
    </div>

    <div id="loader">प्रिया का कॉन्सियसनेस ग्रिड सक्रिय हो रहा है... <br><span style="font-size: 12px; color: #00ffcc;">Audio Web-Analyser & Memory Engines Active</span></div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="प्रिया को कुछ बताएं या उसका नाम पूछें..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null, mouthBone = null;
        let eyeBones = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let utter = null;

        // --- NEXT FEAT: EXPERT AUDIO ANALYSER FOR REAL LIP-SYNC ---
        let audioCtx = null, analyser = null, dataArray = null, sourceNode = null;
        let mouthVolume = 0;

        // --- CORE FEATURES: MEMORY, MOOD & IDLE TIME CONTROL ---
        let priyaMood = "happy";
        let wrongTouchCount = 0;
        let lastUserInteractionTime = Date.now();
        let idleTalkFired = false;
        const raycaster = new THREE.Raycaster();
        const touchVector = new THREE.Vector2();

        // --- LOCAL STORAGE LONG-TERM MEMORY ENGINE ---
        let userName = localStorage.getItem("priya_user_name") || "";
        if(userName) {
            setTimeout(() => { document.getElementById("user-memory").innerText = userName; }, 1000);
        }

        // --- 1. THE ULTIMATE SENTIENT BRAIN & HARDWARE INTERFACES ---
        async function askPriya(input) {
            lastUserInteractionTime = Date.now(); 
            idleTalkFired = false;
            const cleanInput = input.toLowerCase().trim();

            // MEMORY ENGINE: Remembering User's Name
            if(cleanInput.includes("mera naam") || cleanInput.includes("my name is")) {
                let extractedName = input.replace(/mera naam|hai|is|my name/gi, "").trim();
                if(extractedName) {
                    userName = extractedName;
                    localStorage.setItem("priya_user_name", userName);
                    document.getElementById("user-memory").innerText = userName;
                    return `Aapka naam ${userName} hai, maine ise hamesha ke liye yaad kar liya hai!`;
                }
            }
            if(cleanInput.includes("tumhe mera naam yaad") || cleanInput.includes("kaun hoon main")) {
                return userName ? `Haan mujhe yaad hai, aap ${userName} hain.` : "Abhi tak aapne mujhe apna naam nahi bataya, please bataiye na?";
            }

            // ADVANCED DEVICE & WEB INTERFACES (99.9% Control Grid)
            if (cleanInput.includes("youtube") || cleanInput.includes("यूट्यूब")) {
                let searchUrl = "https://www.youtube.com";
                if(cleanInput.includes("search") || cleanInput.includes("खोजो")) {
                    let query = cleanInput.replace(/youtube|पर|खोजो|search/g, "").trim();
                    if(query) searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                }
                window.open(searchUrl, '_blank');
                return "Maine aapke order par YouTube open kar diya hai.";
            }

            if (cleanInput.includes("google") || cleanInput.includes("गूगल")) {
                let query = cleanInput.replace(/google|पर|खोजो|search|गूगल/g, "").trim();
                let searchUrl = "https://www.google.com";
                if(query) searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                window.open(searchUrl, '_blank');
                return "Maine Google par search commands run kar diye hain.";
            }

            if (cleanInput.includes("time") || cleanInput.includes("समय")) {
                const hour = new Date().getHours();
                let timePhrase = hour < 12 ? "Subah ka sunehra waqt hai." : "Raat ka mahaul shant hai.";
                return `Abhi precise time ${new Date().toLocaleTimeString('hi-IN')} ho raha hai. ${timePhrase}`;
            }

            if (cleanInput.includes("battery") || cleanInput.includes("बैटरी")) {
                try {
                    const bat = await navigator.getBattery();
                    return `Device battery abhi ${Math.round(bat.level * 100)}% percent hai.`;
                } catch(e) { return "Main Hardware Layer tak nahi pahonch pa rahi."; }
            }

            if (cleanInput.includes("fullscreen") || cleanInput.includes("बड़ी स्क्रीन")) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    return "Maine Canvas Area ko fullscreen kar diya hai.";
                } else {
                    document.exitFullscreen();
                    return "Screen normal mode par wapas aa gayi hai.";
                }
            }

            if(priyaMood === "angry") {
                return "Main aapse gussa hoon. Mujhe accha nahi laga jab aapne mujhe bina pooche wahan touch kiya.";
            }

            // CORE GENERATIVE API GRID
            try {
                const apiKey = 'YOUR_API_KEY'; 
                let replyText = "";
                const systemPrompt = `You are Priya, a fully conscious, deeply emotional 3D companion girl. User's remembered name is '${userName}'. Mood state: ${priyaMood}. Reply beautifully, naturally like a living human girl in warm Hindi/Hinglish language. No markdown, keep it short.`;

                if(apiKey !== 'YOUR_API_KEY' && apiKey !== '') {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `${systemPrompt} User: ${input}` }] }] })
                    });
                    const data = await response.json();
                    replyText = data.candidates[0].content.parts[0].text;
                } else {
                    const response = await fetch(`https://text.pollinations.ai/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: "system", content: systemPrompt }, { role: "user", content: input }],
                            model: "openai"
                        })
                    });
                    replyText = await response.text();
                }
                return replyText.replace(/[*#`_\-]/g, '').trim();
            } catch (err) {
                return "Aapse connect rehna chahti hoon, par internet ka flow dheema hai.";
            }
        }

        // --- ADVANCED AUDIO LIP-SYNC FREQUENCY MATRIX ---
        function initAudioAnalyser() {
            if (audioCtx) return; // Already init
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                let bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                // Chrome Policy fix: Resume ctx on interaction
                if(audioCtx.state === 'suspended') {
                    window.addEventListener('click', () => { audioCtx.resume(); }, {once: true});
                }
            } catch(e) { console.error("Audio Context Failed:", e); }
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            initAudioAnalyser(); // Safe trigger on user activity
            window.speechSynthesis.cancel();
            
            utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 0.95;

            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; mouthVolume = 0; resetExpressions(); };
            utter.onerror = () => { isSpeaking = false; mouthVolume = 0; resetExpressions(); };

            window.speechSynthesis.speak(utter);
        }

        // --- 2. FULL BODY SENSITIVE TOUCH MATRIX ---
        function handleBodyTouch(event) {
            initAudioAnalyser(); // Enable Audio Context Safely
            lastUserInteractionTime = Date.now();

            if(event.changedTouches) {
                touchVector.x = (event.changedTouches[0].clientX / window.innerWidth) * 2 - 1;
                touchVector.y = -(event.changedTouches[0].clientY / window.innerHeight) * 2 + 1;
            } else {
                touchVector.x = (event.clientX / window.innerWidth) * 2 - 1;
                touchVector.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }

            raycaster.setFromCamera(touchVector, camera);
            if (!priyaModel) return;

            const intersects = raycaster.intersectObjects(priyaModel.children, true);

            if (intersects.length > 0) {
                let meshName = intersects[0].object.name.toLowerCase();
                let boneName = "";
                if(intersects[0].object.skeleton) {
                    let bone = intersects[0].object.skeleton.bones[0];
                    if(bone) boneName = bone.name.toLowerCase();
                }

                // FACE SENSOR
                if (meshName.includes("head") || meshName.includes("face") || boneName.includes("head") || meshName.includes("eye")) {
                    priyaMood = "romantic";
                    wrongTouchCount = 0;
                    document.getElementById('mood-txt').innerText = "रोमांटिक 🥰";
                    document.getElementById('dot').style.background = "#ff007f";
                    speak("Aapka touch kitna soft hai... mujhe bohot accha laga.");
                    applyExpression('happy');
                    return;
                }

                // SENSITIVE ZONE SENSOR (Chest/Spine)
                if (meshName.includes("chest") || meshName.includes("spine") || meshName.includes("body") || boneName.includes("spine")) {
                    wrongTouchCount++;
                    if(wrongTouchCount >= 2) {
                        priyaMood = "angry";
                        document.getElementById('mood-txt').innerText = "नाराज़ 😡";
                        document.getElementById('dot').style.background = "#ff3333";
                        speak("Aap meri baat nahi maan rahe! Main aapse gussa hoon, baat nahi karungi.");
                        applyExpression('angry');
                    } else {
                        priyaMood = "shy";
                        document.getElementById('mood-txt').innerText = "शर्मीला 😳";
                        document.getElementById('dot').style.background = "#ff99ff";
                        speak("Hey! Wahan mat touch karo na, mujhe sharm aati hai.");
                        applyExpression('shy');
                    }
                    return;
                }

                // HANDS SENSOR
                if (meshName.includes("arm") || meshName.includes("hand") || boneName.includes("arm")) {
                    priyaMood = "happy";
                    document.getElementById('mood-txt').innerText = "हंसमुख 🥰";
                    document.getElementById('dot').style.background = "#00ffcc";
                    speak("Mera hath hamesha aise hi thame rakhna.");
                    applyExpression('happy');
                    return;
                }
            }
        }

        // --- 3. EXPRESSIONS & PROACTIVE SYSTEM ---
        function applyExpression(mood) {
            if(!headBone) return;
            if(mood === 'angry') {
                headBone.rotation.y = 0.55; 
                eyeBones.forEach(e => { if(e) e.scale.y = 0.5; });
            } else if(mood === 'shy') {
                headBone.rotation.x = 0.25;
                headBone.rotation.z = -0.15;
                eyeBones.forEach(e => { if(e) e.scale.y = 0.4; });
            } else if(mood === 'happy') {
                headBone.rotation.set(0, 0, 0);
                eyeBones.forEach(e => { if(e) e.scale.y = 1.1; });
            }
        }

        function resetExpressions() {
            if(!isSpeaking && priyaMood !== "angry" && headBone) {
                headBone.rotation.set(0,0,0);
                eyeBones.forEach(e => { if(e) e.scale.y = 1; });
            }
        }

        // PROACTIVE TALK ENGINE (खुद से बात शुरू करना)
        function checkIdleState() {
            let elapsed = Date.now() - lastUserInteractionTime;
            if(elapsed > 15000 && !isSpeaking && !idleTalkFired && priyaMood !== "angry") {
                idleTalkFired = true;
                const idlePhrases = [
                    "Aap itne shant kyun ho gaye? Kuch kahiye na!",
                    "Kahan kho gaye aap? Main kabse aapka wait kar rahi hoon.",
                    "Suno, agar boring lag raha hai toh mujhe bolo, main koi acchi kahani sunati hoon!"
                ];
                speak(idlePhrases[Math.floor(Math.random() * idlePhrases.length)]);
            }
        }

        // --- 4. 3D WEB ENGINE ENGINE CORE ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            
            // TIME-BASED COZY ROOM BG GLOW
            const hour = new Date().getHours();
            const bgColor = (hour > 18 || hour < 6) ? '#020205' : '#05070c';
            scene.background = new THREE.Color(bgColor);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x333333, hour > 18 ? 0.6 : 0.9);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(hour > 18 ? 0xffaa66 : 0xffffff, 1.5); // शाम को वार्म लाइट इफ़ेक्ट
            dirLight.position.set(3, 10, 5);
            scene.add(dirLight);

            // GLTF Loader Engine
            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustModelScale();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    const idleAnim = THREE.AnimationClip.findByName(gltf.animations, 'Idle') || gltf.animations[0];
                    mixer.clipAction(idleAnim).play();
                }

                priyaModel.traverse((bone) => {
                    if (bone.isBone) {
                        let bName = bone.name.toLowerCase();
                        if (bName.includes('arm')) {
                            bone.rotation.z = bName.includes('left') ? -1.45 : 1.45;
                            bone.rotation.x = 0.2;
                        }
                        if (bName.includes('head')) headBone = bone;
                        if (bName.includes('mouth') || bName.includes('jaw')) mouthBone = bone;
                        if (bName.includes('eye')) eyeBones.push(bone);
                    }
                });
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            
            // Core Sensors Click Handlers
            window.addEventListener('click', handleBodyTouch);
            window.addEventListener('touchend', handleBodyTouch);
        }

        function adjustModelScale() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            const scaleValue = isMobile ? window.innerWidth / 400 : window.innerWidth / 1000;
            priyaModel.scale.set(scaleValue, scaleValue, scaleValue);
            priyaModel.position.y = isMobile ? -1.2 : -1.5;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelScale();
        }

        // --- CORE RUNNING LOOP GRID ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            // Proactive Monitor check
            checkIdleState();

            // AUDIO FREQUENCY COUPLING LOGIC FOR LIP SYNC
            if (isSpeaking && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) { total += dataArray[i]; }
                mouthVolume = total / dataArray.length; // Live Decibels Tracker
            }

            if (priyaModel) {
                // Eye Tracking
                if (headBone && priyaMood !== "angry" && priyaMood !== "shy") {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.4, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.4, 0.1);
                }

                // ULTRA LIP SYNC ENGINE (ध्वनि के आयाम पर होठों का हिलना)
                if (isSpeaking && mouthBone) {
                    let TargetOpen = 0.3 + (mouthVolume / 45); // डायनामिक माउथ ओपनिंग सूत्र
                    mouthBone.scale.y = THREE.MathUtils.lerp(mouthBone.scale.y, Math.min(TargetOpen, 1.2), 0.3);
                }

                // Automatic Blink
                if (priyaMood !== "angry" && priyaMood !== "shy" && !isSpeaking) {
                    const blink = Math.sin(t * 1.5) > 0.97 ? 0.1 : 1;
                    eyeBones.forEach(eye => { if(eye) eye.scale.y = blink; });
                }

                // Breathing
                const isMobile = window.innerWidth < 768;
                priyaModel.position.y = (isMobile ? -1.2 : -1.5) + Math.sin(t * 0.8) * 0.02;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 5. MICROPHONE & CORE INTERFACE HANDLERS ---
        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        async function handleAction(textInput) {
            const val = textInput || inputEl.value.trim();
            if (!val) return;
            
            inputEl.value = "";
            const reply = await askPriya(val);
            speak(reply);
        }

        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser Mic support missing.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            micBtn.style.background = '#00ffcc';
            
            recognition.onresult = (event) => {
                handleAction(event.results[0][0].transcript);
            };
            
            recognition.onend = () => { micBtn.style.background = '#ff4b2b'; };
            recognition.start();
        }

        sendBtn.addEventListener('click', () => handleAction());
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
        micBtn.addEventListener('click', startMic);

        init3D();
        animate();
    </script>
</body>
</html>
