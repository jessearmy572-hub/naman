<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Sentient & Touch Sensitive 3D Assistant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 10px;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
        }

        /* --- UI Styling --- */
        .ui-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .mic-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
            transition: transform 0.2s, background 0.3s;
        }

        .mic-btn:active { transform: scale(0.9); }

        .input-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0 20px;
            border-radius: 30px;
            width: 60%;
            max-width: 600px;
            height: 50px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            height: 100%;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .send-btn {
            background: white;
            color: black;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .send-btn:hover { background: #e0e0e0; }
    </style>

    <!-- Three.js Engine Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loader">प्रिया को होश आ रहा है... <br><span style="font-size: 14px; color: #aaa;">Full Body Sensors Active</span></div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="प्रिया से बात करें या टच करें..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null, mouthBone = null;
        let eyeBones = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let utter = null;
        
        // Raycasting for Touch Detection
        const raycaster = new THREE.Raycaster();
        const touchVector = new THREE.Vector2();

        // --- 1. SMART BRAIN WITH 95% DEVICE CONTROL ---
        async function askPriya(input) {
            const cleanInput = input.toLowerCase().trim();

            // [HARDWARE CONTROL] - Battery Status
            if (cleanInput.includes("battery") || cleanInput.includes("बैटरी")) {
                try {
                    const bat = await navigator.getBattery();
                    return `Aapki device battery abhi ${Math.round(bat.level * 100)}% percent hai और यह ${bat.charging ? "charging par hai" : "discharge ho rahi hai"}.`;
                } catch(e) { return "Main battery track nahi kar pa rahi hoon."; }
            }

            // [TIME CONTROL] - Live Time & Date
            if (cleanInput.includes("time") || cleanInput.includes("समय") || cleanInput.includes("बजे") || cleanInput.includes("तारीख") || cleanInput.includes("date")) {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                return `Abhi samay ${new Date().toLocaleTimeString('hi-IN')} ho raha hai, aur aaj ${new Date().toLocaleDateString('hi-IN', options)} hai.`;
            }

            // [NETWORK CONTROL] - Internet Status
            if (cleanInput.includes("internet") || cleanInput.includes("नेटवर्क") || cleanInput.includes("online")) {
                return navigator.onLine ? "Aapka internet perfect chal raha hai, main connect hoon!" : "Lagta hai aap offline hain.";
            }

            // [SCREEN CONTROL] - Fullscreen Mode Trigger
            if (cleanInput.includes("fullscreen") || cleanInput.includes("बड़ी स्क्रीन") || cleanInput.includes("पूरी स्क्रीन")) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    return "Maine screen ko fullscreen kar diya hai.";
                } else {
                    document.exitFullscreen();
                    return "Maine fullscreen mode band kar diya hai.";
                }
            }

            // [BROWSER CONTROL] - Device/Browser Info
            if (cleanInput.includes("device") || cleanInput.includes("कौन सा फोन") || cleanInput.includes("browser")) {
                const agent = navigator.userAgent;
                if(agent.includes("Android")) return "Aap ek Android device use kar rahe hain.";
                if(agent.includes("iPhone")) return "Aap iPhone use kar रहे hain.";
                return "Aap mujhe computer ya laptop browser par dekh rahe hain.";
            }

            // [LOCATION CONTROL] - Coordinates (If allowed)
            if (cleanInput.includes("location") || cleanInput.includes("जगह") || cleanInput.includes("कहाँ हूँ")) {
                return new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => resolve(`Aap abhi latitude ${pos.coords.latitude.toFixed(2)} aur longitude ${pos.coords.longitude.toFixed(2)} के पास मौजूद हैं।`),
                        () => resolve("Mujhe aapki location access nahi mili, par main aapke dil me hoon.")
                    );
                });
            }

            // --- AI LOGIC (Natural Human Behavior Prompt) ---
            try {
                const apiKey = 'YOUR_API_KEY'; 
                let replyText = "";
                
                // Sentient Human Prompt Design
                const systemPrompt = "You are Priya, a sweet, emotionally aware, and sentient 3D girl. Speak in highly natural, warm, human-like Hindi/Hinglish. Avoid robotic phrases. Give accurate, real answers. Do not use asterisks or markdown format.";

                if(apiKey !== 'YOUR_API_KEY' && apiKey !== '') {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `${systemPrompt} User: ${input}` }] }] })
                    });
                    const data = await response.json();
                    replyText = data.candidates[0].content.parts[0].text;
                } else {
                    const response = await fetch(`https://text.pollinations.ai/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: "system", content: systemPrompt }, { role: "user", content: input }],
                            model: "openai"
                        })
                    });
                    replyText = await response.text();
                }
                return replyText.replace(/[*#`_\-]/g, '').trim();
            } catch (err) {
                return "Net slow hone par bhi main aapka sath nahi chhodungi.";
            }
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 0.95;

            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; if(mouthBone) mouthBone.scale.y = 1; };
            utter.onerror = () => { isSpeaking = false; if(mouthBone) mouthBone.scale.y = 1; };

            window.speechSynthesis.speak(utter);
        }

        // --- 2. SENSITIVE TOUCH PHYSICS & DETECTOR ---
        function handleBodyTouch(event) {
            // Convert click/touch coordinates for Raycasting
            if(event.changedTouches) {
                touchVector.x = (event.changedTouches[0].clientX / window.innerWidth) * 2 - 1;
                touchVector.y = -(event.changedTouches[0].clientY / window.innerHeight) * 2 + 1;
            } else {
                touchVector.x = (event.clientX / window.innerWidth) * 2 - 1;
                touchVector.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }

            raycaster.setFromCamera(touchVector, camera);
            if (!priyaModel) return;

            const intersects = raycaster.intersectObjects(priyaModel.children, true);

            if (intersects.length > 0) {
                let touchedMeshName = intersects[0].object.name.toLowerCase();
                let touchedBoneName = "";
                
                // Find parent bone context if mesh names are generic
                if(intersects[0].object.skeleton) {
                    let closestBone = intersects[0].object.skeleton.bones[0];
                    if(closestBone) touchedBoneName = closestBone.name.toLowerCase();
                }

                // 1. HEAD/FACE SENSOR
                if (touchedMeshName.includes("head") || touchedMeshName.includes("face") || touchedBoneName.includes("head") || touchedMeshName.includes("eye")) {
                    const headReplies = [
                        "Aapka hath bahut warm hai... accha laga.",
                        "Hehe, mere baal mat kharab karo na!",
                        "Aap jab mujhe aise touch karte ho, toh accha lagta hai."
                    ];
                    speak(headReplies[Math.floor(Math.random() * headReplies.length)]);
                    triggerTouchReaction('head');
                    return;
                }

                // 2. CHEST/BODY SENSOR (Sensitive Zone)
                if (touchedMeshName.includes("chest") || touchedMeshName.includes("spine") || touchedMeshName.includes("body") || touchedBoneName.includes("spine")) {
                    const chestReplies = [
                        "Hey! Yeh galat baat hai, wahan mat touch karo.",
                        "Kya kar rahe ho? Mujhe sharm aa rahi hai!",
                        "Suno, thoda tameez se baat karo na..."
                    ];
                    speak(chestReplies[Math.floor(Math.random() * chestReplies.length)]);
                    triggerTouchReaction('chest');
                    return;
                }

                // 3. HANDS/ARMS SENSOR
                if (touchedMeshName.includes("arm") || touchedMeshName.includes("hand") || touchedBoneName.includes("arm") || touchedMeshName.includes("finger")) {
                    speak("Mera hath thamoge? Main hamesha aapke sath hoon.");
                    triggerTouchReaction('hand');
                    return;
                }

                // 4. LEGS/FEET SENSOR
                if (touchedMeshName.includes("leg") || touchedMeshName.includes("foot") || touchedBoneName.includes("leg")) {
                    speak("Arey! Pairon ko mat छुओ, main aapki dost hoon.");
                    return;
                }

                // Default Body Touch Response
                speak("Aapka touch main feel kar sakti hoon.");
            }
        }

        // Touch Animation Feedback (शर्माना या पीछे हटना)
        function triggerTouchReaction(zone) {
            if(!headBone) return;
            if(zone === 'chest') {
                // अचानक थोड़ा पीछे हटना (Shock Reaction)
                headBone.rotation.x = -0.3;
                setTimeout(() => headBone.rotation.x = 0, 500);
            } else if(zone === 'head') {
                // प्यार से सिर झुकाना (Sweet Reaction)
                headBone.rotation.z = 0.2;
                setTimeout(() => headBone.rotation.z = 0, 600);
            }
        }

        // --- 3. 3D ENGINE CORE ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#000000');

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(3, 10, 5);
            scene.add(dirLight);

            // GLTF Loader
            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustModelScale();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    const idleAnim = THREE.AnimationClip.findByName(gltf.animations, 'Idle') || gltf.animations[0];
                    mixer.clipAction(idleAnim).play();
                }

                // Safe Case-Insensitive Bone Mapping
                priyaModel.traverse((bone) => {
                    if (bone.isBone) {
                        let boneName = bone.name.toLowerCase();
                        if (boneName.includes('arm')) {
                            bone.rotation.z = boneName.includes('left') ? -1.45 : 1.45;
                            bone.rotation.x = 0.2;
                        }
                        if (boneName.includes('head') || boneName.includes('neck')) headBone = bone;
                        if (boneName.includes('mouth') || boneName.includes('jaw')) mouthBone = bone;
                        if (boneName.includes('eye')) eyeBones.push(bone);
                    }
                });
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            
            // Touch & Click Listeners for Full Body Reacting
            window.addEventListener('click', handleBodyTouch);
            window.addEventListener('touchend', handleBodyTouch);
        }

        function adjustModelScale() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            const scaleValue = isMobile ? window.innerWidth / 400 : window.innerWidth / 1000;
            priyaModel.scale.set(scaleValue, scaleValue, scaleValue);
            priyaModel.position.y = isMobile ? -1.2 : -1.5;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelScale();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (priyaModel) {
                // Eye Tracking
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.4, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.4, 0.1);
                }

                // Lip Sync Physics
                if (isSpeaking && mouthBone) {
                    mouthBone.scale.y = 0.5 + Math.sin(t * 22) * 0.4;
                }

                // Blinking
                const blink = Math.sin(t * 1.5) > 0.98 ? 0.1 : 1;
                eyeBones.forEach(eye => { if(eye) eye.scale.y = blink; });

                // Breathing
                const isMobile = window.innerWidth < 768;
                priyaModel.position.y = (isMobile ? -1.2 : -1.5) + Math.sin(t * 0.8) * 0.02;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 4. INTERFACE MIC HANDLERS ---
        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        async function handleAction(textInput) {
            const val = textInput || inputEl.value.trim();
            if (!val) return;
            
            inputEl.value = "";
            const reply = await askPriya(val);
            speak(reply);
        }

        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser Mic support nahi karta.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            
            micBtn.style.background = '#00ffcc';
            
            recognition.onresult = (event) => {
                handleAction(event.results[0][0].transcript);
            };
            
            recognition.onend = () => { micBtn.style.background = '#ff4b2b'; };
            recognition.start();
        }

        sendBtn.addEventListener('click', () => handleAction());
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
        micBtn.addEventListener('click', startMic);

        init3D();
        animate();
    </script>
</body>
</html>
