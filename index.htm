    <style>
        /* ==========================================================================
          SUB-SECTION 1.1: GLOBAL ROOT ARCHITECTURE VARIABLES
          ========================================================================== */
        :root {
            --neon-cyan: #00ffcc;
            --neon-blue: #0099ff;
            --neon-purple: #9400d3;
            --neon-pink: #ff416c;
            --neon-orange: #ff4b2b;
            --neon-green: #39ff14;
            --neon-glow-primary: rgba(0, 255, 204, 0.5);
            --neon-glow-secondary: rgba(0, 153, 255, 0.4);
            --neon-glow-dim: rgba(0, 255, 204, 0.15);
            --bg-dark-absolute: #010103;
            --bg-dark-core: #030308;
            --bg-dark-panel: #06060f;
            --panel-bg-glass: rgba(6, 6, 15, 0.72);
            --panel-bg-heavy: rgba(3, 3, 7, 0.95);
            --border-light-white: rgba(255, 255, 255, 0.15);
            --border-heavy-white: rgba(255, 255, 255, 0.25);
            --border-neon-cyan: rgba(0, 255, 204, 0.35);
            --border-neon-blue: rgba(0, 153, 255, 0.3);
            --text-color-pure: #ffffff;
            --text-color-slate: #e2e8f0;
            --text-color-muted: rgba(255, 255, 255, 0.65);
            --text-color-dark: rgba(255, 255, 255, 0.35);
            --transition-curve-smooth: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-curve-snappy: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-curve-linear: all 0.3s linear;
        }

        /* ==========================================================================
          SUB-SECTION 1.2: HARDWARE ACCELERATION RESET LAYER
          ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark-absolute);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-color-pure);
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            position: relative;
        }

        /* ==========================================================================
          SUB-SECTION 1.3: CRITICAL LAYER Z-INDEX HIERARCHY
          ========================================================================== */
        
        /* Layer 1: Ambient Background Scenery Wallpaper */
        #image-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            filter: brightness(0.45) contrast(1.2) saturate(0.85);
            transform: scale(1.01);
            transition: filter 0.6s ease;
            will-change: filter;
        }

        /* Layer 2: Cyberpunk Backing Grid (Anti-Black Screen Fallback Grid) */
        .cyber-grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            pointer-events: none;
        }

        /* Layer 3: Interactive Three.js Viewport Stage */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            cursor: grab;
            display: block;
            background: transparent !important;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* Layer 10: Glassmorphic Heads-Up Display Panel */
        .dashboard {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            color: var(--text-color-pure);
            background: var(--panel-bg-glass);
            padding: 18px 28px;
            border-radius: 24px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-light-white);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 
                        inset 0 1px 2px rgba(255,255,255,0.2),
                        0 0 40px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            letter-spacing: 0.8px;
            transform: translateZ(0);
            will-change: transform, opacity;
            animation: HUD_SlideDownAnimation 0.95s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .status-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 14px;
            box-shadow: 0 0 15px var(--neon-cyan), 
                        0 0 30px var(--neon-cyan),
                        0 0 45px var(--neon-cyan);
            animation: HUD_DotPulseGlow 3s infinite ease-in-out;
            will-change: opacity, box-shadow;
        }

        .status-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .meta-info {
            font-size: 12px;
            color: var(--text-color-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-value {
            color: var(--neon-cyan);
            font-weight: 700;
            text-shadow: 0 0 6px var(--neon-glow-dim);
        }

        /* Layer 20: Control Deck User Interface Dock */
        .ui-container {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            z-index: 20;
            padding: 0 40px;
            box-sizing: border-box;
            will-change: transform, opacity;
            animation: HUD_DeckSlideUpAnimation 1.05s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .input-box {
            background: rgba(3, 3, 6, 0.88);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 0 32px;
            border-radius: 45px;
            flex-grow: 1;
            max-width: 700px;
            height: 70px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.75), 
                        inset 0 1px 1px rgba(255,255,255,0.1);
            transition: var(--transition-curve-smooth);
            position: relative;
            overflow: hidden;
        }

        .input-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.35), 
                        0 25px 60px rgba(0,0,0,0.8);
            transform: translateY(-3px);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color-pure);
            outline: none;
            font-size: 18px;
            height: 100%;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.42);
        }

        /* Component Control Buttons Framework */
        .control-btn {
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-curve-smooth);
            outline: none;
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #ffffff;
            font-size: 26px;
            box-shadow: 0 12px 32px rgba(255, 75, 43, 0.55);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .mic-btn:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 16px 40px rgba(255, 75, 43, 0.7);
        }

        .mic-btn:active {
            transform: scale(0.92) translateY(0);
        }

        .mic-btn.listening {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 20px var(--neon-blue);
            animation: UI_ButtonPulseEffect 1.4s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
        }

        .send-btn {
            background: #ffffff;
            color: #020205;
            font-size: 24px;
            box-shadow: 0 12px 32px rgba(255,255,255,0.32);
            border: 1px solid rgba(0,0,0,0.08);
        }

        .send-btn:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 16px 40px rgba(255,255,255,0.5);
            background: #f8f9fa;
        }

        .send-btn:active {
            transform: scale(0.92) translateY(0);
        }

        /* Layer 30: Caption Subtitle Monitor Text Overlay */
        #subtitle-box {
            position: absolute;
            bottom: 145px;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            background: rgba(4, 4, 10, 0.92);
            padding: 16px 36px;
            border-radius: 26px;
            color: var(--text-color-pure);
            font-size: 17px;
            max-width: 85%;
            width: auto;
            min-width: 240px;
            text-align: center;
            z-index: 30;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.85), inset 0 1px 1px rgba(255,255,255,0.15);
            display: none;
            pointer-events: none;
            line-height: 1.65;
            letter-spacing: 0.4px;
            font-weight: 500;
            animation: UI_SubtitlePopUpEffect 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            will-change: transform, opacity;
        }

        /* Layer 9999: Hard-Interleaved Initial System Loader Backdrop Screen */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark-core);
            color: var(--text-color-pure);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.85s cubic-bezier(0.25, 1, 0.25, 1), visibility 0.85s ease;
            will-change: opacity;
        }

        .loader-spinner-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(0, 255, 204, 0.08);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-blue);
            animation: System_LinearRotationLoop 1.3s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.2);
        }

        .loader-spinner-inner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-radius: 50%;
            border-left-color: var(--neon-pink);
            border-right-color: var(--neon-orange);
            animation: System_InverseRotationLoop 0.9s linear infinite;
        }

        .loader-text {
            color: var(--neon-cyan);
            font-size: 21px;
            letter-spacing: 3px;
            text-align: center;
            text-shadow: 0 0 15px var(--neon-glow-primary);
            font-weight: 500;
            text-transform: uppercase;
        }

        .loader-subtext {
            font-size: 13px;
            color: var(--text-color-muted);
            margin-top: 12px;
            font-weight: 300;
            letter-spacing: 0.6px;
        }

        /* ==========================================================================
          SUB-SECTION 1.4: TRANSFORMS KEYFRAMES ARCHITECTURE ENGINE
          ========================================================================== */
        @keyframes System_LinearRotationLoop {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes System_InverseRotationLoop {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        @keyframes HUD_DotPulseGlow {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 0 0 15px var(--neon-glow-dim);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 30px var(--neon-cyan), 0 0 50px var(--neon-cyan);
            }
        }

        @keyframes UI_ButtonPulseEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.09); box-shadow: 0 0 45px var(--neon-cyan), 0 0 20px var(--neon-blue); }
        }

        @keyframes HUD_SlideDownAnimation {
            from { opacity: 0; transform: translateY(-30px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes HUD_DeckSlideUpAnimation {
            from { opacity: 0; transform: translateY(35px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes UI_SubtitlePopUpEffect {
            from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.92); }
            to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }

        /* ==========================================================================
          SUB-SECTION 1.5: MULTI-DISPLAY LAYOUT MEDIA RESPONSIVENESS GRID
          ========================================================================== */
        @media (max-width: 768px) {
            .dashboard {
                top: 20px;
                left: 20px;
                padding: 14px 22px;
                border-radius: 18px;
                font-size: 12px;
            }
            
            .status-dot {
                width: 9px;
                height: 9px;
                margin-right: 10px;
            }

            .status-label { font-size: 12px; }
            .meta-info { font-size: 11px; margin-top: 4px; }
            .ui-container { bottom: 30px; padding: 0 20px; gap: 12px; }

            .input-box {
                height: 58px;
                padding: 0 24px;
                border-radius: 29px;
            }

            input { font-size: 16px; }
            .control-btn { width: 58px; height: 58px; font-size: 20px; }
            #subtitle-box { bottom: 110px; font-size: 15px; padding: 14px 26px; border-radius: 20px; }
        }

        @media (max-width: 480px) {
            .dashboard { max-width: calc(100% - 40px); }
            .input-box { border-radius: 26px; padding: 0 18px; }
            input { font-size: 15px; }
        }
    </style>

            engineWebGLRendererObject.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            engineWebGLRendererObject.toneMapping = THREE.ACESFilmicToneMapping;
            engineWebGLRendererObject.toneMappingExposure = 1.2;
            engineWebGLRendererObject.outputEncoding = THREE.sRGBEncoding;
            
            // Critical Patch: Explicitly set background layout clearing color flags to zero transparency
            engineWebGLRendererObject.setClearColor(0x000000, 0); 
            TARGET_DOM_CANVAS_VIEWPORT_CONTAINER.appendChild(engineWebGLRendererObject.domElement);

            // High Precision Camera Perspective Matrix Viewport Build (Depth alignment fix)
            enginePerspectiveCameraObject = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
            enginePerspectiveCameraObject.position.set(0, 0.20, 3.1); 

            // Orbit Interactivity Control Matrix Initial Setup Layer
            engineOrbitControlsObject = new THREE.OrbitControls(enginePerspectiveCameraObject, engineWebGLRendererObject.domElement);
            engineOrbitControlsObject.enableZoom = true;
            engineOrbitControlsObject.enablePan = false;
            engineOrbitControlsObject.minDistance = 1.5;
            engineOrbitControlsObject.maxDistance = 4.5;
            engineOrbitControlsObject.target.set(0, 0.12, 0); // Precise centering matrix target lock
            engineOrbitControlsObject.enableDamping = true;
            engineOrbitControlsObject.dampingFactor = 0.05;

            // Expanded Balanced Lighting Setup Array Map
            const environmentHemisphereLightingNode = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
            engineThreeSceneObject.add(environmentHemisphereLightingNode);

            const highIntensityKeyDirectionalLightingNode = new THREE.DirectionalLight(0xfff7ef, 1.8);
            highIntensityKeyDirectionalLightingNode.position.set(2.5, 4.5, 5.0);
            engineThreeSceneObject.add(highIntensityKeyDirectionalLightingNode);

            const fillBounceRimLightingNode = new THREE.DirectionalLight(0x00bfff, 0.7);
            fillBounceRimLightingNode.position.set(-3.0, -2.0, -2.0);
            engineThreeSceneObject.add(fillBounceRimLightingNode);

            // Asset Loader Context Framework Pipeline Execution Block
            const assetPipelineGLTFLoaderEngineInstance = new THREE.GLTFLoader();
            assetPipelineGLTFLoaderEngineInstance.load(REMOTE_GLTF_MODEL_BINARY_URL, (processedGltfAssetBundle) => {
                
                // Active Loader Mask Curtain Dissolve Script
                const DOMUI_LoaderScreenContainerElement = document.getElementById('loader');
                DOMUI_LoaderScreenContainerElement.style.opacity = 0;
                setTimeout(() => { 
                    DOMUI_LoaderScreenContainerElement.style.display = 'none'; 
                }, 600);

                structuralPriyaModelObject = processedGltfAssetBundle.scene;
                engineThreeSceneObject.add(structuralPriyaModelObject);
                executeDynamicResponsiveFormFactorLayoutScaling();

                // Dynamic Animation Timeline Vector Mapping Rig
                globalLoadedAnimationClipsStorageArray = processedGltfAssetBundle.animations;
                engineAnimationMixerObject = new THREE.AnimationMixer(structuralPriyaModelObject);
                
                if (globalLoadedAnimationClipsStorageArray && globalLoadedAnimationClipsStorageArray.length > 0) {
                    activelyRunningAnimationActionObject = engineAnimationMixerObject.clipAction(globalLoadedAnimationClipsStorageArray[0]);
                    activelyRunningAnimationActionObject.setEffectiveWeight(1.0);
                    activelyRunningAnimationActionObject.play(); 
                }

                // Deep Traversal Skeletal Mapping Tree Parsing Block
                structuralPriyaModelObject.traverse((evaluatedRigNode) => {
                    if (evaluatedRigNode.isBone) {
                        const compiledBoneNameStringValue = evaluatedRigNode.name.toLowerCase();
                        if (compiledBoneNameStringValue.includes('head')) {
                            characterSkeletalHeadNodeBone = evaluatedRigNode;
                        }
                        if (compiledBoneNameStringValue.includes('neck')) {
                            characterSkeletalNeckNodeBone = evaluatedRigNode;
                        }
                    }
                    if (evaluatedRigNode.morphTargetDictionary) {
                        activelyTrackedSkinnedMeshInstancesArray.push(evaluatedRigNode);
                    }
                });
            }, undefined, (gltfStreamingRuntimeFaultException) => {
                console.error("Asset loader parsing engine terminated unexpectedly:", gltfStreamingRuntimeFaultException);
                document.getElementById('loader').style.display = 'none';
            });

            // Active Viewport Sizing Window Event Registries
            window.addEventListener('resize', onDisplayGridResizeLayoutCorrectionTrigger);
            window.addEventListener('mousemove', onMouseCoordinateTrackingVectorShift);
            
            // Native Responsive Touch Vector Interceptors Layout Mapping
            window.addEventListener('touchmove', (nativeTouchEventPayloadData) => {
                if(nativeTouchEventPayloadData.touches.length > 0) {
                    realTimeCalculatedTargetMouseX = (nativeTouchEventPayloadData.touches[0].clientX / window.innerWidth) * 2 - 1;
                    realTimeCalculatedTargetMouseY = -(nativeTouchEventPayloadData.touches[0].clientY / window.innerHeight) * 2 + 1;
                }
            }, { passive: true });
        }

        // Mathematical Scaling Factor Array Corrections Layer Matching Display Aspect Metrics
        function executeDynamicResponsiveFormFactorLayoutScaling() {
            if (!structuralPriyaModelObject) return;
            const mobileDisplayFormFactorDetectedFlag = window.innerWidth < 768;
            
            // Compute Scalar Bounds Ratios
            let optimizedLayoutScalarFactor = mobileDisplayFormFactorDetectedFlag ? window.innerWidth / 470 : window.innerWidth / 1060;
            structuralPriyaModelObject.scale.setScalar(optimizedLayoutScalarFactor);
            
            // Balanced Position Y Depth Matrix Offsets (Fixed Black Screen Model Clamping Bug)
            structuralPriyaModelObject.position.y = mobileDisplayFormFactorDetectedFlag ? -0.84 : -1.14;
            structuralPriyaModelObject.position.x = 0;
            structuralPriyaModelObject.position.z = 0;
        }

        function onMouseCoordinateTrackingVectorShift(nativeMouseDataEvent) {
            realTimeCalculatedTargetMouseX = (nativeMouseDataEvent.clientX / window.innerWidth) * 2 - 1;
            realTimeCalculatedTargetMouseY = -(nativeMouseDataEvent.clientY / window.innerHeight) * 2 + 1;
        }

        function onDisplayGridResizeLayoutCorrectionTrigger() {
            enginePerspectiveCameraObject.aspect = window.innerWidth / window.innerHeight;
            enginePerspectiveCameraObject.updateProjectionMatrix();
            engineWebGLRendererObject.setSize(window.innerWidth, window.innerHeight);
            executeDynamicResponsiveFormFactorLayoutScaling();
        }

        /*
          ------------------------------------------------------------------
          D. VOCAL SYNTHESIS HARDWARE HOOKS & SPECTRAL SIGNAL COUPLERS
          ------------------------------------------------------------------
        */
        function forceAudioSignalAnalysisContextCalibration() {
            if (structuralNativeAudioContext) return;
            try {
                structuralNativeAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                structuralAudioAnalyserNode = structuralNativeAudioContext.createAnalyser();
                structuralAudioAnalyserNode.fftSize = 128;
                structuralFrequencyBufferArray = new Uint8Array(structuralAudioAnalyserNode.frequencyBinCount);
            } catch(audioGraphInitializationException) {
                console.error("Native Audio Device Node Parsing Framework build crashed:", audioGraphInitializationException);
            }
        }

        function routeOutputStringToNeuralVocalSynthesizer(compiledAIPayloadResponseText) {
            if (!window.speechSynthesis) return;
            forceAudioSignalAnalysisContextCalibration();
            
            // Re-assert Sound Card Audio Loop Context Live State Check
            if(structuralNativeAudioContext && structuralNativeAudioContext.state === 'suspended') {
                structuralNativeAudioContext.resume();
            }
            window.speechSynthesis.cancel();
            
            // Extract Action Expressions from Active Text Payload Processing Stream
            let cleanFilteredVocalSpeechTextStream = compiledAIPayloadResponseText.replace(/\[.*?\]/g, '').trim();
            
            const DOMSubtitleBoxDisplayOverlayElement = document.getElementById('subtitle-box');
            DOMSubtitleBoxDisplayOverlayElement.innerText = compiledAIPayloadResponseText; 
            DOMSubtitleBoxDisplayOverlayElement.style.display = 'block';

            let structuralSpeechUtteranceObjectInstance = new SpeechSynthesisUtterance(cleanFilteredVocalSpeechTextStream);
            structuralSpeechUtteranceObjectInstance.lang = 'hi-IN';
            structuralSpeechUtteranceObjectInstance.rate = 1.01; 
            structuralSpeechUtteranceObjectInstance.pitch = 1.09;

            structuralSpeechUtteranceObjectInstance.onstart = () => { 
                applicationVoiceOutputStateActive = true; 
            };
            
            structuralSpeechUtteranceObjectInstance.onend = () => { 
                applicationVoiceOutputStateActive = false; 
                internalMouthVolumeScalarValue = 0; 
                DOMSubtitleBoxDisplayOverlayElement.style.display = 'none';
            };
            
            structuralSpeechUtteranceObjectInstance.onerror = (utteranceRuntimeChannelFaultException) => {
                console.error("System Speech Synthesizer pipeline driver encountered a fault:", utteranceRuntimeChannelFaultException);
                applicationVoiceOutputStateActive = false;
                DOMSubtitleBoxDisplayOverlayElement.style.display = 'none';
            };

            window.speechSynthesis.speak(structuralSpeechUtteranceObjectInstance);
        }

        /*
          ------------------------------------------------------------------
          E. CONTINUOUS RENDER FRAME DRIVER ROUTINES & VERTEX DISPLACERS
          ------------------------------------------------------------------
        */
        function masterApplicationGraphicsRenderFrameLoop() {
            requestAnimationFrame(masterApplicationGraphicsRenderFrameLoop);
            
            const processDeltaTimelineIncrementValue = engineClockSystemReference.getDelta();
            const processContinuousAbsoluteRunTimeValue = engineClockSystemReference.getElapsedTime();

            if (engineAnimationMixerObject) {
                engineAnimationMixerObject.update(processDeltaTimelineIncrementValue);
            }
            if (engineOrbitControlsObject) {
                engineOrbitControlsObject.update();
            }

            // Real-Time Audio Signal Spectral Decoupler Using Discrete Fourier Calculation Fast Arrays
            if (applicationVoiceOutputStateActive && structuralAudioAnalyserNode) {
                structuralAudioAnalyserNode.getByteFrequencyData(structuralFrequencyBufferArray);
                let numericalFrequencySumAccumulatorValue = 0;
                for (let trackIdx = 0; trackIdx < structuralFrequencyBufferArray.length; trackIdx++) {
                    numericalFrequencySumAccumulatorValue += structuralFrequencyBufferArray[trackIdx];
                }
                internalMouthVolumeScalarValue = numericalFrequencySumAccumulatorValue / structuralFrequencyBufferArray.length;
            }

            // Real-Time Linear Interpolation Tracking Matrix Loop Configurations
            if (structuralPriyaModelObject) {
                // Tracking Speed Deceleration Damping Calculation Vectors (Lerp Engine Mapping Grid)
                trackingInterpolatedMouseX = THREE.MathUtils.lerp(trackingInterpolatedMouseX, realTimeCalculatedTargetMouseX, 0.05);
                trackingInterpolatedMouseY = THREE.MathUtils.lerp(trackingInterpolatedMouseY, realTimeCalculatedTargetMouseY, 0.05);

                if (characterSkeletalHeadNodeBone) {
                    characterSkeletalHeadNodeBone.rotation.y = trackingInterpolatedMouseX * 0.25; 
                    characterSkeletalHeadNodeBone.rotation.x = -trackingInterpolatedMouseY * 0.14; 
                }
                if (characterSkeletalNeckNodeBone) {
                    characterSkeletalNeckNodeBone.rotation.y = trackingInterpolatedMouseX * 0.10;
                }

                // Sinusoidal Spatial Distortion Vertex Re-shaper Weights Configuration Array Mapping
                let currentFrameMouthOpeningMorphWeightValue = applicationVoiceOutputStateActive ? Math.min(internalMouthVolumeScalarValue / 7.0, 1.12) : 0;
                let mathematicalBlinkingPeriodicIntervalWeightValue = (Math.sin(processContinuousAbsoluteRunTimeValue * 3.7) > 0.94) ? 1.0 : 0.0;

                activelyTrackedSkinnedMeshInstancesArray.forEach(skinnedMeshNodeInstanceRef => {
                    const activeMorphTargetMeshDictionaryMap = skinnedMeshNodeInstanceRef.morphTargetDictionary;
                    const activeMorphInfluencesWeightTrackingArray = skinnedMeshNodeInstanceRef.morphTargetInfluences;
                    
                    if (!activeMorphTargetMeshDictionaryMap || !activeMorphInfluencesWeightTrackingArray) return;

                    // Map Vowel Open Morph Target Rig Node Parameters Over Active Submeshes Array
                    ['mouthOpen', 'jawOpen', 'Mouth_Open', 'vowel_a'].forEach(mouthShapeKeyIdentifierString => {
                        if (activeMorphTargetMeshDictionaryMap[mouthShapeKeyIdentifierString] !== undefined) {
                            activeMorphInfluencesWeightTrackingArray[activeMorphTargetMeshDictionaryMap[mouthShapeKeyIdentifierString]] = THREE.MathUtils.lerp(activeMorphInfluencesWeightTrackingArray[activeMorphTargetMeshDictionaryMap[mouthShapeKeyIdentifierString]], currentFrameMouthOpeningMorphWeightValue, 0.45);
                        }
                    });

                    // Map Standard Automatic Eye Blinking Parameters Over Active Submeshes Array
                    ['eyeBlinkLeft', 'eyeBlinkRight', 'blink', 'Blink'].forEach(eyeBlinkShapeKeyIdentifierString => {
                        if (activeMorphTargetMeshDictionaryMap[eyeBlinkShapeKeyIdentifierString] !== undefined) {
                            activeMorphInfluencesWeightTrackingArray[activeMorphTargetMeshDictionaryMap[eyeBlinkShapeKeyIdentifierString]] = THREE.MathUtils.lerp(activeMorphInfluencesWeightTrackingArray[activeMorphTargetMeshDictionaryMap[eyeBlinkShapeKeyIdentifierString]], mathematicalBlinkingPeriodicIntervalWeightValue, 0.55);
                        }
                    });
                });
            }

            // Execute Frame Push to Hardware Drawing Matrix Array Context
            engineWebGLRendererObject.render(engineThreeSceneObject, enginePerspectiveCameraObject);
        }

        /*
          ------------------------------------------------------------------
          F. APP VIEW COMPONENT CONTROLLER INTERFACE REACTION HANDLERS DOCK
          ------------------------------------------------------------------
        */
        const DOMUI_ElementTextInputBar = document.getElementById('userInput');
        const DOMUI_ElementSendButtonTrigger = document.getElementById('sendBtn');
        const DOMUI_ElementMicButtonTrigger = document.getElementById('micBtn');

        async function triggerInteractionLifecycleExecutionCycle() {
            const clearExtractedInputTextString = DOMUI_ElementTextInputBar.value.trim();
            if (!clearExtractedInputTextString) return;
            DOMUI_ElementTextInputBar.value = "";
            
            document.getElementById('mood-txt').innerText = "प्रिया सोच रही है... 🤔";
            
            // Random Skeletal Action Blending Pipeline Loop Handler Instantiation Grid
            if (engineAnimationMixerObject && globalLoadedAnimationClipsStorageArray.length > 0) {
                engineAnimationMixerObject.stopAllAction();
                let operationalRandomClipsIndexFactor = Math.floor(Math.random() * globalLoadedAnimationClipsStorageArray.length);
                let targetFiredAnimationActionObject = engineAnimationMixerObject.clipAction(globalLoadedAnimationClipsStorageArray[operationalRandomClipsIndexFactor]);
                targetFiredAnimationActionObject.fadeIn(0.22).play();
            }

            const activeReturnedNetworkPayloadText = await executeSecureAICoreRequestTunnel(clearExtractedInputTextString);
            document.getElementById('mood-txt').innerText = "जेमिनी nv1 लाइव डायरेक्ट ⚡";
            
            routeOutputStringToNeuralVocalSynthesizer(activeReturnedNetworkPayloadText);
        }

        // Native Automated Speech Capturing API Interceptor Block Setup Mapping
        if (dynamicSpeechRecognitionProcessorInstance) {
            dynamicSpeechRecognitionProcessorInstance.onstart = () => {
                applicationSpeechRecognitionListeningActive = true;
                DOMUI_ElementMicButtonTrigger.classList.add('listening');
                DOMUI_ElementTextInputBar.placeholder = "सुन रही हूँ sweetie, बोलिए...";
            };

            dynamicSpeechRecognitionProcessorInstance.onerror = (speechProcessorModuleFaultErrorEvent) => {
                console.error("Speech capturing driver layer runtime warning error encountered:", speechProcessorModuleFaultErrorEvent);
                applicationSpeechRecognitionListeningActive = false;
                DOMUI_ElementMicButtonTrigger.classList.remove('listening');
                DOMUI_ElementTextInputBar.placeholder = "प्रिया से कुछ भी पूछें...";
            };

            dynamicSpeechRecognitionProcessorInstance.onend = () => {
                applicationSpeechRecognitionListeningActive = false;
                DOMUI_ElementMicButtonTrigger.classList.remove('listening');
                DOMUI_ElementTextInputBar.placeholder = "प्रिया से कुछ भी पूछें...";
            };

            dynamicSpeechRecognitionProcessorInstance.onresult = (transcriptionOutputPayloadEvent) => {
                const capturedTranscribedTextResultString = transcriptionOutputPayloadEvent.results[0][0].transcript;
                DOMUI_ElementTextInputBar.value = capturedTranscribedTextResultString;
                triggerInteractionLifecycleExecutionCycle();
            };

            DOMUI_ElementMicButtonTrigger.addEventListener('click', () => {
                if (applicationSpeechRecognitionListeningActive) {
                    dynamicSpeechRecognitionProcessorInstance.stop();
                } else {
                    if(window.speechSynthesis) window.speechSynthesis.cancel();
                    dynamicSpeechRecognitionProcessorInstance.start();
                }
            });
        } else {
            DOMUI_ElementMicButtonTrigger.style.display = 'none'; // Structural degradation safe path fallback
        }

        // General Structural UI Event Handlers Link Mapping
        DOMUI_ElementSendButtonTrigger.addEventListener('click', triggerInteractionLifecycleExecutionCycle);
        DOMUI_ElementTextInputBar.addEventListener('keypress', (nativeHardwareKeyboardEvent) => { 
            if (nativeHardwareKeyboardEvent.key === 'Enter') {
                triggerInteractionLifecycleExecutionCycle(); 
            }
        });

        /*
          ------------------------------------------------------------------
          G. APPLICATIONS CORE APP ENTRY RUNTIME BOOTSTRAPPING GRID INITIATOR
          ------------------------------------------------------------------
        */
        initializeThreeEngineGraphicsContext();
        masterApplicationGraphicsRenderFrameLoop();
    </script>
</body>
</html>
