   <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - 3D Keyless Assistant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* React UI के अनुसार प्योर ब्लैक बैकग्राउंड */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Loading Text */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 10px;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        /* --- UI Styling --- */
        .ui-container {
            position: absolute;
            bottom: 40px; /* React UI के अनुसार बॉटम स्पेसिंग */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* बटन और इनपुट के बीच की दूरी */
            z-index: 10;
        }

        .mic-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
            transition: transform 0.2s, background 0.3s;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .input-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0 20px;
            border-radius: 30px; /* गोलाकार किनारे */
            width: 60%; /* React UI के अनुसार चौड़ाई */
            max-width: 600px;
            height: 50px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            height: 100%;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-btn {
            background: white;
            color: black;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #e0e0e0;
        }
    </style>

    <!-- Three.js Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loader">प्रिया लोड हो रही है... कृपया प्रतीक्षा करें।</div>
    <div id="canvas-container"></div>

    <!-- Floating Modern UI (React से कनवर्टेड) -->
    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Priya se baat karein..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null;
        let mouthBone = null;
        let eyeBones = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };

        // --- 1. THE BRAIN (Gemini + Voice + Device Control) ---
        async function askPriya(input) {
            const cleanInput = input.toLowerCase();

            // Device-level Backup Commands (समय और बैटरी)
            if (cleanInput.includes("time") || cleanInput.includes("समय") || cleanInput.includes("बजे")) {
                return `Abhi ${new Date().toLocaleTimeString('hi-IN')} ho raha hai.`;
            }
            if (cleanInput.includes("battery") || cleanInput.includes("बैटरी")) {
                try {
                    const bat = await navigator.getBattery();
                    return `Battery ${Math.round(bat.level * 100)}% hai.`;
                } catch(e) {
                    return "Main aapki battery ka pta nahi laga pa rahi hoon.";
                }
            }

            // API Call Logic
            try {
                // अपनी Gemini API Key नीचे 'YOUR_API_KEY' की जगह डालें
                const apiKey = 'YOUR_API_KEY'; 
                
                if(apiKey !== 'YOUR_API_KEY') {
                    // Gemini API Call
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `You are Priya, a sentient 3D girl. Be sweet, human-like, and answer in Hindi. User: ${input}` }] }]
                        })
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } else {
                    // Keyless Backup API (Pollinations AI)
                    const systemPrompt = "You are Priya, a sweet sentient 3D AI assistant. Always answer the user in short, sweet, warm, and natural Hindi only. Do not use asterisks or markdown format.";
                    const response = await fetch(`https://text.pollinations.ai/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: input }
                            ],
                            model: "openai"
                        })
                    });
                    return await response.text();
                }
            } catch (err) {
                return "Net thoda slow hai, par main aapke paas hi hoon.";
            }
        }

        // Text-to-Speech (आवाज़ उत्पन्न करना)
        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 0.9; // React के समान स्पीड
            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; if(mouthBone) mouthBone.scale.y = 1; };
            window.speechSynthesis.speak(utter);
        }

        // --- 2. THE 3D SOUL (Real Physics & Expressions) ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#000000'); // डार्क नाइट लुक

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 5); // React PerspectiveCamera position={[0, 0, 5]}

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;

            // Environment & Lights Simulation
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(3, 10, 10);
            scene.add(dirLight);

            // GLTF Loader
            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustModelScale();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    const idleAnim = THREE.AnimationClip.findByName(gltf.animations, 'Idle') || gltf.animations[0];
                    mixer.clipAction(idleAnim).play();
                }

                // Natural Pose Fix & Bone References
                priyaModel.traverse((bone) => {
                    if (bone.isBone) {
                        if (bone.name.includes('Arm')) {
                            bone.rotation.z = bone.name.includes('Left') ? -1.45 : 1.45;
                            bone.rotation.x = 0.2;
                        }
                        if (bone.name === 'Head' || bone.name === 'Neck') headBone = bone;
                        if (bone.name === 'Mouth' || bone.name === 'Jaw') mouthBone = bone;
                        if (bone.name.toLowerCase().includes('eye')) eyeBones.push(bone);
                    }
                });
            }, undefined, (error) => {
                document.getElementById('loader').innerText = "मॉडल लोड करने में एरर आया!";
                console.error(error);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        function adjustModelScale() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            // React Responsive Scale Logic
            const scaleValue = isMobile ? window.innerWidth / 400 : window.innerWidth / 1000;
            priyaModel.scale.set(scaleValue, scaleValue, scaleValue);
            priyaModel.position.y = isMobile ? -1.2 : -1.5;
        }

        function onMouseMove(e) {
            // Mouse Tracking React के समान सूत्र से
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelScale();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (priyaModel) {
                // Eye Contact Logic (Lerp)
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.4, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.4, 0.1);
                }

                // Pro Lip-Sync Simulation
                if (isSpeaking && mouthBone) {
                    mouthBone.scale.y = 0.5 + Math.sin(t * 22) * 0.4;
                }

                // Natural Eye Blink
                const blink = Math.sin(t * 1.5) > 0.98 ? 0.1 : 1;
                eyeBones.forEach(eye => { eye.scale.y = blink; });

                // Breathing Physics
                const isMobile = window.innerWidth < 768;
                priyaModel.position.y = (isMobile ? -1.2 : -1.5) + Math.sin(t * 0.8) * 0.02;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 3. INTERFACE HANDLERS & MIC ---
        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        async function handleAction(textInput) {
            const val = textInput || inputEl.value.trim();
            if (!val) return;
            inputEl.value = "";
            const reply = await askPriya(val);
            speak(reply);
        }

        // Voice Recognition (माइक्रोफ़ोन फ़ंक्शन)
        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("आपका ब्राउज़र वॉइस रिकग्निशन सपोर्ट नहीं करता।");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            
            micBtn.style.background = '#00ffcc'; // सुनते समय बटन का रंग बदलेगा
            
            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                handleAction(speechToText);
            };
            
            recognition.onend = () => {
                micBtn.style.background = '#ff4b2b'; // बंद होने पर वापस लाल रंग
            };
            
            recognition.start();
        }

        sendBtn.addEventListener('click', () => handleAction());
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });
        micBtn.addEventListener('click', startMic);

        // सिस्टम को शुरू करें
        init3D();
        animate();
    </script>
</body>
</html>
