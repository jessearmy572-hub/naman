<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - nv2 Fixed Core</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #020205; font-family: sans-serif; }
        #image-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: transform 0.1s ease-out; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; }
        .dashboard { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .ui-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 25; padding: 0 20px; box-sizing: border-box; }
        .input-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); padding: 0 20px; border-radius: 30px; flex-grow: 1; max-width: 500px; height: 50px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.2); }
        input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .btn { background: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073" id="image-bg">

    <div class="dashboard">
        <div>मिजाज: <span id="mood-txt" style="color:#00ffcc;">नेचुरल 🌸</span></div>
        <div style="font-size: 11px; color:#aaa;">Status: nv2 Fixed Core Active</div>
    </div>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <div class="input-box"><input type="text" id="userInput" placeholder="बात करें..."></div>
        <button class="btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb";
        let scene, camera, renderer, mixer, clock, priyaModel, headBone;
        let allSkinnedMeshes = [];
        let isSpeaking = false, mousePos = { x: 0, y: 0 };
        let targetSmile = 0, targetShy = 0;

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 2.5);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 5, 5);
            scene.add(light);

            new THREE.GLTFLoader().load(MODEL_URL, (gltf) => {
                priyaModel = gltf.scene;
                scene.add(priyaModel);
                
                mixer = new THREE.AnimationMixer(priyaModel);
                if(gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();

                priyaModel.traverse(n => {
                    if (n.isBone && n.name.toLowerCase().includes('head')) headBone = n;
                    if (n.morphTargetDictionary) allSkinnedMeshes.push(n);
                });
                resize();
            });

            window.addEventListener('mousemove', e => {
                mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            window.addEventListener('resize', resize);
        }

        function resize() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            priyaModel.scale.setScalar(isMobile ? 1.0 : 1.25);
            // पैर ज़मीन पर लाने के लिए फिक्स पोजीशन
            priyaModel.position.y = isMobile ? -0.95 : -1.25; 
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'hi-IN';
            u.onstart = () => { isSpeaking = true; targetSmile = 0.8; document.getElementById('mood-txt').innerText = "बात कर रही हूँ 🎙️"; };
            u.onend = () => { isSpeaking = false; targetSmile = 0.2; document.getElementById('mood-txt').innerText = "नेचुरल 🌸"; };
            window.speechSynthesis.speak(u);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            if (mixer) mixer.update(clock.getDelta());

            // 1. बैकग्राउंड मोशन फिक्स
            document.getElementById('image-bg').style.transform = `scale(1.1) translate(${mousePos.x * 15}px, ${mousePos.y * 10}px)`;

            if (priyaModel) {
                // 2. सांस लेना (पैर बिना हिलाए)
                priyaModel.position.y += Math.sin(t * 1.5) * 0.0002;

                // 3. हेड मूवमेंट
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.4, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.2, 0.1);
                }

                // 4. ब्लिंकिंग और लिप-सिंक लॉजिक
                let blink = (Math.sin(t * 4) > 0.97 || Math.sin(t * 0.5) < -0.99) ? 1 : 0;
                let mouth = isSpeaking ? Math.abs(Math.sin(t * 12)) * 0.4 : 0;

                allSkinnedMeshes.forEach(mesh => {
                    const d = mesh.morphTargetDictionary;
                    const inf = mesh.morphTargetInfluences;
                    
                    // आँखों का झपकना
                    const blinkTargets = ['eyeBlinkLeft', 'eyeBlinkRight', 'eyesClosed', 'Blink'];
                    blinkTargets.forEach(name => { if(d[name] !== undefined) inf[d[name]] = blink; });

                    // मुँह का हिलना (Lip-sync)
                    const mouthTargets = ['mouthOpen', 'jawOpen', 'viseme_aa'];
                    mouthTargets.forEach(name => { if(d[name] !== undefined) inf[d[name]] = mouth; });

                    // मुस्कुराहट
                    if(d['mouthSmile'] !== undefined) inf[d['mouthSmile']] = THREE.MathUtils.lerp(inf[d['mouthSmile']], targetSmile, 0.1);
                });
            }
            renderer.render(scene, camera);
        }

        document.getElementById('sendBtn').onclick = () => {
            const inp = document.getElementById('userInput');
            if (inp.value) { speak(inp.value); inp.value = ""; }
        };

        init();
        animate();
    </script>
</body>
</html>
