<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Animation Fixed Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background: linear-gradient(125deg, #050515, #0b112c, #030a16);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Arial, sans-serif; user-select: none;
            -webkit-user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 5; 
        }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 16px; z-index: 100; background: rgba(4,4,8,0.95);
            padding: 25px 45px; border-radius: 24px; text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.35); box-shadow: 0 0 40px rgba(0,255,204,0.3);
            pointer-events: none;
        }

        .dashboard {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 13px; z-index: 20; background: rgba(10, 10, 20, 0.7);
            padding: 12px 22px; border-radius: 18px; backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none;
        }

        .engine-switch {
            position: absolute; top: 20px; right: 20px; z-index: 30;
            background: rgba(10, 10, 20, 0.85); padding: 8px 15px;
            border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.3);
            color: white; font-size: 12px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .switch-input { display: none; }
        .switch-label {
            width: 34px; height: 18px; background: #444; display: block;
            border-radius: 10px; position: relative; transition: 0.3s;
        }
        .switch-label::after {
            content: ''; width: 14px; height: 14px; background: #fff;
            position: absolute; top: 2px; left: 2px; border-radius: 50%; transition: 0.3s;
        }
        .switch-input:checked + .switch-label { background: #00ffcc; }
        .switch-input:checked + .switch-label::after { left: 18px; }

        .status-dot {
            display: inline-block; width: 9px; height: 9px;
            background: #00ffcc; border-radius: 50%; margin-right: 7px;
            box-shadow: 0 0 12px #00ffcc;
        }

        .ui-container {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; z-index: 30; padding: 0 20px; box-sizing: border-box;
        }

        .mic-btn {
            background: linear-gradient(135deg, #ff4b2b, #ff416c); color: white;
            border: none; border-radius: 50%; width: 55px; height: 55px;
            cursor: pointer; font-size: 22px; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 5px 20px rgba(255, 75, 43, 0.4);
            transition: all 0.2s ease;
        }

        .input-box {
            background: rgba(5, 5, 10, 0.65); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); padding: 0 25px; border-radius: 30px;
            flex-grow: 1; max-width: 550px; height: 55px; display: flex;
            align-items: center; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        input {
            width: 100%; background: transparent; border: none;
            color: white; outline: none; font-size: 16px; height: 100%;
        }
        input::placeholder { color: rgba(255,255,255,0.4); }

        .send-btn {
            background: #ffffff; color: #000; border: none; border-radius: 50%;
            width: 55px; height: 55px; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(255,255,255,0.25);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="dashboard">
        <div><span class="status-dot" id="dot"></span> मिजाज: <span id="mood-txt" style="color:#00ffcc; font-weight:bold;">सक्रिय 🥰</span></div>
        <div style="font-size: 11px; color:#aaa; margin-top:2px;">इंजन मोड: <span id="engine-status" style="color:#ffb703;">क्लासिक (ओरिजिनल) 📦</span></div>
    </div>

    <div class="engine-switch" title="स्पीड बदलने के लिए छुएं">
        <span>टर्बो मोड</span>
        <input type="checkbox" id="turboToggle" class="switch-input">
        <label for="turboToggle" class="switch-label"></label>
    </div>

    <div id="loader">न्यूरल एनीमेशन ग्रिड रीबूट हो रहा है...<br><span style="font-size:11px; color:#aaa;">Fixing Lipsing & Eye Blinking Logic</span></div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="यहाँ लिखें या माइक दबाकर बोलें..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null, headBone = null;
        let allSkinnedMeshes = []; 
        let hemiLight, sunLight, fillLight;
        
        let particleSystem, particleGeometry;
        const PARTICLE_COUNT = 150;

        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let audioCtx = null, analyser = null, dataArray = null;
        let mouthVolume = 0;
        let forceTouchTimer = 0;
        
        let currentEmotion = "neutral";
        let targetSmile = 0.3, targetShy = 0, targetRomantic = 0;
        let conversationHistory = [];

        const raycaster = new THREE.Raycaster();
        const touchVector = new THREE.Vector2();

        function createAmbientParticles() {
            particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const randomSpeeds = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 5;  
                positions[i + 1] = (Math.random() - 0.5) * 4 + 0.3;  
                positions[i + 2] = (Math.random() - 0.5) * 3;  
                randomSpeeds[i / 3] = Math.random() * 0.5 + 0.2;
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMaterial = new THREE.PointsMaterial({
                color: 0x00ffcc,
                size: window.innerWidth < 768 ? 0.026 : 0.014,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            particleSystem.userData = { speeds: randomSpeeds };
            scene.add(particleSystem);
        }

        function loadMemory() {
            const savedHistory = localStorage.getItem('priya_memory');
            if (savedHistory) conversationHistory = JSON.parse(savedHistory);
        }

        function saveMemory(userMsg, aiReply) {
            conversationHistory.push({ user: userMsg, ai: aiReply });
            if (conversationHistory.length > 5) conversationHistory.shift();
            localStorage.setItem('priya_memory', JSON.stringify(conversationHistory));
        }

        async function askPriya(input) {
            try {
                let contextString = "You are Priya, a sweet loving human girl. Speak in very short, warm Hinglish sentences. Never use asterisks or markdown. Previous context:\n";
                conversationHistory.forEach(h => { contextString += `User: ${h.user} -> Priya: ${h.ai}\n`; });

                const isTurboChecked = document.getElementById('turboToggle').checked;
                const chosenModel = isTurboChecked ? "mistral-large" : "openai"; 

                const response = await fetch(`https://text.pollinations.ai/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: contextString },
                            { role: "user", content: input }
                        ],
                        model: chosenModel 
                    })
                });
                
                let replyText = await response.text();
                let cleanText = replyText.replace(/Priya:/gi, '').replace(/[*#`_\-]/g, '').trim();

                let lowerText = cleanText.toLowerCase();
                if (lowerText.includes("love") || lowerText.includes("pyaar") || lowerText.includes("dil")) {
                    setEmotion("romantic");
                } else if (lowerText.includes("sharm") || lowerText.includes("uff") || lowerText.includes("sorry")) {
                    setEmotion("shy");
                } else {
                    setEmotion("happy"); 
                }

                saveMemory(input, cleanText);
                return cleanText;
            } catch (err) {
                return "Main sun rahi hoon, boliye na.";
            }
        }

        function setEmotion(emotion) {
            currentEmotion = emotion;
            if (emotion === "happy") {
                targetSmile = 0.8; targetShy = 0; targetRomantic = 0;
                document.getElementById('mood-txt').innerText = "खुश 😄";
            } else if (emotion === "shy") {
                targetSmile = 0.2; targetShy = 0.7; targetRomantic = 0;
                document.getElementById('mood-txt').innerText = "शर्मीली 😳";
            } else if (emotion === "romantic") {
                targetSmile = 0.5; targetShy = 0; targetRomantic = 0.8;
                document.getElementById('mood-txt').innerText = "रोमांटिक 🥰";
            }
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) {}
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            initAudio();
            window.speechSynthesis.cancel();
            
            let utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 1.0; 

            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; mouthVolume = 0; setEmotion("happy"); };
            utter.onerror = () => { isSpeaking = false; mouthVolume = 0; };

            window.speechSynthesis.speak(utter);
        }

        function handleInstantTouch(event) {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON' || event.target.closest('.engine-switch')) return;

            let clientX = event.changedTouches ? event.changedTouches[0].clientX : event.clientX;
            let clientY = event.changedTouches ? event.changedTouches[0].clientY : event.clientY;

            touchVector.x = (clientX / window.innerWidth) * 2 - 1;
            touchVector.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(touchVector, camera);
            if (!priyaModel) return;

            const intersects = raycaster.intersectObjects(priyaModel.children, true);
            if (intersects.length > 0) {
                let hitY = intersects[0].point.y; 
                forceTouchTimer = 3.5; 

                if (hitY > 0.35) {
                    setEmotion("romantic");
                    speak("Aapka touch seedhe mere dil me utar jata hai...");
                } else if (hitY <= 0.35 && hitY > -0.2) {
                    setEmotion("shy");
                    speak("Uff... aise mat chhuo na, mujhe sharm aati hai.");
                } else {
                    setEmotion("happy");
                    speak("Aapka sath mujhe sach me bahut accha lagta hai.");
                }
            }
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050515, 0.2);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.22, 2.1); 

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.target.set(0, 0.15, 0);

            hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 1.4);
            scene.add(hemiLight);
            
            sunLight = new THREE.DirectionalLight(0xfff3e0, 1.4);
            sunLight.position.set(2, 4, 3.5);
            scene.add(sunLight);

            fillLight = new THREE.DirectionalLight(0x00ffcc, 0.5); 
            fillLight.position.set(-2, 1, 2);
            scene.add(fillLight);

            createAmbientParticles(); 

            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.display = 'none';
                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustLayout();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer.clipAction(gltf.animations[0]).play(); 
                }

                priyaModel.traverse((node) => {
                    if (node.isBone && (node.name.toLowerCase().includes('head') || node.name.toLowerCase().includes('neck'))) {
                        headBone = node;
                    }
                    if (node.isMesh) {
                        allSkinnedMeshes.push(node);
                    }
                });
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', handleInstantTouch);
            window.addEventListener('touchstart', handleInstantTouch, {passive: true});
        }

        function adjustLayout() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            priyaModel.scale.setScalar(isMobile ? window.innerWidth / 355 : window.innerWidth / 800);
            priyaModel.position.y = isMobile ? -0.92 : -1.22;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustLayout();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            // ऑडियो डेटा कैप्चर री-वेरिफाइड
            if (isSpeaking && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) { total += dataArray[i]; }
                mouthVolume = total / dataArray.length;
            }

            if (particleSystem) {
                const positions = particleGeometry.attributes.position.array;
                const speeds = particleSystem.userData.speeds;

                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    let idx = i * 3;
                    positions[idx + 1] += Math.sin(t * 0.4 + i) * 0.0018 * speeds[i];
                    positions[idx] += Math.cos(t * 0.4 + i) * 0.001 * speeds[i];

                    let dx = mousePos.x * 1.6 - positions[idx];
                    let dy = mousePos.y * 1.1 - positions[idx + 1];
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 0.55) {
                        positions[idx] += dx * 0.018;
                        positions[idx + 1] += dy * 0.018;
                    }
                    if (positions[idx + 1] > 2.0) positions[idx + 1] = -1.4;
                }
                particleGeometry.attributes.position.needsUpdate = true;
            }

            if (priyaModel) {
                if (forceTouchTimer > 0 && headBone) {
                    forceTouchTimer -= delta;
                } else if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.25, 0.06);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.14, 0.06);
                }

                // एनीमेशन कैलकुलेशन फिक्स 
                let openLipValue = isSpeaking ? Math.min(mouthVolume / 10, 1.0) : 0;
                let blinkValue = (Math.sin(t * 3.5) > 0.95 || Math.sin(t * 0.5) < -0.98) ? 1.0 : 0.0;

                allSkinnedMeshes.forEach(mesh => {
                    let dict = mesh.morphTargetDictionary;
                    let influences = mesh.morphTargetInfluences;
                    if (!dict || !influences) return;

                    // लिप सिंक ब्लेंड शेप्स मैपिंग
                    ['mouthOpen', 'jawOpen', 'viseme_aa', 'Mouth_Open'].forEach(shape => {
                        if (dict[shape] !== undefined) influences[dict[shape]] = THREE.MathUtils.lerp(influences[dict[shape]], openLipValue, 0.45);
                    });

                    // आई ब्लिंकिंग ब्लेंड शेप्स मैपिंग
                    ['eyeBlinkLeft', 'eyeBlinkRight', 'blink', 'Eyes_Blink'].forEach(shape => {
                        if (dict[shape] !== undefined) influences[dict[shape]] = THREE.MathUtils.lerp(influences[dict[shape]], blinkValue, 0.6);
                    });

                    if (dict['mouthSmile'] !== undefined) influences[dict['mouthSmile']] = THREE.MathUtils.lerp(influences[dict['mouthSmile']], targetSmile, 0.1);
                    if (dict['browInnerUp'] !== undefined) influences[dict['browInnerUp']] = THREE.MathUtils.lerp(influences[dict['browInnerUp']], targetShy, 0.1);
                    if (dict['eyeSquintLeft'] !== undefined) influences[dict['eyeSquintLeft']] = THREE.MathUtils.lerp(influences[dict['eyeSquintLeft']], targetRomantic, 0.1);
                });

                priyaModel.position.y += Math.sin(t * 1.2) * 0.00038;
            }

            renderer.render(scene, camera);
        }

        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const turboToggle = document.getElementById('turboToggle');

        turboToggle.addEventListener('change', () => {
            const statusEl = document.getElementById('engine-status');
            if(turboToggle.checked) {
                statusEl.innerText = "टर्बो स्पीड ⚡";
                statusEl.style.color = "#00ffcc";
            } else {
                statusEl.innerText = "क्लासिक (ओरिजिनल) 📦";
                statusEl.style.color = "#ffb703";
            }
        });

        async function handleAction(forcedValue = null) {
            const val = forcedValue ? forcedValue.trim() : inputEl.value.trim();
            if (!val) return;
            
            inputEl.value = ""; 
            document.getElementById('mood-txt').innerText = "सोच रही हूँ... 🤔"; 
            
            const reply = await askPriya(val);
            speak(reply);
        }

        sendBtn.addEventListener('click', () => handleAction());
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });

        micBtn.addEventListener('click', () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("आपका ब्राउज़र वॉइस सपोर्ट नहीं करता।");
            
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';
            rec.continuous = false;
            rec.interimResults = false;

            micBtn.style.background = '#00ffcc';
            micBtn.style.transform = 'scale(1.1)';
            document.getElementById('mood-txt').innerText = "सुन रही हूँ... 🎤";

            rec.onresult = (e) => {
                const speechText = e.results[0][0].transcript;
                if(speechText.trim() !== "") {
                    handleAction(speechText); 
                }
            };

            rec.onerror = () => {
                document.getElementById('mood-txt').innerText = "आवाज़ समझ नहीं आई 🥺";
            };

            rec.onend = () => {
                micBtn.style.background = 'linear-gradient(135deg, #ff4b2b, #ff416c)';
                micBtn.style.transform = 'scale(1)';
            };

            rec.start();
        });

        loadMemory(); 
        init3D();
        animate();
    </script>
</body>
</html>
