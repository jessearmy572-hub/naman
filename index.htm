<html lang="hi">
<head>

          ==========================================================================

        :root {

            --neon-blue: #0099ff;
            --neon-pink: #ff416c;
            --neon-orange: #ff4b2b;
            --neon-glow: rgba(0, 255, 204, 0.45);
            --neon-glow-dim: rgba(0, 255, 204, 0.15);
            --bg-dark: #020205;
            --bg-deep-matrix: #04040a;
            --panel-bg: rgba(10, 10, 20, 0.7);
            --panel-bg-heavy: rgba(5, 5, 10, 0.9);
            --border-white: rgba(255, 255, 255, 0.15);
            --border-cyan: rgba(0, 255, 204, 0.3);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-snappy: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ==========================================================================
          SECTION 2: CSS RESET & HARDWARE LAYERING SYSTEM
          ==========================================================================
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-primary);
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            position: relative;
        }

        /* ==========================================================================
          SECTION 3: BACKGROUND SCENERY & LAYER DEPTH MANAGEMENT
          ==========================================================================
        */
        #image-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            filter: brightness(0.55) contrast(1.15) saturate(0.9);
            transform: scale(1.02);
            transition: filter 0.5s ease;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* ==========================================================================
          SECTION 4: HIGH-END HOLOGRAPPHIC INTERACTIVE HEADS-UP DISPLAY (HUD)
          ==========================================================================
        */

            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            color: var(--text-primary);
            background: var(--panel-bg);
            padding: 16px 26px;
            border-radius: 22px;
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border-white);
            box-shadow: 0 20px 45px rgba(0,0,0,0.75), 
                        inset 0 1px 2px rgba(255,255,255,0.15),
                        0 0 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            letter-spacing: 0.6px;
            transform: translateZ(0);
            will-change: transform, opacity;
            animation: HUD_EntryAnimation 0.9s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .status-container {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .status-dot {
            display: inline-block;
            width: 11px;
            height: 11px;
            background: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 12px var(--neon-cyan), 
                        0 0 24px var(--neon-cyan),
                        0 0 35px var(--neon-cyan);
            animation: HUD_PulseGlow 2.5s infinite ease-in-out;
            will-change: opacity, box-shadow;
        }

        .status-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        .meta-info {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-value {
            color: var(--neon-cyan);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-glow-dim);
        }

          ==========================================================================

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep-matrix);
            color: var(--text-primary);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.25, 1), 
                        visibility 0.8s ease;
            will-change: opacity;
        }

        .loader-spinner-box {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-spinner {
            width: 70px;
            height: 70px;
            border: 3px solid rgba(0, 255, 204, 0.08);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-blue);
            animation: System_LoopSpin 1.2s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
        }

        .loader-spinner-inner {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 2px solid transparent;
            border-radius: 50%;
            border-left-color: var(--neon-pink);
            border-right-color: var(--neon-orange);
            animation: System_LoopSpinInverse 0.8s linear infinite;
        }

        .loader-text {
            color: var(--neon-cyan);
            font-size: 19px;
            letter-spacing: 2.5px;
            text-align: center;
            text-shadow: 0 0 12px var(--neon-glow);
            font-weight: 400;
            text-transform: uppercase;
        }

        .loader-subtext {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
          SECTION 6: CONTROLS DECK UI & TYPOGRAPHY SYSTEM
          ==========================================================================
        */
        .ui-container {
            position: absolute;
            bottom: 45px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 25;
            padding: 0 35px;
            box-sizing: border-box;
            will-change: transform, opacity;
            animation: HUD_DeckEntryAnimation 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .input-box {
            background: rgba(4, 4, 8, 0.82);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 0 30px;
            border-radius: 40px;
            flex-grow: 1;
            max-width: 650px;
            height: 65px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 50px rgba(0,0,0,0.65), 
                        inset 0 1px 1px rgba(255,255,255,0.08);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .input-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: 0.5s;
        }

        .input-box:focus-within::before {
            left: 100%;
            transition: 0.7s ease-in-out;
        }

        .input-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3), 
                        0 20px 50px rgba(0,0,0,0.7);
            transform: translateY(-2px);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
            font-size: 17px;
            height: 100%;
            letter-spacing: 0.4px;
            font-weight: 400;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.38);
            transition: color 0.3s ease;
        }

        input:focus::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

          SECTION 7: PREMIUM COMPONENT ACTION BUTTONS
          ==========================================================================
        */
        .control-btn {
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            outline: none;
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #ffffff;
            font-size: 24px;
            box-shadow: 0 10px 28px rgba(255, 75, 43, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .mic-btn:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 14px 35px rgba(255, 75, 43, 0.65);
        }

        .mic-btn:active {
            transform: scale(0.94) translateY(0);
        }

        .mic-btn.listening {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            box-shadow: 0 0 35px var(--neon-cyan), 0 0 15px var(--neon-blue);

        }

            background: #ffffff;
            color: #030307;
            font-size: 22px;
            box-shadow: 0 10px 28px rgba(255,255,255,0.28);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .send-btn:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 14px 35px rgba(255,255,255,0.45);
            background: #f4f4f9;
        }

        .send-btn:active {
            transform: scale(0.94) translateY(0);
        }

          SECTION 8: HIGH-VISIBILITY CAPTIONS SUBTITLE MONITOR PANEL
          ==========================================================================
        */
        #subtitle-box {

            bottom: 135px;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            background: rgba(3, 3, 7, 0.88);
            padding: 15px 32px;
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            max-width: 82%;
            width: auto;
            min-width: 200px;
            text-align: center;
            z-index: 30;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            display: none;
            pointer-events: none;
            line-height: 1.6;
            letter-spacing: 0.3px;
            font-weight: 500;
            animation: UI_SubtitlePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            will-change: transform, opacity;
        }

        /* ==========================================================================
          SECTION 9: SYSTEM KEYFRAME TRANSFORMS GRAPHICS DRIVER ARCHITECTURE
          ==========================================================================
        */
        @keyframes System_LoopSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes System_LoopSpinInverse {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        @keyframes HUD_PulseGlow {
            0%, 100% {
                opacity: 0.65;
                box-shadow: 0 0 12px var(--neon-glow-dim);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 28px var(--neon-cyan), 0 0 45px var(--neon-cyan);
            }
        }

        @keyframes UI_PulseMicButton {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); box-shadow: 0 0 40px var(--neon-cyan), 0 0 15px var(--neon-blue); }
        }

        @keyframes HUD_EntryAnimation {
            from {
                opacity: 0;
                transform: translateY(-25px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes HUD_DeckEntryAnimation {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes UI_SubtitlePop {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(15px) scale(0.93);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        /* ==========================================================================
          SECTION 10: COMPLEX RESPONSIVE FORM FACTOR MEDIA QUERIES GRID
          ==========================================================================
        */
        @media (max-width: 768px) {
            .dashboard {
                top: 15px;
                left: 15px;
                padding: 12px 18px;
                border-radius: 16px;
                font-size: 11px;
            }
            
            .status-dot {
                width: 8px;
                height: 8px;
                margin-right: 8px;
            }

            .status-label {
                font-size: 11px;
            }

            .meta-info {
                font-size: 10px;
                margin-top: 3px;
            }

            .ui-container {
                bottom: 25px;
                padding: 0 15px;
                gap: 10px;
            }

            .input-box {
                height: 54px;
                padding: 0 20px;
                border-radius: 27px;
            }

            input {
                font-size: 15px;
            }

            .control-btn {
                width: 54px;
                height: 54px;
                font-size: 18px;
            }

            #subtitle-box {
                bottom: 100px;
                font-size: 14px;
                padding: 12px 22px;
                border-radius: 18px;
            }
        }

        @media (max-width: 480px) {
            .dashboard {
                max-width: calc(100% - 30px);
            }
            .input-box {
                border-radius: 25px;
            }
        }
    </style>

                // Recursively Parse Character Skeletal Rig Tree Node Branches
                targetPriya3DModel.traverse((graphNode) => {
                    if (graphNode.isBone) {
                        const validatedBoneNameString = graphNode.name.toLowerCase();
                        if (validatedBoneNameString.includes('head')) {
                            skeletalBoneHeadNode = graphNode;
                        }
                        if (validatedBoneNameString.includes('neck')) {
                            skeletalBoneNeckNode = graphNode;
                        }
                    }
                    if (graphNode.morphTargetDictionary) {
                        activeSkinnedMeshNodesArray.push(graphNode);
                    }
                });
            }, undefined, (loadRuntimeError) => {
                console.error("Asset stream system terminal fault:", loadRuntimeError);
                document.getElementById('loader').style.display = 'none';
            });

            // Register Viewport Window Layout Event Interceptors
            window.addEventListener('resize', onViewportResizeGridExecution);
            window.addEventListener('mousemove', onMouseCoordinateVectorMoveTracking);
            
            // Native Responsive Touch Event Translators
            window.addEventListener('touchmove', (nativeTouchEvent) => {
                if(nativeTouchEvent.touches.length > 0) {
                    dynamicTargetVectorX = (nativeTouchEvent.touches[0].clientX / window.innerWidth) * 2 - 1;
                    dynamicTargetVectorY = -(nativeTouchEvent.touches[0].clientY / window.innerHeight) * 2 + 1;
                }
            }, { passive: true });
        }

        // Compute Structural Scale Factors Matching Active Display Aspect Ratios
        function computeResponsiveScaleLayout() {
            if (!targetPriya3DModel) return;
            const operationalMobileLayoutFlag = window.innerWidth < 768;
            
            // Compute Scalar Vectors Mathematically
            let dynamicScaleScalarFactor = operationalMobileLayoutFlag ? window.innerWidth / 475 : window.innerWidth / 1080;
            targetPriya3DModel.scale.setScalar(dynamicScaleScalarFactor);
            
            // Ground Y-Offset Balancing
            targetPriya3DModel.position.y = operationalMobileLayoutFlag ? -0.86 : -1.16;
            targetPriya3DModel.position.x = 0;
            targetPriya3DModel.position.z = 0;
        }

        function onMouseCoordinateVectorMoveTracking(nativeMouseEvent) {
            dynamicTargetVectorX = (nativeMouseEvent.clientX / window.innerWidth) * 2 - 1;
            dynamicTargetVectorY = -(nativeMouseEvent.clientX / window.innerHeight) * 2 + 1;
        }

        function onViewportResizeGridExecution() {
            globalPerspectiveCamera.aspect = window.innerWidth / window.innerHeight;
            globalPerspectiveCamera.updateProjectionMatrix();
            globalWebGLRenderer.setSize(window.innerWidth, window.innerHeight);
            computeResponsiveScaleLayout();
        }

        /*
          ------------------------------------------------------------------
          D. NATIVE SPEECH CAPTURING & AUDIO FREQUENCY COUPLING PROTOCOLS
          ------------------------------------------------------------------
        */
        function enforceAudioSpectrumContextInitialization() {
            if (globalNativeAudioContext) return;
            try {
                globalNativeAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                globalAudioAnalyserNode = globalNativeAudioContext.createAnalyser();
                globalAudioAnalyserNode.fftSize = 128;
                dataFrequencyArrayBuffer = new Uint8Array(globalAudioAnalyserNode.frequencyBinCount);
            } catch(audioGraphSetupFault) {
                console.error("Hardware audio analyzer module initialization failed:", audioGraphSetupFault);
            }
        }

        function dispatchNeuralVocalSynthesisTrack(aiOutputStringPayload) {
            if (!window.speechSynthesis) return;
            enforceAudioSpectrumContextInitialization();
            
            // Re-verify Sound Card Stream Context Availability State
            if(globalNativeAudioContext && globalNativeAudioContext.state === 'suspended') {
                globalNativeAudioContext.resume();
            }
            window.speechSynthesis.cancel();
            
            // Strip Action Tags Out from Text-To-Speech Track Data Buffer
            let filteredCleanSpeechStreamText = aiOutputStringPayload.replace(/\[.*?\]/g, '').trim();
            
            const DOMSubtitleBoxDisplayOverlay = document.getElementById('subtitle-box');
            DOMSubtitleBoxDisplayOverlay.innerText = aiOutputStringPayload; 
            DOMSubtitleBoxDisplayOverlay.style.display = 'block';

            let processingSpeechUtteranceObject = new SpeechSynthesisUtterance(filteredCleanSpeechStreamText);
            processingSpeechUtteranceObject.lang = 'hi-IN';
            processingSpeechUtteranceObject.rate = 1.02; 
            processingSpeechUtteranceObject.pitch = 1.08;

            processingSpeechUtteranceObject.onstart = () => { 
                systemVoiceStateActive = true; 
            };
            
            processingSpeechUtteranceObject.onend = () => { 
                systemVoiceStateActive = false; 
                computationalMouthVolumeValue = 0; 
                DOMSubtitleBoxDisplayOverlay.style.display = 'none';
            };
            
            processingSpeechUtteranceObject.onerror = (utteranceRuntimeFault) => {
                console.error("Vocal track processor context failure:", utteranceRuntimeFault);
                systemVoiceStateActive = false;
                DOMSubtitleBoxDisplayOverlay.style.display = 'none';
            };

            window.speechSynthesis.speak(processingSpeechUtteranceObject);
        }

        /*
          ------------------------------------------------------------------
          E. HIGH FREQUENCY DEVENT LOOP & VERTEX RE-SHAPER ENGINES
          ------------------------------------------------------------------
        */
        function executionGraphMainRenderLoop() {
            requestAnimationFrame(executionGraphMainRenderLoop);
            
            const highPrecisionDeltaTimeValue = appClockReference.getDelta();
            const continuousAbsoluteElapsedTimeValue = appClockReference.getElapsedTime();

            if (globalAnimationMixer) {
                globalAnimationMixer.update(highPrecisionDeltaTimeValue);
            }
            if (globalOrbitControls) {
                globalOrbitControls.update();
            }

            // High Precision Fast Fourier Transform Audio Real-Time Vector Decoder
            if (systemVoiceStateActive && globalAudioAnalyserNode) {
                globalAudioAnalyserNode.getByteFrequencyData(dataFrequencyArrayBuffer);
                let proceduralFrequencySumAccumulator = 0;
                for (let channelIdx = 0; channelIdx < dataFrequencyArrayBuffer.length; channelIdx++) {
                    proceduralFrequencySumAccumulator += dataFrequencyArrayBuffer[channelIdx];
                }
                computationalMouthVolumeValue = proceduralFrequencySumAccumulator / dataFrequencyArrayBuffer.length;
            }

            // Real-Time Linear Interpolation & Bone Constraint Calculators Loop
            if (targetPriya3DModel) {
                // Smooth Lerp Calculations Matching Tracking Vector Coordinates
                functionalMouseVectorX = THREE.MathUtils.lerp(functionalMouseVectorX, dynamicTargetVectorX, 0.055);
                functionalMouseVectorY = THREE.MathUtils.lerp(functionalMouseVectorY, dynamicTargetVectorY, 0.055);

                if (skeletalBoneHeadNode) {
                    skeletalBoneHeadNode.rotation.y = functionalMouseVectorX * 0.26; 
                    skeletalBoneHeadNode.rotation.x = -functionalMouseVectorY * 0.15; 
                }
                if (skeletalBoneNeckNode) {
                    skeletalBoneNeckNode.rotation.y = functionalMouseVectorX * 0.11;
                }

                // Dynamic Sinusoidal Vertex Shape Transform Mapping Matrix Calculations
                let targetedMouthOpeningMorphWeight = systemVoiceStateActive ? Math.min(computationalMouthVolumeValue / 7.2, 1.15) : 0;
                let autoPeriodicBlinkingCycleWeight = (Math.sin(continuousAbsoluteElapsedTimeValue * 3.6) > 0.95) ? 1.0 : 0.0;

                activeSkinnedMeshNodesArray.forEach(meshNodeReference => {
                    const structuralMorphTargetDictionary = meshNodeReference.morphTargetDictionary;
                    const activelyDeployedMorphInfluencesArray = meshNodeReference.morphTargetInfluences;
                    
                    if (!structuralMorphTargetDictionary || !activelyDeployedMorphInfluencesArray) return;

                    // Dynamically Bind Jaw Opening Shapes Over Multi-Skeletal Layouts
                    ['mouthOpen', 'jawOpen', 'Mouth_Open', 'vowel_a'].forEach(mouthShapeKeyString => {
                        if (structuralMorphTargetDictionary[mouthShapeKeyString] !== undefined) {
                            activelyDeployedMorphInfluencesArray[structuralMorphTargetDictionary[mouthShapeKeyString]] = THREE.MathUtils.lerp(activelyDeployedMorphInfluencesArray[structuralMorphTargetDictionary[mouthShapeKeyString]], targetedMouthOpeningMorphWeight, 0.48);
                        }
                    });

                    // Dynamically Bind Dual Eye Blink System Morph Targets Shapes
                    ['eyeBlinkLeft', 'eyeBlinkRight', 'blink', 'Blink'].forEach(eyeBlinkShapeKeyString => {
                        if (structuralMorphTargetDictionary[eyeBlinkShapeKeyString] !== undefined) {
                            activelyDeployedMorphInfluencesArray[structuralMorphTargetDictionary[eyeBlinkShapeKeyString]] = THREE.MathUtils.lerp(activelyDeployedMorphInfluencesArray[structuralMorphTargetDictionary[eyeBlinkShapeKeyString]], autoPeriodicBlinkingCycleWeight, 0.58);
                        }
                    });
                });
            }

            globalWebGLRenderer.render(globalThreeScene, globalPerspectiveCamera);
        }

        /*
          ------------------------------------------------------------------
          F. REACTIVE ACTION PIPELINE & ELEMENT CONTROLLER EVENT REGISTRY
          ------------------------------------------------------------------
        */
        const UIElementTextInputField = document.getElementById('userInput');
        const UIElementSendActionButton = document.getElementById('sendBtn');
        const UIElementMicActionButton = document.getElementById('micBtn');

        async function processActiveInteractionEventCycle() {
            const parsedCleanUserTextQuery = UIElementTextInputField.value.trim();
            if (!parsedCleanUserTextQuery) return;
            UIElementTextInputField.value = "";
            
            document.getElementById('mood-txt').innerText = "प्रिया सोच रही है... 🤔";
            
            // Random Base Skeletal Blend Transition Actions Handler Trigger
            if (globalAnimationMixer && globalAnimationClipsArray.length > 0) {
                globalAnimationMixer.stopAllAction();
                let operationalRandomClipsIndex = Math.floor(Math.random() * globalAnimationClipsArray.length);
                let freshlyFiredAnimationAction = globalAnimationMixer.clipAction(globalAnimationClipsArray[operationalRandomClipsIndex]);
                freshlyFiredAnimationAction.fadeIn(0.25).play();
            }

            const computationReturnedTextPayload = await fetchAIResponseFromDirectTunnel(parsedCleanUserTextQuery);
            document.getElementById('mood-txt').innerText = "जेमिनी nv1 लाइव डायरेक्ट ⚡";
            
            dispatchNeuralVocalSynthesisTrack(computationReturnedTextPayload);
        }

        // Native Speech Capturing Event Processor Mapping Block
        if (speechRecognitionProcessorInstance) {
            speechRecognitionProcessorInstance.onstart = () => {
                systemListeningStateActive = true;
                UIElementMicActionButton.classList.add('listening');
                UIElementTextInputField.placeholder = "सुन रही हूँ sweetie, बोलिए...";
            };

            speechRecognitionProcessorInstance.onerror = (recognitionModuleErrorEvent) => {
                console.error("Speech capturing module runtime warning:", recognitionModuleErrorEvent);
                systemListeningStateActive = false;
                UIElementMicActionButton.classList.remove('listening');
                UIElementTextInputField.placeholder = "प्रिया से कुछ भी पूछें...";
            };

            speechRecognitionProcessorInstance.onend = () => {
                systemListeningStateActive = false;
                UIElementMicActionButton.classList.remove('listening');
                UIElementTextInputField.placeholder = "प्रिया से कुछ भी पूछें...";
            };

            speechRecognitionProcessorInstance.onresult = (transcriptionPayloadEvent) => {
                const structuralTranscribedOutputString = transcriptionPayloadEvent.results[0][0].transcript;
                UIElementTextInputField.value = structuralTranscribedOutputString;
                processActiveInteractionEventCycle();
            };

            UIElementMicActionButton.addEventListener('click', () => {
                if (systemListeningStateActive) {
                    speechRecognitionProcessorInstance.stop();
                } else {
                    if(window.speechSynthesis) window.speechSynthesis.cancel();
                    speechRecognitionProcessorInstance.start();
                }
            });
        } else {
            UIElementMicActionButton.style.display = 'none'; // Structural degradation safe path
        }

        // Standard Event Listeners Registry Mapping
        UIElementSendActionButton.addEventListener('click', processActiveInteractionEventCycle);
        UIElementTextInputField.addEventListener('keypress', (nativeKeyboardEvent) => { 
            if (nativeKeyboardEvent.key === 'Enter') {
                processActiveInteractionEventCycle(); 
            }
        });

        /*
          ------------------------------------------------------------------
          G. MONOLITHIC MATRIX INITIALIZER SYSTEM ENGINE ROOT
          ------------------------------------------------------------------
        */
        initializeThreeGraphicsPipeline();
        executionGraphMainRenderLoop();
    </script>
</body>
</html>
