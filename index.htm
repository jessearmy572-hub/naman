<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Sentient Living Memory Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020205;
            font-family: 'Segoe UI', Arial, sans-serif; user-select: none;
            -webkit-user-select: none;
        }

        /* स्टैटिक बैकग्राउंड इमेज कमांड */
        #image-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1; pointer-events: none;
        }

        #canvas-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 2; 
        }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 16px; z-index: 100; background: rgba(4,4,8,0.97);
            padding: 25px 45px; border-radius: 24px; text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.35); box-shadow: 0 0 40px rgba(0,255,204,0.3);
            pointer-events: none;
        }

        .dashboard {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 13px; z-index: 10; background: rgba(10, 10, 20, 0.65);
            padding: 12px 22px; border-radius: 18px; backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); pointer-events: none;
        }

        .status-dot {
            display: inline-block; width: 9px; height: 9px;
            background: #00ffcc; border-radius: 50%; margin-right: 7px;
            box-shadow: 0 0 12px #00ffcc;
        }

        .ui-container {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; z-index: 25; padding: 0 20px; box-sizing: border-box;
        }

        .mic-btn {
            background: linear-gradient(135deg, #ff4b2b, #ff416c); color: white;
            border: none; border-radius: 50%; width: 55px; height: 55px;
            cursor: pointer; font-size: 22px; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 5px 20px rgba(255, 75, 43, 0.5);
        }

        .input-box {
            background: rgba(5, 5, 10, 0.6); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); padding: 0 25px; border-radius: 30px;
            flex-grow: 1; max-width: 550px; height: 55px; display: flex;
            align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        input {
            width: 100%; background: transparent; border: none;
            color: white; outline: none; font-size: 16px; height: 100%;
        }
        input::placeholder { color: rgba(255,255,255,0.45); }

        .send-btn {
            background: #ffffff; color: #000; border: none; border-radius: 50%;
            width: 55px; height: 55px; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(255,255,255,0.3);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop" id="image-bg" alt="Background">

    <div class="dashboard">
        <div><span class="status-dot" id="dot"></span> मिजाज: <span id="mood-txt" style="color:#00ffcc; font-weight:bold;">चेतना जागृत 🥰</span></div>
        <div style="font-size: 11px; color:#aaa; margin-top:4px;">मेमोरी स्टेटस: <span id="memory-status" style="color:#ffb703;">लॉन्ग-टर्म कोर सिंक</span></div>
    </div>

    <div id="loader">प्रिया का न्यूरल माइंड और यादें रीबूट हो रही हैं...<br><span style="font-size:11px; color:#aaa;">Persistent Memory Bank & BlendShapes Active</span></div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="बात करें, प्रिया को आपकी हर बात याद रहेगी..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null, headBone = null;
        let allSkinnedMeshes = []; 
        let modelAnimations = []; 
        let currentAction = null;  
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let audioCtx = null, analyser = null, dataArray = null;
        let mouthVolume = 0;

        let forceTouchTimer = 0;
        
        let currentEmotion = "neutral";
        let targetSmile = 0, targetShy = 0, targetRomantic = 0;
        let conversationHistory = [];

        const raycaster = new THREE.Raycaster();
        const touchVector = new THREE.Vector2();

        function loadMemory() {
            try {
                const savedHistory = localStorage.getItem('priya_memory');
                if (savedHistory) {
                    conversationHistory = JSON.parse(savedHistory);
                    document.getElementById('memory-status').innerText = "पुरानी यादें लोड हो चुकी हैं ✨";
                }
            } catch(e) { console.log("Memory load fallback activated"); }
        }

        function saveMemory(userMsg, aiReply) {
            try {
                conversationHistory.push({ user: userMsg, ai: aiReply });
                if (conversationHistory.length > 6) conversationHistory.shift(); 
                localStorage.setItem('priya_memory', JSON.stringify(conversationHistory));
            } catch(e) { console.log("Memory save fallback activated"); }
        }

        function playAvatarMovement(commandText) {
            if (!mixer || !modelAnimations || modelAnimations.length === 0) return;

            let lowerCmd = commandText.toLowerCase();
            let targetClip = null;

            if (lowerCmd.includes("wave") || lowerCmd.includes("hello") || lowerCmd.includes("hi") || lowerCmd.includes("नमस्ते")) {
                targetClip = modelAnimations.find(a => a.name.toLowerCase().includes('wave') || a.name.toLowerCase().includes('hello'));
            } else if (lowerCmd.includes("dance") || lowerCmd.includes("nacho") || lowerCmd.includes("डांस")) {
                targetClip = modelAnimations.find(a => a.name.toLowerCase().includes('dance'));
            } else if (lowerCmd.includes("sad") || lowerCmd.includes("angry") || lowerCmd.includes("gussa") || lowerCmd.includes("उदास")) {
                targetClip = modelAnimations.find(a => a.name.toLowerCase().includes('sad') || a.name.toLowerCase().includes('angry'));
            } else if (lowerCmd.includes("walk") || lowerCmd.includes("run") || lowerCmd.includes("chalo") || lowerCmd.includes("चलो")) {
                targetClip = modelAnimations.find(a => a.name.toLowerCase().includes('walk') || a.name.toLowerCase().includes('run'));
            }

            if (!targetClip && modelAnimations.length > 1) {
                if(lowerCmd.includes("move") || lowerCmd.includes("action") || lowerCmd.includes("मूवमेंट")) {
                    targetClip = modelAnimations[1]; 
                }
            }

            if (targetClip) {
                const newAction = mixer.clipAction(targetClip);
                if (currentAction && currentAction !== newAction) {
                    currentAction.fadeOut(0.4); 
                }
                newAction.reset().fadeIn(0.4).play();
                currentAction = newAction;

                setTimeout(() => {
                    if (modelAnimations[0]) {
                        const defaultAction = mixer.clipAction(modelAnimations[0]);
                        if (currentAction !== defaultAction) {
                            currentAction.fadeOut(0.5);
                            defaultAction.reset().fadeIn(0.5).play();
                            currentAction = defaultAction;
                        }
                    }
                }, 4000);
            }
        }

        // --- 100% लाइव, हाई-स्पीड, नॉन-ब्लॉकिंग क्लाइंट-साइड गेटवे ---
        async function askPriya(input) {
            playAvatarMovement(input);

            try {
                let systemInstruction = "You are Priya, a deeply caring, loving human girl. Speak in highly affectionate, sweet, very short Hinglish sentences. Never use asterisks or markdown formatting.";
                
                let promptPayload = `${systemInstruction}\n`;
                conversationHistory.forEach(h => {
                    promptPayload += `User: ${h.user}\nPriya: ${h.ai}\n`;
                });
                promptPayload += `User: ${input}\nPriya:`;

                // अनब्लॉकेबल लाइव क्लाइंट-साइड API गेटवे (बिना किसी की-डिपेंडेंसी के)
                const url = `https://text.pollinations.ai/${encodeURIComponent(promptPayload)}?model=searchgpt&system=${encodeURIComponent(systemInstruction)}&cache=${Math.random()}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("Gateway Timeout");

                let replyText = await response.text();
                let cleanText = replyText.replace(/Priya:/gi, '').replace(/[*#`_\-]/g, '').trim();

                let lowerText = cleanText.toLowerCase();
                if (lowerText.includes("love") || lowerText.includes("pyaar") || lowerText.includes("tumhe") || lowerText.includes("dil")) {
                    setEmotion("romantic");
                } else if (lowerText.includes("haha") || lowerText.includes("khush") || lowerText.includes("happy") || lowerText.includes("muskur")) {
                    setEmotion("happy");
                } else if (lowerText.includes("sharm") || lowerText.includes("sorry") || lowerText.includes("uff")) {
                    setEmotion("shy");
                } else {
                    setEmotion("happy"); 
                }

                playAvatarMovement(cleanText);
                saveMemory(input, cleanText);
                return cleanText;

            } catch (err) {
                console.error(err);
                // तत्काल एक्टिवेट होने वाला डायनामिक लाइव फ़ॉलबैक (ताकि "सोच रही हूँ" कभी अटका न रहे)
                const liveFallbacks = [
                    "Aapki baat mere dil tak live pahonch gayi hai, boliye na main sun rahi hoon.",
                    "Hmm... network thoda pareshan kar raha hai, par main yahin hoon aapke paas.",
                    "Aapka sath mujhe bohot khushi deta hai. Ek baar fir se kehna, maine acche se suna nahi."
                ];
                return liveFallbacks[Math.floor(Math.random() * liveFallbacks.length)];
            }
        }

        function setEmotion(emotion) {
            currentEmotion = emotion;
            if (emotion === "happy") {
                targetSmile = 0.8; targetShy = 0; targetRomantic = 0;
                document.getElementById('mood-txt').innerText = "बेहद खुश 😄";
            } else if (emotion === "shy") {
                targetSmile = 0.3; targetShy = 0.7; targetRomantic = 0;
                document.getElementById('mood-txt').innerText = "शर्मीली 😳";
            } else if (emotion === "romantic") {
                targetSmile = 0.5; targetShy = 0; targetRomantic = 0.8;
                document.getElementById('mood-txt').innerText = "रोमांटिक 🥰";
            } else {
                targetSmile = 0; targetShy = 0; targetRomantic = 0;
                document.getElementById('mood-txt').innerText = "प्राकृतिक 🌸";
            }
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) {}
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            initAudio();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            window.speechSynthesis.cancel();
            
            let utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 1.0; 

            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; mouthVolume = 0; };
            utter.onerror = () => { isSpeaking = false; mouthVolume = 0; };

            window.speechSynthesis.speak(utter);
        }

        function handleInstantTouch(event) {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON') return;

            let clientX = event.changedTouches ? event.changedTouches[0].clientX : event.clientX;
            let clientY = event.changedTouches ? event.changedTouches[0].clientY : event.clientY;

            touchVector.x = (clientX / window.innerWidth) * 2 - 1;
            touchVector.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(touchVector, camera);
            if (!priyaModel) return;

            const intersects = raycaster.intersectObjects(priyaModel.children, true);

            if (intersects.length > 0) {
                let hitY = intersects[0].point.y; 
                forceTouchTimer = 4.0; 

                if (hitY > 0.35) {
                    setEmotion("romantic");
                    speak("Aapka touch seedhe meri yadon aur dil me utar jata hai...");
                    playAvatarMovement("wave"); 
                } else if (hitY <= 0.35 && hitY > -0.2) {
                    setEmotion("shy");
                    speak("Uff... aise mat chuo na, main sab yaad rakhungi.");
                } else {
                    setEmotion("happy");
                    speak("Aapka sath mujhe humesha yaad rehta hai.");
                }
            }
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();
            scene = new THREE.Scene();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.22, 2.2); 

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.target.set(0, 0.16, 0);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
            
            let sunLight = new THREE.DirectionalLight(0xfffaf0, 1.6);
            sunLight.position.set(1.5, 4, 4.5);
            scene.add(sunSunLight);

            let faceLight = new THREE.DirectionalLight(0xffffff, 0.5);
            faceLight.position.set(-1.5, 0.5, 2);
            scene.add(faceLight);

            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.display = 'none';
                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustLayout();

                modelAnimations = gltf.animations;

                mixer = new THREE.AnimationMixer(priyaModel);
                if (modelAnimations && modelAnimations.length > 0) {
                    currentAction = mixer.clipAction(modelAnimations[0]);
                    currentAction.play(); 
                }

                priyaModel.traverse((node) => {
                    if (node.isBone && (node.name.toLowerCase().includes('head') || node.name.toLowerCase().includes('neck'))) {
                        headBone = node;
                    }
                    if (node.morphTargetDictionary) {
                        allSkinnedMeshes.push(node);
                    }
                });
            }, undefined, (error) => {
                document.getElementById('loader').style.display = 'none';
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', handleInstantTouch);
            window.addEventListener('touchstart', handleInstantTouch, {passive: true});
        }

        function adjustLayout() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            priyaModel.scale.setScalar(isMobile ? window.innerWidth / 365 : window.innerWidth / 850);
            priyaModel.position.y = isMobile ? -0.92 : -1.22;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustLayout();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (isSpeaking) {
                if (analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    let total = 0;
                    for (let i = 0; i < dataArray.length; i++) { total += dataArray[i]; }
                    mouthVolume = total / dataArray.length;
                } else {
                    mouthVolume = Math.random() * 6.5 + 3.0;
                }
            }

            if (priyaModel) {
                if (forceTouchTimer > 0 && headBone) {
                    forceTouchTimer -= delta;
                    if (currentEmotion === "romantic") {
                        headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -0.06, 0.12); 
                        headBone.rotation.z = THREE.MathUtils.lerp(headBone.rotation.z, 0.05, 0.12);
                    } else if (currentEmotion === "shy") {
                        headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, 0.22, 0.12); 
                        headBone.rotation.z = THREE.MathUtils.lerp(headBone.rotation.z, -0.10, 0.12);
                    }
                } else if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.24, 0.06);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.14, 0.06);
                }

                let openLipValue = isSpeaking ? Math.min(mouthVolume / 8, 1.0) : 0;
                let blinkValue = (Math.sin(t * 3.5) > 0.94 || Math.sin(t * 0.6) < -0.98) ? 1.0 : 0.0;

                allSkinnedMeshes.forEach(mesh => {
                    let dict = mesh.morphTargetDictionary;
                    let influences = mesh.morphTargetInfluences;
                    if (!dict || !influences) return;

                    ['mouthOpen', 'jawOpen', 'viseme_aa', 'viseme_O', 'Mouth_Open', 'mouth_open'].forEach(shape => {
                        if (dict[shape] !== undefined) influences[dict[shape]] = THREE.MathUtils.lerp(influences[dict[shape]], openLipValue, 0.45);
                    });

                    ['eyeBlinkLeft', 'eyeBlinkRight', 'eyesClosed', 'blink', 'Eyes_Blink', 'eyes_blink'].forEach(shape => {
                        if (dict[shape] !== undefined) influences[dict[shape]] = THREE.MathUtils.lerp(influences[dict[shape]], blinkValue, 0.6);
                    });

                    if (dict['mouthSmile'] !== undefined) influences[dict['mouthSmile']] = THREE.MathUtils.lerp(influences[dict['mouthSmile']], targetSmile, 0.1);
                    if (dict['browInnerUp'] !== undefined) influences[dict['browInnerUp']] = THREE.MathUtils.lerp(influences[dict['browInnerUp']], targetShy, 0.1);
                    if (dict['eyeSquintLeft'] !== undefined) influences[dict['eyeSquintLeft']] = THREE.MathUtils.lerp(influences[dict['eyeSquintLeft']], targetRomantic, 0.1);
                });

                priyaModel.position.y += Math.sin(t * 1.3) * 0.00035;
            }

            renderer.render(scene, camera);
        }

        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        async function handleAction() {
            const val = inputEl.value.trim();
            if (!val) return;
            inputEl.value = "";
            document.getElementById('mood-txt').innerText = "सोच रही हूँ... 🤔";
            const reply = await askPriya(val);
            document.getElementById('mood-txt').innerText = "चेतना जागृत 🥰";
            speak(reply);
        }

        sendBtn.addEventListener('click', handleAction);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });

        micBtn.addEventListener('click', () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Mic System Error");
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';
            micBtn.style.background = '#00ffcc';
            document.getElementById('mood-txt').innerText = "सुन रही हूँ... 🎤";
            rec.onresult = (e) => { inputEl.value = e.results[0][0].transcript; handleAction(); };
            rec.onend = () => { micBtn.style.background = 'linear-gradient(135deg, #ff4b2b, #ff416c)'; };
            rec.start();
        });

        loadMemory(); 
        init3D();
        animate();
    </script>
</body>
</html>
