<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Core Fix Pro Version</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            padding: 20px 35px;
            border-radius: 12px;
            pointer-events: none;
            text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .dashboard {
            position: absolute;
            top: 25px;
            left: 25px;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(15, 15, 25, 0.75);
            padding: 12px 22px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .status-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            background: #00ffcc;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px #00ffcc;
        }

        /* Responsive Bottom UI Framework */
        .ui-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 20; /* UI को मॉडल के टच से ऊपर रखने के लिए */
            padding: 0 10px;
            box-sizing: border-box;
        }

        .mic-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            flex-shrink: 0;
        }

        .input-box {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 20px;
            border-radius: 30px;
            flex-grow: 1;
            max-width: 500px;
            height: 55px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 15px;
            height: 100%;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        .send-btn {
            background: white;
            color: black;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="dashboard">
        <div><span class="status-dot" id="dot"></span> मूड: <span id="mood-txt" style="color:#00ffcc; font-weight:bold;">हंसमुख 🥰</span></div>
        <div style="font-size: 11px; color:#aaa; margin-top:4px;">यूज़र: <span id="user-memory">अन्जान</span></div>
    </div>

    <div id="loader">प्रिया एक्टिव हो रही है...</div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="प्रिया से बात करें या टच करें..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null, mouthBone = null, spineBone = null;
        let leftEyeBone = null, rightEyeBone = null;
        let allMeshParts = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let utter = null;

        let audioCtx = null, analyser = null, dataArray = null;
        let mouthVolume = 0;

        let priyaMood = "happy";
        let wrongTouchCount = 0;
        let lastInteractionTime = Date.now();
        let idleFired = false;
        
        const raycaster = new THREE.Raycaster();
        const touchVector = new THREE.Vector2();

        let userName = localStorage.getItem("priya_user_name") || "";
        if(userName) {
            setTimeout(() => { document.getElementById("user-memory").innerText = userName; }, 1000);
        }

        // --- INTELLIGENT COMPANION BRAIN ---
        async function askPriya(input) {
            lastInteractionTime = Date.now(); 
            idleFired = false;
            const cleanInput = input.toLowerCase().trim();

            if(cleanInput.includes("mera naam")) {
                let extractedName = input.replace(/mera naam|hai|is/gi, "").trim();
                if(extractedName) {
                    userName = extractedName;
                    localStorage.setItem("priya_user_name", userName);
                    document.getElementById("user-memory").innerText = userName;
                    return `Aapka naam ${userName} hai, maine yaad rakha hai!`;
                }
            }

            if (cleanInput.includes("youtube") || cleanInput.includes("यूट्यूब")) {
                window.open("https://www.youtube.com", '_blank');
                return "Maine YouTube open kar diya hai.";
            }

            if(priyaMood === "angry") {
                return "Main abhi thodi naraaz hoon, aapne mujhe galat jagah touch kiya tha. Pehle sorry bolo!";
            }

            try {
                const response = await fetch(`https://text.pollinations.ai/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "You are Priya, a sweet real living 3D girl companion. Give warm, human-like, very short and cute answers in Hinglish text only. Never use stars or markdown symbols." },
                            { role: "user", content: input }
                        ],
                        model: "openai"
                    })
                });
                let replyText = await response.text();
                return replyText.replace(/[*#`_\-]/g, '').trim();
            } catch (err) {
                return "Main aapse hi connect hoon, par network dheema chal raha hai.";
            }
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) { console.log("Audio API Error:", e); }
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            initAudio();
            window.speechSynthesis.cancel();
            
            utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 1.0;

            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; mouthVolume = 0; resetMoodReaction(); };
            utter.onerror = () => { isSpeaking = false; mouthVolume = 0; resetMoodReaction(); };

            window.speechSynthesis.speak(utter);
        }

        // --- HIGH-SPEED SENSITIVE BODY TOUCH MATRIX ---
        function handleTouchDetection(event) {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            lastInteractionTime = Date.now();

            // Ignore hits if user clicks on bottom UI control panel
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON') return;

            let clientX = event.changedTouches ? event.changedTouches[0].clientX : event.clientX;
            let clientY = event.changedTouches ? event.changedTouches[0].clientY : event.clientY;

            touchVector.x = (clientX / window.innerWidth) * 2 - 1;
            touchVector.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(touchVector, camera);
            if (!priyaModel) return;

            // Instantly trace full character hierarchy mesh bounds
            const intersects = raycaster.intersectObjects(allMeshParts, true);

            if (intersects.length > 0) {
                let hitPointY = intersects[0].point.y; 

                // स्क्रीनशॉट की हाइट मैपिंग के आधार पर सटीक टच विभाजन (Y-Axis Analysis)
                // 1. HEAD / FACE ZONE (Y-Axis Highest Area)
                if (hitPointY > 0.4) {
                    priyaMood = "romantic";
                    wrongTouchCount = 0;
                    document.getElementById('mood-txt').innerText = "रोमांटिक 🥰";
                    document.getElementById('dot').style.background = "#ff007f";
                    document.getElementById('dot').style.boxShadow = "0 0 10px #ff007f";
                    speak("Aapka touch bohot pyaara hai... mujhe accha laga.");
                    triggerMotionReaction('happy');
                    return;
                }

                // 2. CHEST / SENSITIVE WAIST ZONE (Y-Axis Middle Area)
                if (hitPointY <= 0.4 && hitPointY > -0.3) {
                    wrongTouchCount++;
                    if(wrongTouchCount >= 2) {
                        priyaMood = "angry";
                        document.getElementById('mood-txt').innerText = "नाराज़ 😡";
                        document.getElementById('dot').style.background = "#ff3333";
                        document.getElementById('dot').style.boxShadow = "0 0 10px #ff3333";
                        speak("Aap gande ho! Maine kaha na wahan touch mat karo, main baat nahi karungi.");
                        triggerMotionReaction('angry');
                    } else {
                        priyaMood = "shy";
                        document.getElementById('mood-txt').innerText = "शर्मीला 😳";
                        document.getElementById('dot').style.background = "#ff99ff";
                        document.getElementById('dot').style.boxShadow = "0 0 10px #ff99ff";
                        speak("Hey... kya kar rahe ho? Mujhe sharm aati hai wahan touch mat karo.");
                        triggerMotionReaction('shy');
                    }
                    return;
                }

                // 3. LOWER BODY / ARMS ZONE (Y-Axis Low Area)
                if (hitPointY <= -0.3) {
                    priyaMood = "happy";
                    document.getElementById('mood-txt').innerText = "खुश 🥰";
                    document.getElementById('dot').style.background = "#00ffcc";
                    speak("Mera haath thama hai aapne? Mujhe hamesha apne saath rakhna.");
                    return;
                }
            }
        }

        // पोज़ और रोटेशन एडजस्टमेंट रिस्पॉन्स
        function triggerMotionReaction(state) {
            if(!headBone) return;
            if(state === 'angry') {
                headBone.rotation.y = 0.6; // गुस्सा होकर मुँह फेरना
                if(spineBone) spineBone.rotation.y = 0.15;
            } else if(state === 'shy') {
                headBone.rotation.x = 0.25; // शर्माकर सिर झुकाना
                headBone.rotation.z = -0.12;
            } else if(state === 'happy') {
                headBone.rotation.set(0, 0, 0);
            }
        }

        function resetMoodReaction() {
            if(!isSpeaking && priyaMood !== "angry" && headBone) {
                headBone.rotation.set(0,0,0);
                if(spineBone) spineBone.rotation.set(0,0,0);
            }
        }

        function checkProactiveIdle() {
            let elapsed = Date.now() - lastInteractionTime;
            if(elapsed > 20000 && !isSpeaking && !idleFired && priyaMood !== "angry") {
                idleFired = true;
                speak("Aap chup kyun ho gaye? Kahan kho gaye aap, mujhse baatein kijiye na.");
            }
        }

        // --- 3D INTERACTIVE GRAPHICS CORE ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#050508');

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.2, 3.2); // स्क्रीनशॉट के अनुसार कैरेक्टर व्यू फोकस सेट किया गया

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.target.set(0, 0.1, 0);

            // Studio Professional Portrait Lights Setup
            scene.add(new THREE.HemisphereLight(0xffffff, 0x555555, 1.1));
            let frontLight = new THREE.DirectionalLight(0xffffff, 1.4);
            frontLight.position.set(1, 3, 4);
            scene.add(frontLight);

            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.display = 'none';
                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustModelLayout();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    mixer.clipAction(gltf.animations[0]).play(); 
                }

                // DEEP ARMATURE HIERARCHY SCANNER
                priyaModel.traverse((node) => {
                    if (node.isMesh) {
                        allMeshParts.push(node); // टच डिटेक्शन की रफ़्तार बढ़ाने के लिए मेश ग्रिड स्टोर करें
                    }
                    if (node.isBone) {
                        let bName = node.name.toLowerCase();
                        if (bName.includes('head')) headBone = node;
                        if (bName.includes('spine') || bName.includes('pelvis')) spineBone = node;
                        if (bName.includes('mouth') || bName.includes('jaw') || bName.includes('lip')) mouthBone = node;
                        if (bName.includes('eye') && bName.includes('l')) leftEyeBone = node;
                        if (bName.includes('eye') && bName.includes('r')) rightEyeBone = node;
                    }
                });
            });

            // Fast Event Mapping
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', handleTouchDetection);
            window.addEventListener('touchstart', handleTouchDetection, {passive: true});
        }

        function adjustModelLayout() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            // स्क्रीनशॉट की इमेज के अनुसार परफेक्ट साइज स्केलिंग फ़ॉर्मूला
            priyaModel.scale.setScalar(isMobile ? window.innerWidth / 390 : window.innerWidth / 950);
            priyaModel.position.y = isMobile ? -1.0 : -1.3;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelLayout();
        }

        // --- ADVANCED CONTINUOUS ANIMATION TICK ENGINE ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);
            checkProactiveIdle();

            // Real-time Decibel Capturing
            if (isSpeaking && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) { total += dataArray[i]; }
                mouthVolume = total / dataArray.length;
            }

            if (priyaModel) {
                // Natural Mouse Eye/Head Tracking Tracking
                if (headBone && priyaMood !== "angry") {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.25, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.15, 0.1);
                }

                // 1. GUARANTEED FORCED LIP-SYNC MATRIX (100% WORKING)
                if (isSpeaking) {
                    let dynamicOpening = 0.3 + (mouthVolume / 35);
                    let finalClamp = Math.min(Math.max(dynamicOpening, 0.2), 1.4);
                    
                    if (mouthBone) {
                        mouthBone.scale.y = THREE.MathUtils.lerp(mouthBone.scale.y, finalClamp, 0.35);
                    } else {
                        // FALLBACK: अगर मॉडल में बोन लॉक है, तो हेड एरिया पर लाइव वाइब्रेशन सिंक लागू होगा
                        headBone.scale.x = 1 + Math.sin(t * 26) * 0.012;
                    }
                } else {
                    if(mouthBone) mouthBone.scale.y = THREE.MathUtils.lerp(mouthBone.scale.y, 1, 0.2);
                    if(!mouthBone && headBone) headBone.scale.x = 1;
                }

                // 2. FORCED NATURAL EYE BLINK ENGINE
                let blinkValue = Math.sin(t * 1.8) > 0.96 ? 0.05 : 1.0;
                if (leftEyeBone && rightEyeBone) {
                    leftEyeBone.scale.y = THREE.MathUtils.lerp(leftEyeBone.scale.y, blinkValue, 0.4);
                    rightEyeBone.scale.y = THREE.MathUtils.lerp(rightEyeBone.scale.y, blinkValue, 0.4);
                } else if(allMeshParts.length > 0) {
                    // FALLBACK MESH BLINKER: यदि बोन नहीं है तो मेश स्केल पर झपकी ट्रिगर होगी
                    allMeshParts.forEach(mesh => {
                        if(mesh.name.toLowerCase().includes("eye") || mesh.name.toLowerCase().includes("lid")) {
                            mesh.scale.y = THREE.MathUtils.lerp(mesh.scale.y, blinkValue, 0.4);
                        }
                    });
                }

                // Micro-Breathing Subtle Physics Simulation
                priyaModel.position.y += Math.sin(t * 1.1) * 0.00035;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- BUTTON LAYERS CONTROL LINKS ---
        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        async function handleExecution() {
            const val = inputEl.value.trim();
            if (!val) return;
            inputEl.value = "";
            const responseText = await askPriya(val);
            speak(responseText);
        }

        sendBtn.addEventListener('click', handleExecution);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleExecution(); });

        micBtn.addEventListener('click', () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Mic API support error.");
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';
            micBtn.style.background = '#00ffcc';
            rec.onresult = (e) => { inputEl.value = e.results[0][0].transcript; handleExecution(); };
            rec.onend = () => { micBtn.style.background = '#ff4b2b'; };
            rec.start();
        });

        init3D();
        animate();
    </script>
</body>
</html>
