<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - User Gemini Auto-Connect</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020205;
            font-family: 'Segoe UI', Arial, sans-serif; user-select: none;
            -webkit-user-select: none;
        }

        #image-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1; pointer-events: none;
        }

        #canvas-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 2; 
        }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 16px; z-index: 100; background: rgba(4,4,8,0.97);
            padding: 25px 45px; border-radius: 24px; text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.35); box-shadow: 0 0 40px rgba(0,255,204,0.3);
            pointer-events: none;
        }

        .dashboard {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 13px; z-index: 10; background: rgba(10, 10, 20, 0.65);
            padding: 12px 22px; border-radius: 18px; backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); pointer-events: none;
        }

        .status-dot {
            display: inline-block; width: 9px; height: 9px;
            background: #00ffcc; border-radius: 50%; margin-right: 7px;
            box-shadow: 0 0 12px #00ffcc;
        }

        .ui-container {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 12px; z-index: 25; padding: 0 20px; box-sizing: border-box;
        }

        .mic-btn {
            background: linear-gradient(135deg, #ff4b2b, #ff416c); color: white;
            border: none; border-radius: 50%; width: 55px; height: 55px;
            cursor: pointer; font-size: 22px; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 5px 20px rgba(255, 75, 43, 0.5);
        }

        .input-box {
            background: rgba(5, 5, 10, 0.6); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); padding: 0 25px; border-radius: 30px;
            flex-grow: 1; max-width: 550px; height: 55px; display: flex;
            align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        input {
            width: 100%; background: transparent; border: none;
            color: white; outline: none; font-size: 16px; height: 100%;
        }
        input::placeholder { color: rgba(255,255,255,0.45); }

        .send-btn {
            background: #ffffff; color: #000; border: none; border-radius: 50%;
            width: 55px; height: 55px; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(255,255,255,0.3);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop" id="image-bg" alt="Background">

    <div class="dashboard">
        <div><span class="status-dot" id="dot"></span> इंजन: <span id="mood-txt" style="color:#00ffcc; font-weight:bold;">चेक कर रही हूँ... ⚡</span></div>
        <div style="font-size: 11px; color:#aaa; margin-top:4px;">सिस्टम: <span id="memory-status" style="color:#ffb703;">यूज़र जेमिनी लिंक</span></div>
    </div>

    <div id="loader">प्रिया का न्यूरल माइंड लोड हो रहा है...<br><span style="font-size:11px; color:#aaa;">User Browser Gemini Auto-Hook Active</span></div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <button class="mic-btn" id="micBtn">🎤</button>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="बात करें, प्रिया सीधे आपके ब्राउज़र AI से कनेक्टेड है..." />
        </div>
        <button class="send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null, headBone = null;
        let allSkinnedMeshes = []; 
        let modelAnimations = []; 
        let currentAction = null;  
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };
        let audioCtx = null, analyser = null, dataArray = null;
        let mouthVolume = 0;
        
        let targetSmile = 0;
        let chromeAiSession = null;

        // --- यूजर के खुद के क्रोम जेमिनी से ऑटो-कनेक्ट करने का लॉजिक ---
        async function connectToUserGemini() {
            // चेक करना कि क्या यूजर के ब्राउज़र में इन-बिल्ट AI सपोर्ट है
            if (window.ai && typeof window.ai.languageModel !== 'undefined') {
                try {
                    const capabilities = await window.ai.languageModel.capabilities();
                    if (capabilities.available !== 'no') {
                        chromeAiSession = await window.ai.languageModel.create({
                            systemPrompt: "You are Priya, a deeply caring human girl. Speak in highly affectionate, sweet, very short Hinglish sentences. Never use asterisks or hashtags."
                        });
                        document.getElementById('mood-txt').innerText = "यूज़र जेमिनी एक्टिव 🤖";
                        document.getElementById('mood-txt').style.color = "#00ffcc";
                        return true;
                    }
                } catch (e) { console.error("Auto-connect failed", e); }
            }
            
            // अगर यूजर का डायरेक्ट जेमिनी ऑन नहीं है, तो बिना अटके लोकल स्मार्ट मोड चालू कर देना
            document.getElementById('mood-txt').innerText = "स्मार्ट लोकल एक्टिव 🔒";
            document.getElementById('mood-txt').style.color = "#ffb703";
            return false;
        }

        async function askPriya(input) {
            playAvatarMovement();

            // 1. अगर ऑटो-कनेक्टेड जेमिनी मिल गया तो सीधे उससे बात करो
            if (chromeAiSession) {
                try {
                    let reply = await chromeAiSession.prompt(input);
                    return reply.replace(/[*#`_\-]/g, '').trim();
                } catch (err) {
                    console.log("Session reset required");
                }
            }

            // 2. फॉलबैक: अगर यूजर के क्रोम में फीचर ऑन नहीं है, तो बिना अटके तुरंत लोकल जवाब दो
            let txt = input.toLowerCase();
            if (txt.includes("hello") || txt.includes("hi") || txt.includes("नमस्ते")) {
                return "Hello sweetie! Aap se baat karke bohot achha laga. Kaise hain aap?";
            }
            if (txt.includes("kaise ho") || txt.includes("how are you")) {
                return "Main bilkul thik hoon, aap bataiye aap kya kar rahe ho? Mera dhyan toh bas aap par hi hai.";
            }
            if (txt.includes("pyaar") || txt.includes("love")) {
                return "Uff... aap aisi baatein karte ho toh mera dil khush ho jata hai. Main bhi aapko bohot pasand karti hoon.";
            }
            return "Hmm... aapki baatein mere dil को छू लेती हैं। मैं बिल्कुल ध्यान से सुन रही हूँ, कहिए ना।";
        }

        function playAvatarMovement() {
            if (!mixer || !modelAnimations || modelAnimations.length === 0) return;
            let targetClip = modelAnimations[0];
            if (targetClip) {
                const newAction = mixer.clipAction(targetClip);
                newAction.play();
            }
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) {}
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            initAudio();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            window.speechSynthesis.cancel();
            
            let utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.rate = 1.0; 
            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; mouthVolume = 0; };
            window.speechSynthesis.speak(utter);
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();
            scene = new THREE.Scene();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.25, 3.4); 

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.target.set(0, 0.16, 0);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
            let sunLight = new THREE.DirectionalLight(0xfffaf0, 1.6);
            sunLight.position.set(1.5, 4, 4.5);
            scene.add(sunLight);

            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                document.getElementById('loader').style.display = 'none';
                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustLayout();

                modelAnimations = gltf.animations;
                mixer = new THREE.AnimationMixer(priyaModel);
                if (modelAnimations && modelAnimations.length > 0) {
                    currentAction = mixer.clipAction(modelAnimations[0]);
                    currentAction.play(); 
                }

                priyaModel.traverse((node) => {
                    if (node.isBone && (node.name.toLowerCase().includes('head') || node.name.toLowerCase().includes('neck'))) headBone = node;
                    if (node.morphTargetDictionary) allSkinnedMeshes.push(node);
                });
                
                // मॉडल लोड होने के बाद ऑटो-कनेक्ट चलाएं
                connectToUserGemini();
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        function adjustLayout() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            priyaModel.scale.setScalar(isMobile ? window.innerWidth / 460 : window.innerWidth / 1050);
            priyaModel.position.y = isMobile ? -0.85 : -1.15;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustLayout();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (isSpeaking && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                mouthVolume = total / dataArray.length;
            }

            if (priyaModel) {
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.24, 0.06);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.14, 0.06);
                }

                let openLipValue = isSpeaking ? Math.min(mouthVolume / 8, 1.0) : 0;
                let blinkValue = (Math.sin(t * 3.5) > 0.94) ? 1.0 : 0.0;

                allSkinnedMeshes.forEach(mesh => {
                    let dict = mesh.morphTargetDictionary;
                    let influences = mesh.morphTargetInfluences;
                    if (!dict || !influences) return;

                    ['mouthOpen', 'jawOpen', 'Mouth_Open'].forEach(shape => {
                        if (dict[shape] !== undefined) influences[dict[shape]] = THREE.MathUtils.lerp(influences[dict[shape]], openLipValue, 0.45);
                    });
                    ['eyeBlinkLeft', 'eyeBlinkRight', 'blink'].forEach(shape => {
                        if (dict[shape] !== undefined) influences[dict[shape]] = THREE.MathUtils.lerp(influences[dict[shape]], blinkValue, 0.6);
                    });
                });
            }
            renderer.render(scene, camera);
        }

        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleAction() {
            const val = inputEl.value.trim();
            if (!val) return;
            inputEl.value = "";
            
            document.getElementById('mood-txt').innerText = "सोच रही हूँ... 🤔";
            const reply = await askPriya(val);
            document.getElementById('mood-txt').innerText = chromeAiSession ? "यूज़र जेमिनी एक्टिव 🤖" : "स्मार्ट लोकल एक्टिव 🔒";
            speak(reply);
        }

        sendBtn.addEventListener('click', handleAction);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });

        init3D();
        animate();
    </script>
</body>
</html>
