<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nv1 Classic - Priya AI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Classic Glow Background */
        #bg { 
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, #001a1a 0%, #000 100%);
            z-index: 1;
        }

        #canvas-container { width: 100%; height: 100%; position: absolute; z-index: 2; }

        /* Simple HUD */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            color: #00f2ff; font-size: 14px; letter-spacing: 1px;
            text-shadow: 0 0 5px #00f2ff;
        }

        /* Legacy Input Style */
        .controls {
            position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; z-index: 100;
        }
        .input-box {
            background: rgba(0,0,0,0.8); border: 1px solid #00f2ff;
            width: 85%; max-width: 450px; display: flex; padding: 5px 15px; border-radius: 5px;
        }
        input { flex: 1; background: none; border: none; color: #fff; height: 40px; outline: none; }
        button { background: none; border: none; color: #00f2ff; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="hud">nv1_SYSTEM_v1.0 // ONLINE</div>

<div id="canvas-container"></div>

<div class="controls">
    <div class="input-box">
        <button id="mic">🎤</button>
        <input type="text" id="in" placeholder="Type command...">
        <button id="send">➔</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb";
    let scene, camera, renderer, mixer, clock, model, head, morphs = [], talking = false;

    // Core Engine
    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 2));

        new THREE.GLTFLoader().load(MODEL_URL, (gltf) => {
            model = gltf.scene;
            scene.add(model);
            mixer = new THREE.AnimationMixer(model);
            if(gltf.animations[0]) mixer.clipAction(gltf.animations[0]).play();
            
            model.traverse(n => {
                if(n.name.toLowerCase().includes('head')) head = n;
                if(n.morphTargetDictionary) morphs.push(n);
            });
            model.position.y = -1.2;
        });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const t = clock.getElapsedTime();
        if(mixer) mixer.update(dt);
        
        if(model) {
            let blink = (Math.sin(t*4) > 0.98) ? 1 : 0;
            let move = talking ? Math.abs(Math.sin(t*15)) * 0.7 : 0;
            
            morphs.forEach(m => {
                const d = m.morphTargetDictionary;
                for(let k in d) {
                    if(k.includes('blink')) m.morphTargetInfluences[d[k]] = blink;
                    if(k.includes('mouth') || k.includes('jaw')) m.morphTargetInfluences[d[k]] = move;
                }
            });
        }
        renderer.render(scene, camera);
    }

    // Classic Voice System
    function speak(txt) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'hi-IN';
        u.onstart = () => talking = true;
        u.onend = () => talking = false;
        window.speechSynthesis.speak(u);
    }

    // Logic
    async function handle(cmd) {
        cmd = cmd.toLowerCase();
        if(cmd.includes("battery")) {
            const b = await navigator.getBattery();
            return `बैटरी ${Math.floor(b.level*100)}% है।`;
        }
        if(cmd.includes("time")) return `समय ${new Date().toLocaleTimeString()} है।`;
        return "जी, मैं सुन रही हूँ।";
    }

    document.getElementById('send').onclick = async () => {
        const val = document.getElementById('in').value;
        if(val) { speak(await handle(val)); document.getElementById('in').value = ""; }
    };

    init();
    animate();
</script>
</body>
</html>
