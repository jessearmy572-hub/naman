<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - 3D Assistant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- UI Styling --- */
        .ui-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            width: 85%;
            max-width: 600px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        button:hover {
            background: #ff6a00;
        }
    </style>

    <!-- Import Three.js and Dependencies via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Priya se kuch bhi puchiye..." />
            <button id="sendBtn">➔</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "YOUR_API_KEY"; // यहाँ अपनी Gemini API Key डालें

        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null;
        let mouthBone = null;
        let eyeBones = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };

        // --- 1. THE BRAIN (Gemini AI + Fallbacks) ---
        async function askPriya(input) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `You are Priya, a sentient 3D AI assistant. Answer in sweet Hindi. User says: ${input}` }]
                        }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                // Fallbacks
                if (input.toLowerCase().includes("time")) {
                    return `Abhi ${new Date().toLocaleTimeString()} ho raha hai.`;
                }
                if (input.toLowerCase().includes("battery")) {
                    if (navigator.getBattery) {
                        const bat = await navigator.getBattery();
                        return `Battery ${Math.round(bat.level * 100)}% hai.`;
                    }
                    return "Mujhe aapki battery ka pata nahi chal pa raha hai.";
                }
                return "Main abhi aapko mehsoos kar rahi hoon, par internet thoda slow hai.";
            }
        }

        // --- TTS (Text to Speech) ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            
            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; resetFace(); };
            
            window.speechSynthesis.speak(utter);
        }

        function resetFace() {
            if (mouthBone) mouthBone.scale.y = 1;
        }

        // --- 2. THE BODY (Three.js Setup) ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            // Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#000000');

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 5);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.minDistance = 2;
            controls.maxDistance = 8;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Load 3D Model
            const loader = new THREE.GLTFLoader();
            loader.load('/girl.glb', (gltf) => {
                priyaModel = gltf.scene;
                scene.add(priyaModel);

                // Auto Scale & Position
                adjustModelScale();

                // Animations Setup
                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    // Manually play 'Idle' or first available animation
                    const idleAnim = THREE.AnimationClip.findByName(gltf.animations, 'Idle') || gltf.animations[0];
                    mixer.clipAction(idleAnim).play();
                }

                // Traverse Bones for Tracking and Fixing T-Pose
                priyaModel.traverse((bone) => {
                    if (bone.isBone) {
                        if (bone.name.includes('Arm')) {
                            bone.rotation.z = bone.name.includes('Left') ? -1.4 : 1.4;
                        }
                        if (bone.name === 'Head' || bone.name === 'Neck') {
                            headBone = bone;
                        }
                        if (bone.name === 'Mouth' || bone.name === 'Jaw') {
                            mouthBone = bone;
                        }
                        if (bone.name.toLowerCase().includes('eye')) {
                            eyeBones.push(bone);
                        }
                    }
                });

            }, undefined, (error) => {
                console.error("Model load nahi ho paya, check karein ki '/girl.glb' sahi path par hai.", error);
            });

            // Events
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        function adjustModelScale() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            const scaleValue = isMobile ? window.innerWidth / 350 : window.innerWidth / 800;
            priyaModel.scale.set(scaleValue, scaleValue, scaleValue);
            priyaModel.position.y = isMobile ? -1.2 : -1.5;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelScale();
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (priyaModel) {
                // 1. Face Tracking
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.5, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.3, 0.1);
                }

                // 2. Lip-Sync Effect
                if (isSpeaking && mouthBone) {
                    mouthBone.scale.y = 0.5 + Math.sin(t * 20) * 0.5;
                }

                // 3. Eye Blink
                const blink = Math.sin(t * 1.5) > 0.98 ? 0.1 : 1;
                eyeBones.forEach(eye => {
                    eye.scale.y = blink;
                });

                // 4. Natural Swaying
                const isMobile = window.innerWidth < 768;
                priyaModel.position.y = (isMobile ? -1.2 : -1.5) + Math.sin(t) * 0.02;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 3. UI HANDLERS ---
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');

        async function handleAction() {
            const text = inputEl.value.trim();
            if (!text) return;
            
            inputEl.value = "";
            const reply = await askPriya(text);
            speak(reply);
        }

        btnEl.addEventListener('click', handleAction);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAction();
        });

        // --- START APPLICATION ---
        init3D();
        animate();
    </script>
</body>
</html>
