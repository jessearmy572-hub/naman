<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - 3D Keyless Assistant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a; /* ब्लैक स्क्रीन की जगह डार्क ग्रे बैकग्राउंड */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Loading Text */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 10px;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        /* --- UI Styling --- */
        .ui-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            width: 85%;
            max-width: 600px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        button:hover {
            background: #ff6a00;
        }
    </style>

    <!-- Three.js Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loader">प्रिया लोड हो रही है... कृपया प्रतीक्षा करें।</div>
    <div id="canvas-container"></div>

    <div class="ui-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Priya se kuch bhi puchiye..." />
            <button id="sendBtn">➔</button>
        </div>
    </div>

    <script>
        // 🛠️ सुधार 1: लिंक को डायरेक्ट डाउनलोडबल 'raw.githubusercontent' लिंक में बदला ताकि CORS एरर न आए
        const MODEL_URL = "https://raw.githubusercontent.com/jessearmy572-hub/naman/main/model.glb"; 

        let scene, camera, renderer, controls, mixer, clock;
        let priyaModel = null;
        let headBone = null;
        let mouthBone = null;
        let eyeBones = [];
        
        let isSpeaking = false;
        let mousePos = { x: 0, y: 0 };

        // AI Brain API Call (Free & Keyless)
        async function askPriya(input) {
            const systemPrompt = "You are Priya, a sweet sentient 3D AI assistant. Always answer the user in short, sweet, warm, and natural Hindi only. Do not use asterisks or markdown format.";
            try {
                const response = await fetch(`https://text.pollinations.ai/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: input }
                        ],
                        model: "openai"
                    })
                });
                return await response.text();
            } catch (err) {
                return "मैं अभी आपसे जुड़ नहीं पा रही हूँ, कृपया अपना इंटरनेट चेक करें।";
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            utter.onstart = () => { isSpeaking = true; };
            utter.onend = () => { isSpeaking = false; if(mouthBone) mouthBone.scale.y = 1; };
            window.speechSynthesis.speak(utter);
        }

        // 3D Engine Initialization
        function init3D() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#1a1a1a'); // लाइट ग्रे/डार्क बैकग्राउंड

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 3.5); // कैमरे को मॉडल के थोड़ा पास लाया गया

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding; // कलर्स को बेहतर बनाने के लिए
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.minDistance = 1;
            controls.maxDistance = 6;

            // 🛠️ सुधार 2: रोशनी (Lights) बढ़ा दी गई है ताकि मॉडल काला न दिखे
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(3, 10, 10);
            scene.add(dirLight);

            // GLTF Loader
            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                // मॉडल लोड होते ही टेक्स्ट छुपाएं
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

                priyaModel = gltf.scene;
                scene.add(priyaModel);
                adjustModelScale();

                mixer = new THREE.AnimationMixer(priyaModel);
                if (gltf.animations.length > 0) {
                    const idleAnim = THREE.AnimationClip.findByName(gltf.animations, 'Idle') || gltf.animations[0];
                    mixer.clipAction(idleAnim).play();
                }

                // हड्डियों (Bones) की पहचान
                priyaModel.traverse((bone) => {
                    if (bone.isBone) {
                        if (bone.name.includes('Arm')) {
                            bone.rotation.z = bone.name.includes('Left') ? -1.4 : 1.4;
                        }
                        if (bone.name === 'Head' || bone.name === 'Neck') headBone = bone;
                        if (bone.name === 'Mouth' || bone.name === 'Jaw') mouthBone = bone;
                        if (bone.name.toLowerCase().includes('eye')) eyeBones.push(bone);
                    }
                });
            }, undefined, (error) => {
                document.getElementById('loader').innerText = "मॉडल लोड करने में त्रुटि आई! (CORS या इंटरनेट समस्या)";
                console.error(error);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        function adjustModelScale() {
            if (!priyaModel) return;
            const isMobile = window.innerWidth < 768;
            // स्केल थोड़ा बढ़ा दिया गया है ताकि मॉडल अच्छे से दिखे
            const scaleValue = isMobile ? window.innerWidth / 200 : window.innerWidth / 500;
            priyaModel.scale.set(scaleValue, scaleValue, scaleValue);
            priyaModel.position.y = isMobile ? -1.0 : -1.3;
        }

        function onMouseMove(e) {
            mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustModelScale();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            if (priyaModel) {
                if (headBone) {
                    headBone.rotation.y = THREE.MathUtils.lerp(headBone.rotation.y, mousePos.x * 0.4, 0.1);
                    headBone.rotation.x = THREE.MathUtils.lerp(headBone.rotation.x, -mousePos.y * 0.2, 0.1);
                }

                if (isSpeaking && mouthBone) {
                    mouthBone.scale.y = 0.5 + Math.sin(t * 20) * 0.5;
                }

                const blink = Math.sin(t * 1.5) > 0.98 ? 0.1 : 1;
                eyeBones.forEach(eye => { eye.scale.y = blink; });

                const isMobile = window.innerWidth < 768;
                priyaModel.position.y = (isMobile ? -1.0 : -1.3) + Math.sin(t) * 0.015;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // UI Handlers
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');

        async function handleAction() {
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = "";
            const reply = await askPriya(text);
            speak(reply);
        }

        btnEl.addEventListener('click', handleAction);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAction(); });

        init3D();
        animate();
    </script>
</body>
</html>
